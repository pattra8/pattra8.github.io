<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=https://docs.google.com/spreadsheets/d/1NU6B7Yf225JGOpgqmQVLrHJl2tvxPtRR1gbtmBjYZyo/edit?usp=sharing" />
  <title>Pattra 8 Resident Records</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #f4f7fb;
      color: #0f2744;
      font-family: "IBM Plex Sans Thai", "Helvetica Neue", Arial, sans-serif;
    }
    .card {
      width: min(92vw, 460px);
      padding: 30px;
      background: white;
      border: 1px solid #e8edf3;
      border-radius: 16px;
      box-shadow: 0 18px 50px rgba(15, 39, 68, 0.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }
    p {
      margin: 0 0 22px;
      color: #64748b;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      padding: 11px 18px;
      border-radius: 999px;
      background: #0f2744;
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Pattra 8 Resident Records</h1>
    <p>กำลังเปิด Google Sheet ข้อมูลลูกบ้าน</p>
    <a href="https://docs.google.com/spreadsheets/d/1NU6B7Yf225JGOpgqmQVLrHJl2tvxPtRR1gbtmBjYZyo/edit?usp=sharing">Open Google Sheet</a>
  </main>
</body>
</html>
