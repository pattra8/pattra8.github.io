<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>รายการผู้มาติดต่อ · Pattra Villa 8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#f9f3e9; --card:#ffffff; --card-soft:#f3ecdd; --line:#e6dcc7;
      --line-soft:#efe8d6; --text:#2a2218; --muted:#6b5d4a;
      --soft:#8a7960; --green:#3f6431; --green-bg:#e8efd9;
      --amber:#c47a2c; --amber-text:#9a5c1f; --amber-deep:#855015;
      --amber-bg:#f7e6cd; --red:#86341e; --red-bg:#f7dfd5;
      --blue:#235a7d; --blue-bg:#e4eff5;
      --shadow:0 1px 2px rgba(60,40,20,.04), 0 8px 24px rgba(60,40,20,.07);
      --radius:16px;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { margin:0; padding:0; }
    body {
      min-height:100dvh; background:var(--bg);
      color:var(--text); font-family:"IBM Plex Sans Thai", system-ui, sans-serif;
      padding:0 0 70px;
    }
    .wrap { width:100%; max-width:620px; margin:0 auto; padding:0 14px; }
    /* ── Canonical Pattra Villa 8 header (matches pattra8.com) ── */
    .site-header {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      background:var(--bg); border-bottom:1px solid var(--line);
      padding:0 24px; height:68px; position:sticky; top:0; z-index:100;
    }
    .brand { display:flex; flex-direction:column; text-decoration:none; }
    .brand-mark {
      font-family:"Cormorant Garamond", serif; font-weight:700; font-size:21px;
      color:var(--text); letter-spacing:.2em;
    }
    .brand-sub {
      font-size:10px; color:var(--muted); letter-spacing:.18em;
      text-transform:uppercase; margin-top:1px;
    }
    .header-actions { display:flex; align-items:center; gap:10px; }
    .identity-pill {
      display:flex; align-items:center; gap:8px; cursor:pointer;
      background:var(--amber-bg); border:1px solid #d4913f; border-radius:99px;
      padding:4px 14px 4px 6px; white-space:nowrap;
    }
    .pill-avatar {
      width:28px; height:28px; border-radius:50%; flex-shrink:0;
      background:var(--amber); color:#fff; display:flex; align-items:center;
      justify-content:center; font-size:.8rem; font-weight:800;
    }
    .pill-house { font-size:.8rem; font-weight:700; color:var(--text); line-height:1.2; }
    .pill-name { font-size:.72rem; color:var(--muted); line-height:1.2; }
    .hero { text-align:center; margin:22px 0 4px; background:var(--card); border:1px solid var(--line);
      border-radius:var(--radius); box-shadow:var(--shadow); padding:16px 18px; margin:16px 0 10px; }
    .ornament { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:14px; }
    .o-line { width:56px; height:1px; background:linear-gradient(90deg,transparent,var(--amber)); }
    .o-line.r { background:linear-gradient(90deg,var(--amber),transparent); }
    .o-diamond { width:6px; height:6px; background:var(--amber); transform:rotate(45deg); opacity:.8; }
    h1 { margin:0; font-size:23px; font-weight:700; line-height:1.1; letter-spacing:-.01em; color:var(--text); }
    .sub { margin:4px auto 0; color:var(--muted); font-size:13px; line-height:1.5; max-width:560px; }
    .toolbar { display:flex; gap:8px; align-items:center; }
    .navbtn {
      flex:0 0 auto; font-family:inherit; font-size:18px; font-weight:700; line-height:1;
      width:46px; min-width:46px; height:46px; border:1.5px solid var(--line);
      border-radius:12px; background:var(--card); color:var(--amber-text);
      cursor:pointer; box-shadow:var(--shadow);
    }
    .navbtn:active { transform:scale(0.97); }
    .navbtn:disabled { opacity:.4; cursor:default; }
    .toolbar input[type=date] {
      flex:1; font-family:inherit; font-size:16px; font-weight:600;
      padding:12px 14px; border:1.5px solid var(--line); border-radius:12px;
      background:var(--card); color:var(--text); box-shadow:var(--shadow); min-width:0;
    }
    .daycaption { text-align:center; font-size:13px; color:var(--soft); margin:10px 2px 2px; }
    .btn {
      border:0; border-radius:12px; background:var(--amber); color:#fff;
      padding:13px 17px; font:inherit; font-weight:700; cursor:pointer;
      box-shadow:0 8px 22px rgba(196,122,44,.20); white-space:nowrap;
    }
    .btn:hover { background:var(--amber-deep); }
    .btn:disabled { opacity:.55; cursor:default; }
    .view-actions { display:flex; gap:8px; margin:12px 0 12px; }
    .view-btn {
      border:1px solid var(--line); border-radius:12px; background:var(--card);
      color:var(--amber-text); padding:9px 13px; font:inherit; font-size:13px;
      font-weight:800; cursor:pointer; box-shadow:var(--shadow);
    }
    .stats { margin:14px 0 8px; }
    .dash { background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:16px 18px; }
    .dash-head { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; }
    .dash-cap { font-size:12.5px; color:var(--soft); }
    .dash-total { font-family:"IBM Plex Mono", monospace; font-size:30px; font-weight:700; color:var(--text); line-height:1; margin-top:3px; }
    .dash-total span { font-family:"IBM Plex Sans Thai", sans-serif; font-size:13px; font-weight:500; color:var(--muted); margin-left:4px; }
    .dash-status { display:flex; gap:8px; }
    .ds { font-size:12.5px; font-weight:600; padding:4px 11px; border-radius:999px; white-space:nowrap; }
    .ds.ok { color:var(--green); background:var(--green-bg); }
    .ds.pend { color:var(--amber-text); background:var(--amber-bg); }
    .ds.warn { color:var(--red); background:var(--red-bg); }
    .dash-sec { margin-top:17px; }
    .dash-lbl { font-size:12px; font-weight:700; color:var(--soft); letter-spacing:.02em; margin-bottom:9px; }
    .vbar { display:flex; height:12px; border-radius:99px; overflow:hidden; background:var(--card-soft); gap:2px; }
    .vbar span { display:block; height:100%; }
    .vleg { display:flex; flex-wrap:wrap; gap:8px 16px; margin-top:10px; font-size:12.5px; color:var(--text); }
    .vleg span { display:inline-flex; align-items:center; gap:6px; }
    .vleg i { width:9px; height:9px; border-radius:2px; }
    .pbars { display:grid; gap:9px; }
    .pbar { display:grid; grid-template-columns:100px 1fr 26px; align-items:center; gap:10px; font-size:13px; }
    .pbar .pn { color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pbar .pt { height:8px; border-radius:99px; background:var(--card-soft); overflow:hidden; }
    .pbar .pt i { display:block; height:100%; background:var(--amber); border-radius:99px; }
    .pbar .pc { text-align:right; font-family:"IBM Plex Mono", monospace; font-weight:600; color:var(--text); }
    .platebadge { display:inline-flex; flex-direction:column; align-items:center; border:1.5px solid #3a3529;
      border-radius:7px; background:#fffdf9; padding:2px 12px 3px; line-height:1.15; }
    .platebadge .pl-no { font-family:"IBM Plex Mono", monospace; font-weight:700; font-size:15px; letter-spacing:.03em; color:var(--text); }
    .platebadge .pl-prov { font-size:10px; color:var(--soft); margin-top:1px; }
    .list { display:grid; gap:12px; margin-top:14px; }
    .card { display:flex; background:var(--card); border:1px solid var(--line);
      border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .card.selected { outline:2px solid var(--amber); outline-offset:-2px; }
    .rail { flex:0 0 42px; background:var(--amber-bg); border-right:1px solid #eccf9f;
      display:flex; flex-direction:column; align-items:center; padding:17px 0; }
    .rail .sel { margin:0; }
    .sel { width:18px; height:18px; accent-color:var(--amber); cursor:pointer; flex-shrink:0; }
    .cardmain { flex:1; min-width:0; }
    .card-head { padding:15px 16px 14px; cursor:pointer; user-select:none; }
    .head-top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .head-id { display:flex; align-items:baseline; gap:12px; min-width:0; }
    .time { font-family:"IBM Plex Mono", monospace; font-size:22px; font-weight:700;
      color:var(--text); line-height:1; letter-spacing:.01em; }
    .house { font-size:15px; font-weight:600; color:var(--text); }
    .head-meta { display:flex; align-items:center; gap:9px; flex-shrink:0; }
    .chevron { font-size:16px; color:var(--soft); line-height:1; transition:transform .2s; }
    .card.collapsed .chevron { transform:rotate(-90deg); }
    .card.collapsed .body { display:none; }
    .purpose { margin-top:6px; font-size:13.5px; color:var(--muted); line-height:1.4; }
    .mini-btn { border:1px solid var(--line); background:var(--card); border-radius:9px; padding:5px 12px; font:inherit; font-size:12.5px; font-weight:600; cursor:pointer; }
    .mini-btn.edit { color:var(--amber-text); }
    .mini-btn.danger { color:var(--red); }
    .mini-btn.edit:hover { background:var(--amber-bg); border-color:#e8c898; }
    .mini-btn.danger:hover { background:var(--red-bg); border-color:#efc5bf; }
    .mini-btn:disabled { opacity:.5; cursor:default; }
    .bulkbar { position:fixed; left:50%; transform:translateX(-50%); bottom:16px; z-index:30;
      display:none; align-items:center; gap:14px; background:var(--card); border:1px solid var(--line);
      box-shadow:0 10px 30px rgba(55,40,20,.18); border-radius:14px; padding:10px 10px 10px 16px; }
    .bulkbar.show { display:flex; }
    .bulkbar .n { font-weight:800; font-size:14px; }
    .bulk-btn { border:0; border-radius:10px; padding:9px 15px; font:inherit; font-weight:700; cursor:pointer; }
    .bulk-btn.danger { background:var(--red); color:#fff; }
    .bulk-btn.ghost { background:transparent; color:var(--muted); }
    .bulk-btn:disabled { opacity:.55; cursor:default; }
    .badge { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:4px 10px; font-size:12.5px; font-weight:600; white-space:nowrap; }
    .badge .dot { width:7px; height:7px; border-radius:50%; }
    .badge.complete { color:var(--green); background:var(--green-bg); }
    .badge.complete .dot { background:var(--green); }
    .badge.pending { color:var(--amber-text); background:var(--amber-bg); }
    .badge.pending .dot { background:var(--amber); }
    .badge.warning { color:var(--red); background:var(--red-bg); }
    .badge.warning .dot { background:var(--red); }
    .body { padding:14px 16px 16px; border-top:1px solid var(--line-soft); }
    .kv { display:grid; grid-template-columns:104px 1fr; row-gap:10px; align-items:center; font-size:14px; line-height:1.35; }
    .kl { color:var(--soft); }
    .kval { color:var(--text); }
    .dash { color:#b6a487; }
    .rawbox { margin-top:14px; background:var(--card-soft); border:1px solid var(--line-soft); border-radius:12px; padding:11px 13px; }
    .rawbox .rlabel { color:var(--soft); font-size:12px; font-weight:700; letter-spacing:.02em; }
    .rawbox .rval { margin-top:5px; font-size:14px; line-height:1.5; white-space:pre-wrap; }
    .warnbox { margin-top:12px; background:var(--red-bg); border:1px solid #efc5bf; border-radius:12px; padding:11px 13px; }
    .warnbox .wlabel { color:var(--red); font-size:12px; font-weight:700; letter-spacing:.02em; }
    .warnbox .wlist { margin:6px 0 0; padding:0 0 0 18px; color:var(--text); font-size:13.5px; line-height:1.5; }
    .warnbox .wlist li { margin:0; }
    .cardfoot { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:15px; padding-top:12px; border-top:1px solid var(--line-soft); }
    .cardfoot .ts { font-size:12px; color:#a08a6b; }
    .acts { display:flex; gap:8px; }
    .mono { font-family:"IBM Plex Mono", monospace; font-weight:700; letter-spacing:.02em; }
    .gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(135px,1fr)); gap:10px; margin-top:12px; }
    .thumb { border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--card-soft); }
    .thumb button { display:block; width:100%; border:0; padding:0; background:transparent; cursor:zoom-in; color:inherit; text-align:left; }
    .thumb img { display:block; width:100%; aspect-ratio:4/3; object-fit:cover; background:#eee; }
    .cap { padding:8px 9px 9px; font-size:12px; color:var(--muted); line-height:1.35; }
    .empty, .note {
      text-align:center; color:var(--muted); background:var(--card); border:1px solid var(--line);
      border-radius:var(--radius); padding:26px 18px; box-shadow:var(--shadow); line-height:1.55;
    }
    .note.err { color:var(--red); background:var(--red-bg); border-color:#efc5bf; }
    .loading { color:var(--muted); text-align:center; padding:34px 0; }
    .spinner { display:inline-block; width:18px; height:18px; margin-right:8px; vertical-align:-4px; border:2.5px solid rgba(196,122,44,.22); border-top-color:var(--amber); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .overlay { position:fixed; inset:0; background:rgba(35,26,16,.48); display:none; align-items:center; justify-content:center; padding:20px; z-index:200; }
    .overlay.open { display:flex; }
    .modal { width:100%; max-width:370px; background:var(--card); border-radius:20px; padding:26px 22px; box-shadow:var(--shadow); }
    .modal h2 { margin:0 0 5px; font-size:21px; }
    .modal p { margin:0 0 17px; color:var(--muted); font-size:13.5px; line-height:1.5; }
    .field { margin:13px 0; }
    .field label { display:block; margin-bottom:6px; color:var(--soft); font-size:12.5px; font-weight:700; }
    .row { display:flex; border:1.5px solid var(--line); border-radius:12px; overflow:hidden; background:#fff; }
    .prefix { display:flex; align-items:center; padding:0 12px; background:var(--card-soft); color:var(--muted); font-weight:800; }
    .row input, .row select, .pin { width:100%; border:0; outline:0; background:transparent; padding:12px; font:inherit; font-size:17px; font-weight:700; }
    .field:focus-within .row, .pin:focus { border-color:var(--amber); }
    .edit-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .edit-modal {
      max-width:520px; max-height:min(82dvh,720px); overflow:auto;
      padding:20px; border-radius:16px;
    }
    .edit-modal h2 { font-size:18px; line-height:1.2; }
    .edit-modal p { font-size:12.5px; margin-bottom:12px; }
    .edit-modal .field { margin:9px 0; }
    .edit-modal .field label { font-size:12px; margin-bottom:5px; font-weight:600; }
    .edit-modal .row { border-width:1px; border-radius:10px; }
    .edit-modal .row input,
    .edit-modal .row select {
      padding:9px 10px; font-size:14.5px; font-weight:500; line-height:1.35;
    }
    .edit-modal .modal-actions { position:sticky; bottom:-20px; background:linear-gradient(180deg,rgba(255,255,255,0),var(--card) 24%); padding-top:18px; }
    .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:14px; }
    .btn.secondary { background:var(--card); color:var(--amber-text); border:1px solid var(--line); box-shadow:none; }
    .preview-modal {
      width:auto; max-width:min(88vw,880px); max-height:calc(100dvh - 180px);
      padding:0; overflow:hidden; border-radius:16px; background:#15120f;
      display:flex; flex-direction:column;
    }
    #previewOverlay {
      align-items:center; overflow:auto;
      padding:clamp(96px,12dvh,140px) 20px 48px;
    }
    .preview-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 12px; background:#231d17; color:#fff; }
    .preview-title { font-size:13px; font-weight:600; color:#f5ead9; }
    .preview-close { border:0; background:transparent; color:#fff; font:inherit; font-size:22px; line-height:1; cursor:pointer; padding:2px 8px; }
    .preview-img {
      display:block; width:auto; height:auto; max-width:min(88vw,880px);
      max-height:calc(100dvh - 224px); object-fit:contain; background:#15120f;
    }
    .pin { border:1.5px solid var(--line); border-radius:12px; letter-spacing:.28em; font-family:"IBM Plex Mono", monospace; }
    .merr { display:none; color:var(--red); background:var(--red-bg); border-radius:11px; padding:10px 12px; font-size:13px; margin-bottom:10px; }
    .merr.show { display:block; }
    footer { text-align:center; color:var(--soft); font-size:12px; margin-top:28px; }
    @media (max-width:620px) {
      .kv { grid-template-columns:92px 1fr; }
      .pbar { grid-template-columns:88px 1fr 24px; }
      .toolbar { align-items:stretch; gap:8px; }
      .btn { padding-left:14px; padding-right:14px; }
      .view-actions { display:grid; grid-template-columns:1fr 1fr; }
      .edit-grid { grid-template-columns:1fr; }
      .edit-modal { width:min(94vw,520px); max-height:82dvh; }
    }
    /* ── Desktop: 2-column workspace (sidebar + list) ── */
    @media (min-width:980px) {
      .wrap {
        max-width:1180px;
        display:grid; align-items:start; column-gap:30px;
        grid-template-columns:360px minmax(0,1fr);
        grid-template-areas:"hero hero" "side list" "foot foot";
      }
      .hero {
        grid-area:hero; display:flex; align-items:baseline; gap:14px;
        text-align:left; background:transparent; border:0; box-shadow:none;
        padding:6px 2px 12px; margin:14px 0 8px; border-bottom:1px solid var(--line);
      }
      .hero .ornament { display:none; }
      .hero h1 { font-size:21px; }
      .hero .sub { margin:0; font-size:13px; }
      .sidecol { grid-area:side; position:sticky; top:84px; }
      .listcol { grid-area:list; min-width:0; }
      footer { grid-area:foot; }
      .daycaption { text-align:left; }
      .view-actions { margin-top:34px; }
      /* Expanded card body splits into info | images so it stays short */
      .card .body {
        display:grid; align-items:start; column-gap:20px;
        grid-template-columns:minmax(0,1fr) 300px;
        grid-template-areas:"kv gallery" "raw gallery" "warn gallery" "foot foot";
      }
      .card .body .kv { grid-area:kv; }
      .card .body .rawbox { grid-area:raw; }
      .card .body .warnbox { grid-area:warn; }
      .card .body .gallery { grid-area:gallery; margin-top:0; }
      .card .body .cardfoot { grid-area:foot; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <div class="brand-mark">Pattra Villa 8</div>
      <div class="brand-sub">Visitor Log</div>
    </a>
    <div class="header-actions"><div id="headerIdentity"></div></div>
  </header>
  <div class="wrap">
    <div class="sidecol">
      <div class="toolbar">
        <button id="prev" class="navbtn" aria-label="วันก่อนหน้า">‹</button>
        <input id="date" type="date" aria-label="วันที่" />
        <button id="next" class="navbtn" aria-label="วันถัดไป">›</button>
        <button id="reload" class="btn">โหลด</button>
      </div>
      <div id="daycap" class="daycaption"></div>
      <div id="stats" class="stats" style="display:none"></div>
    </div>
    <div class="listcol">
      <div class="view-actions">
        <button id="expandAll" class="view-btn">Expand all</button>
        <button id="collapseAll" class="view-btn">Collapse all</button>
      </div>
      <main id="list"></main>
    </div>
    <div id="bulkbar" class="bulkbar">
      <span class="n"><span id="bulkcount">0</span> รายการ</span>
      <button id="bulkclear" class="bulk-btn ghost">ล้าง</button>
      <button id="bulkdel" class="bulk-btn danger">ลบที่เลือก</button>
    </div>
    <footer>Pattra Villa 8 · เฉพาะกรรมการ</footer>
  </div>

  <div id="overlay" class="overlay">
    <div class="modal">
      <h2>เข้าสู่ระบบกรรมการ</h2>
      <p>ใช้บ้านเลขที่และ PIN ของกรรมการ เพื่อดูรายการผู้มาติดต่อ</p>
      <div id="merr" class="merr"></div>
      <div class="field">
        <label>บ้านเลขที่</label>
        <div class="row"><span class="prefix">38/</span><input id="house" inputmode="numeric" autocomplete="off" placeholder="8" /></div>
      </div>
      <div class="field">
        <label>PIN 6 หลัก</label>
        <input id="pin" class="pin" type="password" inputmode="numeric" maxlength="6" autocomplete="off" placeholder="••••••" />
      </div>
      <button id="login" class="btn" style="width:100%">เข้าสู่ระบบ</button>
    </div>
  </div>

  <div id="editOverlay" class="overlay">
    <div class="modal edit-modal">
      <h2>Edit visitor data</h2>
      <p>Manual correction for OCR or guard message parsing.</p>
      <div id="editErr" class="merr"></div>
      <div class="edit-grid">
        <div class="field"><label>House no.</label><div class="row"><input id="editHouse" autocomplete="off" /></div></div>
        <div class="field"><label>Purpose category</label><div class="row"><select id="editPurposeCategory">
          <option value="contact">มาติดต่อ</option>
          <option value="guest">มาหาลูกบ้าน</option>
          <option value="food_delivery">ส่งอาหาร</option>
          <option value="delivery">ส่งพัสดุ/ขนส่ง</option>
          <option value="pickup">รับ-ส่ง (Grab/แท็กซี่)</option>
          <option value="contractor">ช่าง/ซ่อมบำรุง</option>
          <option value="utility">หน่วยงานสาธารณูปโภค</option>
          <option value="office">ติดต่อนิติ</option>
          <option value="other">อื่น ๆ</option>
        </select></div></div>
        <div class="field"><label>Purpose text</label><div class="row"><input id="editPurposeText" autocomplete="off" /></div></div>
        <div class="field"><label>Name</label><div class="row"><input id="editName" autocomplete="off" /></div></div>
        <div class="field"><label>ID / License no.</label><div class="row"><input id="editDocNo" inputmode="numeric" autocomplete="off" /></div></div>
        <div class="field"><label>License plate</label><div class="row"><input id="editPlate" autocomplete="off" /></div></div>
        <div class="field"><label>Vehicle type</label><div class="row"><select id="editVehicleType">
          <option value="">—</option>
          <option value="รถยนต์">รถยนต์</option>
          <option value="รถมอเตอร์ไซค์">รถมอเตอร์ไซค์</option>
          <option value="รถบรรทุก">รถบรรทุก</option>
          <option value="รถขยะ">รถขยะ</option>
        </select></div></div>
      </div>
      <div class="modal-actions">
        <button id="editCancel" class="btn secondary">Cancel</button>
        <button id="editSave" class="btn">Save</button>
      </div>
    </div>
  </div>

  <div id="previewOverlay" class="overlay">
    <div class="modal preview-modal">
      <div class="preview-head">
        <div id="previewTitle" class="preview-title">Photo preview</div>
        <button id="previewClose" class="preview-close" aria-label="Close preview">×</button>
      </div>
      <img id="previewImg" class="preview-img" alt="Visitor photo preview" />
    </div>
  </div>

  <script>
  (function(){
    'use strict';
    var API='https://asia-southeast1-pattra8-54c3f.cloudfunctions.net/visitorIntakeAdmin';
    var KEY='pattra_visitor_intake_session_v1';
    var TTL=30*24*60*60*1000;
    var elDate=document.getElementById('date'), elReload=document.getElementById('reload'),
      elPrev=document.getElementById('prev'), elNext=document.getElementById('next'),
      elDaycap=document.getElementById('daycap'),
      elExpandAll=document.getElementById('expandAll'), elCollapseAll=document.getElementById('collapseAll'),
      elStats=document.getElementById('stats'), elList=document.getElementById('list'),
      elOverlay=document.getElementById('overlay'), elHouse=document.getElementById('house'),
      elPin=document.getElementById('pin'), elLogin=document.getElementById('login'),
      elErr=document.getElementById('merr'), elIdentity=document.getElementById('headerIdentity'),
      elEditOverlay=document.getElementById('editOverlay'), elEditErr=document.getElementById('editErr'),
      elEditHouse=document.getElementById('editHouse'), elEditPurposeCategory=document.getElementById('editPurposeCategory'),
      elEditPurposeText=document.getElementById('editPurposeText'), elEditName=document.getElementById('editName'),
      elEditDocNo=document.getElementById('editDocNo'), elEditPlate=document.getElementById('editPlate'),
      elEditVehicleType=document.getElementById('editVehicleType'), elEditCancel=document.getElementById('editCancel'),
      elEditSave=document.getElementById('editSave'),
      elPreviewOverlay=document.getElementById('previewOverlay'), elPreviewImg=document.getElementById('previewImg'),
      elPreviewTitle=document.getElementById('previewTitle'), elPreviewClose=document.getElementById('previewClose');
    var currentRecords=[], editingId='';

    function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
    function residentName(houseNo){try{var r=JSON.parse(localStorage.getItem('pattra_resident_session_v1')||'null'); if(r&&r.houseNo===houseNo&&r.residentName) return r.residentName;}catch(e){} return '';}
    function renderIdentity(s){
      if(!s){elIdentity.innerHTML=''; return;}
      var name=residentName(s.houseNo);
      var initial=((name||s.houseNo||'').match(/[\dA-Za-z฀-๿]/)||['P'])[0].toUpperCase();
      elIdentity.innerHTML='<div class="identity-pill" id="idPill" title="ออกจากระบบ">'+
        '<div class="pill-avatar">'+esc(initial)+'</div><div>'+
        '<div class="pill-house">บ้าน '+esc(s.houseNo)+'</div>'+
        '<div class="pill-name">'+esc(name||'กรรมการ')+'</div></div></div>';
      var p=document.getElementById('idPill');
      if(p) p.addEventListener('click',function(){localStorage.removeItem(KEY); renderIdentity(null); showLogin();});
    }
    function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
    function session(){try{var s=JSON.parse(localStorage.getItem(KEY)||'null'); if(!s||s.expiresAt<Date.now()) return null; return s;}catch(e){return null;}}
    function store(h,p){localStorage.setItem(KEY,JSON.stringify({houseNo:h,pin:p,expiresAt:Date.now()+TTL}));}
    function showLogin(msg){elOverlay.classList.add('open'); renderIdentity(null); if(msg){elErr.textContent=msg; elErr.classList.add('show');} setTimeout(function(){elHouse.focus();},80);}
    function hideLogin(){elOverlay.classList.remove('open'); elErr.classList.remove('show');}
    function fmtTs(ts){try{var ms=ts&&ts._seconds?ts._seconds*1000:(ts&&ts.seconds?ts.seconds*1000:0); if(!ms) return ''; return new Date(ms).toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short',timeZone:'Asia/Bangkok'});}catch(e){return '';}}
    function fmtTime(ts){try{var ms=ts&&ts._seconds?ts._seconds*1000:(ts&&ts.seconds?ts.seconds*1000:0); if(!ms) return '--:--'; return new Date(ms).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Bangkok'});}catch(e){return '--:--';}}
    function fmtDate(v){try{var parts=String(v||'').split('-'); if(parts.length!==3) return ''; var d=new Date(Number(parts[0]),Number(parts[1])-1,Number(parts[2])); return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});}catch(e){return v||'';}}
    function syncDaycap(){elDaycap.textContent=fmtDate(elDate.value);}
    function statusLabel(s){
      if(s==='complete') return 'ครบถ้วน';
      if(s==='pending_image') return 'ขาดรูปบัตร / รูปรถ';
      if(s==='pending_text') return 'รอข้อมูลเพิ่มเติม';
      return 'รอข้อมูล';
    }
    function categoryLabel(s){return {food_delivery:'ส่งอาหาร',delivery:'ส่งพัสดุ/ขนส่ง',pickup:'รับ-ส่ง (Grab/แท็กซี่)',contractor:'ช่าง/ซ่อมบำรุง',utility:'หน่วยงานสาธารณูปโภค',office:'ติดต่อนิติ',contact:'มาติดต่อ',guest:'มาหาลูกบ้าน',other:'อื่น ๆ',unknown:'ไม่ทราบ'}[s]||s||'ไม่ทราบ';}
    function imageKind(k){return k==='document'?'บัตรประชาชน / ใบขับขี่':k==='vehicle'?'รูปรถ':'รูปภาพ';}
    function normalizeProvince(v){return String(v||'').replace(/กรุงเทพมหานคร/g,'กรุงเทพ');}
    function plateParts(v){
      var clean=normalizeProvince(v).replace(/\s+/g,'').replace(/จังหวัด/g,'').trim();
      var provinces=[
        'กรุงเทพมหานคร','กรุงเทพ','กระบี่','กาญจนบุรี','กาฬสินธุ์','กำแพงเพชร','ขอนแก่น','จันทบุรี','ฉะเชิงเทรา','ชลบุรี',
        'ชัยนาท','ชัยภูมิ','ชุมพร','เชียงราย','เชียงใหม่','ตรัง','ตราด','ตาก','นครนายก','นครปฐม','นครพนม','นครราชสีมา',
        'นครศรีธรรมราช','นครสวรรค์','นนทบุรี','นราธิวาส','น่าน','บึงกาฬ','บุรีรัมย์','ปทุมธานี','ประจวบคีรีขันธ์',
        'ปราจีนบุรี','ปัตตานี','พระนครศรีอยุธยา','พะเยา','พังงา','พัทลุง','พิจิตร','พิษณุโลก','เพชรบุรี','เพชรบูรณ์',
        'แพร่','ภูเก็ต','มหาสารคาม','มุกดาหาร','แม่ฮ่องสอน','ยโสธร','ยะลา','ร้อยเอ็ด','ระนอง','ระยอง','ราชบุรี',
        'ลพบุรี','ลำปาง','ลำพูน','เลย','ศรีสะเกษ','สกลนคร','สงขลา','สตูล','สมุทรปราการ','สมุทรสงคราม','สมุทรสาคร',
        'สระแก้ว','สระบุรี','สิงห์บุรี','สุโขทัย','สุพรรณบุรี','สุราษฎร์ธานี','สุรินทร์','หนองคาย','หนองบัวลำภู',
        'อ่างทอง','อำนาจเจริญ','อุดรธานี','อุตรดิตถ์','อุทัยธานี','อุบลราชธานี'
      ];
      var prov='';
      provinces.sort(function(a,b){return b.length-a.length;}).some(function(p){if(clean.indexOf(p)>-1){prov=p; clean=clean.replace(p,''); return true;} return false;});
      prov=normalizeProvince(prov);
      var m=clean.match(/^([0-9]?[ก-ฮ]{1,3})([0-9]{1,4})$/);
      return {no:(m?[m[1],m[2]].join(' '):clean), prov:prov};
    }
    function plateText(v){var p=plateParts(v); return [p.no,p.prov].filter(Boolean).join(' ');}
    function plateBadge(v){
      var p=plateParts(v);
      if(!p.no) return '<span class="dash">—</span>';
      return '<span class="platebadge"><span class="pl-no">'+esc(p.no)+'</span>'+
        (p.prov?'<span class="pl-prov">'+esc(p.prov)+'</span>':'')+'</span>';
    }
    function vehicleTypeLabel(v){
      var s=String(v||'').trim().toLowerCase();
      if(!s||s==='unknown') return '—';
      if(/ขยะ|garbage|trash|waste|refuse/.test(s)) return 'รถขยะ';
      if(/motor|มอเตอร์|มอเตอ|จักรยานยนต์|scooter|bike/.test(s)) return 'รถมอเตอร์ไซค์';
      if(/truck|บรรทุก|lorry|สิบล้อ|หกล้อ/.test(s)) return 'รถบรรทุก';
      if(/car|sedan|suv|van|pickup|รถยนต์|รถเก๋ง|รถตู้|กระบะ/.test(s)) return 'รถยนต์';
      return s;
    }
    function personName(o){return (o&&((/[ก-๙]/.test(o.personName||'')&&o.personName)||o.thaiPersonName||o.personName||o.englishPersonName))||'';}
    function maskDocNo(v){var d=String(v||'').replace(/\D/g,''); return d.length>=4?'*'.repeat(Math.max(4,d.length-4))+d.slice(-4):'';}
    function docNo(o){return (o&&(o.maskedDocumentNo||maskDocNo(o.documentNumber)))||'';}
    function purposeDisplay(r){
      var c=String(r.purposeCategory||'unknown');
      if(c==='other'||c==='unknown') return r.purposeText||categoryLabel(c);
      return categoryLabel(c);
    }
    function warningsFor(r){return Array.isArray(r.warnings)?r.warnings.filter(Boolean):[];}
    function docRaw(o){return (o&&String(o.documentNumber||'').replace(/\D/g,''))||'';}

    async function call(body){
      var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',body:JSON.stringify(body)});
      var data=await res.json().catch(function(){return {};});
      if(!res.ok||!data.ok) throw Object.assign(new Error(data.error||('HTTP '+res.status)),{status:res.status});
      return data;
    }

    function pct(n,total){return total>0?Math.round(n/total*100):0;}
    function renderDashboard(records, st){
      elStats.style.display='block';
      var total=records.length;
      var complete=records.filter(function(r){return r.status==='complete';}).length;
      var pending=total-complete;
      var warningCount=records.filter(function(r){return warningsFor(r).length>0;}).length;
      var car=0, moto=0, other=0;
      records.forEach(function(r){
        var s=vehicleTypeLabel((r.vehicleCapture||{}).vehicleType);
        if(s==='รถยนต์') car++; else if(s==='รถมอเตอร์ไซค์') moto++; else other++;
      });
      var pmap={};
      records.forEach(function(r){var k=categoryLabel(String(r.purposeCategory||'unknown')); pmap[k]=(pmap[k]||0)+1;});
      var plist=Object.keys(pmap).map(function(k){return {k:k,n:pmap[k]};}).sort(function(a,b){return b.n-a.n;}).slice(0,5);
      var pmax=plist.length?plist[0].n:1;

      var vseg='';
      if(car) vseg+='<span style="width:'+pct(car,total)+'%;background:#235a7d"></span>';
      if(moto) vseg+='<span style="width:'+pct(moto,total)+'%;background:#c47a2c"></span>';
      if(other) vseg+='<span style="width:'+pct(other,total)+'%;background:#b6a487"></span>';
      var vleg='<span><i style="background:#235a7d"></i>รถยนต์ '+car+'</span>'+
        '<span><i style="background:#c47a2c"></i>มอเตอร์ไซค์ '+moto+'</span>'+
        '<span><i style="background:#b6a487"></i>อื่น ๆ '+other+'</span>';

      var pbars=plist.map(function(p){
        return '<div class="pbar"><span class="pn">'+esc(p.k)+'</span>'+
          '<span class="pt"><i style="width:'+Math.max(6,Math.round(p.n/pmax*100))+'%"></i></span>'+
          '<span class="pc">'+p.n+'</span></div>';
      }).join('') || '<div class="pn" style="color:var(--soft)">—</div>';

      elStats.innerHTML=
        '<div class="dash">'+
          '<div class="dash-head">'+
            '<div><div class="dash-cap">รถเข้า-ออกวันนี้</div>'+
              '<div class="dash-total">'+total+'<span>คัน</span></div></div>'+
            '<div class="dash-status">'+
              '<span class="ds ok">ครบ '+complete+'</span>'+
              '<span class="ds pend">รอ '+pending+'</span>'+
              '<span class="ds warn">เตือน '+warningCount+'</span></div>'+
          '</div>'+
          '<div class="dash-sec"><div class="dash-lbl">ประเภทรถ</div>'+
            '<div class="vbar">'+(total?vseg:'<span style="width:100%;background:var(--card-soft)"></span>')+'</div>'+
            '<div class="vleg">'+vleg+'</div></div>'+
          '<div class="dash-sec"><div class="dash-lbl">มาทำอะไร</div>'+
            '<div class="pbars">'+pbars+'</div></div>'+
        '</div>';
    }

    function dashOr(v,cls){return v?('<span'+(cls?' class="'+cls+'"':'')+'>'+esc(v)+'</span>'):'<span class="dash">—</span>';}
    function render(records){
      currentRecords=records||[];
      if(!records.length){elList.innerHTML='<div class="empty">ยังไม่มีรายการผู้มาติดต่อในวันนี้</div>'; refreshBulk(); return;}
      elList.innerHTML='<div class="list">'+records.map(function(r,i){
        var o=r.ocr||{}, vc=r.vehicleCapture||{}, imgs=r.images||[];
        var raw=(r.rawTexts||[]).map(function(t){return t.text;}).filter(Boolean).join('\n');
        var plate=vc.plateText?plateText(vc.plateText):'';
        var vtype=vehicleTypeLabel(vc.vehicleType);
        var name=personName(o);
        var documentNo=docNo(o);
        var purpose=purposeDisplay(r);
        var isComplete=r.status==='complete';
        var badgeCls=isComplete?'complete':'pending';
        var warnings=warningsFor(r);
        return '<article class="card collapsed" data-id="'+esc(r.id||'')+'">'+
          '<div class="rail">'+
            '<input type="checkbox" class="sel" data-sel="'+esc(r.id||'')+'" title="เลือก" />'+
          '</div>'+
          '<div class="cardmain">'+
            '<div class="card-head">'+
              '<div class="head-top">'+
                '<div class="head-id"><span class="time">'+esc(fmtTime(r.createdAt))+'</span>'+
                  '<span class="house">บ้าน '+esc(r.houseNo||'ไม่พบ')+'</span></div>'+
                '<div class="head-meta">'+
                  '<span class="badge '+badgeCls+'"><span class="dot"></span>'+esc(statusLabel(r.status))+'</span>'+
                  (warnings.length?'<span class="badge warning"><span class="dot"></span>warning</span>':'')+
                  '<span class="chevron">⌄</span></div>'+
              '</div>'+
              '<div class="purpose">'+esc(purpose||'ไม่พบเหตุผล')+'</div>'+
            '</div>'+
            '<div class="body">'+
              '<div class="kv">'+
                '<div class="kl">ผู้มาติดต่อ</div><div>'+dashOr(name,'kval')+'</div>'+
                '<div class="kl">ทะเบียนรถ</div><div>'+(plate?plateBadge(vc.plateText):'<span class="dash">—</span>')+'</div>'+
                '<div class="kl">บัตร / ใบขับขี่</div><div>'+dashOr(documentNo,'mono')+'</div>'+
                '<div class="kl">ประเภทพาหนะ</div><div>'+dashOr(vtype==='—'?'':vtype,'kval')+'</div>'+
              '</div>'+
              '<div class="rawbox"><div class="rlabel">ข้อความ รปภ</div><div class="rval">'+(raw?esc(raw):'<span class="dash">—</span>')+'</div></div>'+
              (warnings.length?'<div class="warnbox"><div class="wlabel">Warning</div><ul class="wlist">'+warnings.map(function(item){return '<li>'+esc(item)+'</li>';}).join('')+'</ul></div>':'')+
              '<div class="gallery">'+(imgs.length?imgs.map(function(img){
                var label=imageKind(img.kind);
                var media=img.imageUrl?'<button type="button" data-preview="'+esc(img.imageUrl)+'" data-preview-title="'+esc(label)+'"><img src="'+esc(img.imageUrl)+'" loading="lazy" alt="'+esc(label)+'"></button>':'<div class="empty" style="box-shadow:none;border:0;border-radius:0;padding:22px 8px">ลบรูปแล้ว</div>';
                return '<div class="thumb">'+media+'<div class="cap">'+esc(imageKind(img.kind))+'</div></div>';
              }).join(''):'<div class="empty" style="box-shadow:none;grid-column:1/-1">ยังไม่มีรูป</div>')+'</div>'+
              '<div class="cardfoot"><span class="ts">บันทึกเมื่อ '+esc(fmtTs(r.createdAt))+' น.</span>'+
                '<div class="acts">'+
                  '<button class="mini-btn edit" data-edit="'+esc(r.id||'')+'" title="แก้ไขรายการนี้">แก้ไข</button>'+
                  '<button class="mini-btn danger" data-del="'+esc(r.id||'')+'" title="ลบรายการนี้">ลบ</button>'+
                '</div>'+
              '</div>'+
            '</div>'+
          '</div></article>';
      }).join('')+'</div>';
      refreshBulk();
    }

    async function load(){
      var s=session(); if(!s){showLogin(); return;}
      elReload.disabled=true; elList.innerHTML='<div class="loading"><span class="spinner"></span>กำลังโหลดรายการผู้มาติดต่อ…</div>';
      try{
        var data=await call({action:'list',houseNo:s.houseNo,pin:s.pin,visitDate:elDate.value});
        renderIdentity(s); renderDashboard(data.records||[], data.stats||{}); render(data.records||[]);
      }catch(err){
        if(err.status===401||err.status===403){localStorage.removeItem(KEY); showLogin('เลขบ้าน/PIN ไม่ถูกต้อง หรือไม่มีสิทธิ์กรรมการ'); elList.innerHTML=''; return;}
        elList.innerHTML='<div class="note err">โหลดข้อมูลไม่สำเร็จ<br><small>'+esc(err.message)+'</small></div>';
      }finally{elReload.disabled=false;}
    }

    async function login(){
      var suffix=(elHouse.value||'').trim(), pin=(elPin.value||'').trim();
      elErr.classList.remove('show');
      if(!/^\d{1,2}$/.test(suffix)){elErr.textContent='กรอกเลขบ้านให้ถูกต้อง'; elErr.classList.add('show'); return;}
      if(pin.length!==6){elErr.textContent='PIN ต้องมี 6 หลัก'; elErr.classList.add('show'); return;}
      elLogin.disabled=true; elLogin.textContent='กำลังตรวจสอบ…';
      try{
        var h='38/'+suffix;
        await call({action:'list',houseNo:h,pin:pin,visitDate:elDate.value,limit:1});
        store(h,pin); hideLogin(); load();
      }catch(err){elErr.textContent=err.status===401||err.status===403?'เลขบ้าน/PIN ไม่ถูกต้อง หรือไม่มีสิทธิ์กรรมการ':'เชื่อมต่อไม่ได้: '+err.message; elErr.classList.add('show');}
      finally{elLogin.disabled=false; elLogin.textContent='เข้าสู่ระบบ';}
    }

    async function del(id){
      if(!id) return;
      var s=session(); if(!s){showLogin(); return;}
      if(!confirm('ลบรายการนี้ถาวร? รูปทั้งหมดจะถูกลบด้วย')) return;
      var btn=elList.querySelector('.mini-btn[data-del="'+id+'"]');
      if(btn){btn.disabled=true; btn.textContent='กำลังลบ…';}
      try{
        await call({action:'delete',houseNo:s.houseNo,pin:s.pin,recordId:id});
        load();
      }catch(err){
        if(err.status===401||err.status===403){localStorage.removeItem(KEY); showLogin('หมดสิทธิ์ กรุณาเข้าสู่ระบบใหม่'); return;}
        if(btn){btn.disabled=false; btn.textContent='ลบ';}
        alert('ลบไม่สำเร็จ: '+err.message);
      }
    }

    function openEdit(id){
      var r=currentRecords.find(function(x){return x.id===id;});
      if(!r) return;
      editingId=id;
      var o=r.ocr||{}, vc=r.vehicleCapture||{};
      elEditErr.classList.remove('show');
      elEditHouse.value=r.houseNo||'';
      elEditPurposeCategory.value=r.purposeCategory||'other';
      elEditPurposeText.value=r.purposeText||'';
      elEditName.value=personName(o);
      elEditDocNo.value=docRaw(o);
      elEditPlate.value=vc.plateText||'';
      elEditVehicleType.value=vehicleTypeLabel(vc.vehicleType);
      elEditOverlay.classList.add('open');
      setTimeout(function(){elEditPurposeText.focus();},80);
    }
    function closeEdit(){
      editingId='';
      elEditOverlay.classList.remove('open');
      elEditErr.classList.remove('show');
    }
    function openPreview(url,title){
      if(!url) return;
      elPreviewImg.src=url;
      elPreviewTitle.textContent=title||'Photo preview';
      elPreviewOverlay.classList.add('open');
    }
    function closePreview(){
      elPreviewOverlay.classList.remove('open');
      elPreviewImg.removeAttribute('src');
    }
    async function saveEdit(){
      var s=session(); if(!s){closeEdit(); showLogin(); return;}
      if(!editingId) return;
      elEditErr.classList.remove('show');
      elEditSave.disabled=true; elEditSave.textContent='Saving…';
      try{
        await call({action:'update',houseNo:s.houseNo,pin:s.pin,recordId:editingId,record:{
          houseNo:elEditHouse.value,
          purposeCategory:elEditPurposeCategory.value,
          purposeText:elEditPurposeText.value,
          personName:elEditName.value,
          documentNumber:elEditDocNo.value,
          plateText:elEditPlate.value,
          vehicleType:elEditVehicleType.value
        }});
        closeEdit();
        load();
      }catch(err){
        if(err.status===401||err.status===403){localStorage.removeItem(KEY); closeEdit(); showLogin('หมดสิทธิ์ กรุณาเข้าสู่ระบบใหม่'); return;}
        elEditErr.textContent='Save failed: '+err.message;
        elEditErr.classList.add('show');
      }finally{
        elEditSave.disabled=false; elEditSave.textContent='Save';
      }
    }

    var elBulk=document.getElementById('bulkbar'), elBulkCount=document.getElementById('bulkcount'),
      elBulkClear=document.getElementById('bulkclear'), elBulkDel=document.getElementById('bulkdel');

    function selectedIds(){return Array.prototype.map.call(elList.querySelectorAll('.sel:checked'),function(c){return c.getAttribute('data-sel');}).filter(Boolean);}
    function refreshBulk(){var n=elList.querySelectorAll('.sel:checked').length; elBulkCount.textContent=n; elBulk.classList.toggle('show',n>0);}

    elList.addEventListener('click',function(e){
      if(e.target.closest('.sel')) return; // checkbox handles its own toggle
      var previewBtn=e.target.closest('[data-preview]');
      if(previewBtn){e.stopPropagation(); openPreview(previewBtn.getAttribute('data-preview'),previewBtn.getAttribute('data-preview-title')); return;}
      var editBtn=e.target.closest('[data-edit]');
      if(editBtn){e.stopPropagation(); openEdit(editBtn.getAttribute('data-edit')); return;}
      var delBtn=e.target.closest('[data-del]');
      if(delBtn){e.stopPropagation(); del(delBtn.getAttribute('data-del')); return;}
      var head=e.target.closest('.card-head');
      if(head){var card=head.closest('.card'); if(card) card.classList.toggle('collapsed');}
    });
    elList.addEventListener('change',function(e){
      var cb=e.target.closest('.sel'); if(!cb) return;
      var card=cb.closest('.card'); if(card) card.classList.toggle('selected',cb.checked);
      refreshBulk();
    });
    elBulkClear.addEventListener('click',function(){
      Array.prototype.forEach.call(elList.querySelectorAll('.sel:checked'),function(c){c.checked=false; var card=c.closest('.card'); if(card) card.classList.remove('selected');});
      refreshBulk();
    });
    elBulkDel.addEventListener('click',async function(){
      var ids=selectedIds(); if(!ids.length) return;
      var s=session(); if(!s){showLogin(); return;}
      if(!confirm('ลบ '+ids.length+' รายการถาวร? รูปทั้งหมดจะถูกลบด้วย')) return;
      elBulkDel.disabled=true; elBulkDel.textContent='กำลังลบ…';
      try{
        await call({action:'delete',houseNo:s.houseNo,pin:s.pin,recordIds:ids});
        load();
      }catch(err){
        if(err.status===401||err.status===403){localStorage.removeItem(KEY); showLogin('หมดสิทธิ์ กรุณาเข้าสู่ระบบใหม่'); return;}
        alert('ลบไม่สำเร็จ: '+err.message);
      }finally{elBulkDel.disabled=false; elBulkDel.textContent='ลบที่เลือก';}
    });

    function syncNav(){ elNext.disabled = !elDate.value || elDate.value>=today(); syncDaycap(); }
    function shiftDate(delta){
      var base=elDate.value||today(); var d=new Date(base+'T00:00:00');
      d.setDate(d.getDate()+delta);
      var v=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(v>today()) v=today();
      elDate.value=v; syncNav(); load();
    }

    function setCollapsedAll(collapsed){
      Array.prototype.forEach.call(elList.querySelectorAll('.card'),function(card){
        card.classList.toggle('collapsed',collapsed);
      });
    }

    elDate.value=today(); elDate.max=today(); syncNav();
    elReload.addEventListener('click',load);
    elDate.addEventListener('change',function(){syncNav(); load();});
    elPrev.addEventListener('click',function(){shiftDate(-1);});
    elNext.addEventListener('click',function(){shiftDate(1);});
    elExpandAll.addEventListener('click',function(){setCollapsedAll(false);});
    elCollapseAll.addEventListener('click',function(){setCollapsedAll(true);});
    elEditCancel.addEventListener('click',closeEdit);
    elEditSave.addEventListener('click',saveEdit);
    elEditOverlay.addEventListener('click',function(e){if(e.target===elEditOverlay) closeEdit();});
    elPreviewClose.addEventListener('click',closePreview);
    elPreviewOverlay.addEventListener('click',function(e){if(e.target===elPreviewOverlay) closePreview();});
    document.addEventListener('keydown',function(e){
      if(e.key==='Escape'){
        if(elPreviewOverlay.classList.contains('open')) closePreview();
        else if(elEditOverlay.classList.contains('open')) closeEdit();
      }
    });
    elLogin.addEventListener('click',login);
    elHouse.addEventListener('keydown',function(e){if(e.key==='Enter') elPin.focus();});
    elPin.addEventListener('keydown',function(e){if(e.key==='Enter') login();});
    load();
  })();
  </script>
</body>
</html>
