<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>รายการผู้มาติดต่อ · Pattra Villa 8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#f9f3e9; --card:#ffffff; --card-soft:#f3ecdd; --line:#e6dcc7;
      --line-soft:#efe8d6; --text:#2a2218; --muted:#6b5d4a;
      --soft:#8a7960; --green:#3f6431; --green-bg:#e8efd9;
      --amber:#c47a2c; --amber-text:#9a5c1f; --amber-deep:#855015;
      --amber-bg:#f7e6cd; --red:#86341e; --red-bg:#f7dfd5;
      --blue:#235a7d; --blue-bg:#e4eff5;
      --shadow:0 1px 2px rgba(60,40,20,.04), 0 8px 24px rgba(60,40,20,.07);
      --radius:16px;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { margin:0; padding:0; }
    body {
      min-height:100dvh; background:linear-gradient(180deg,#f8f3e9 0%,var(--bg) 42%);
      color:var(--text); font-family:"IBM Plex Sans Thai", system-ui, sans-serif;
      padding:0 0 70px;
    }
    .wrap { width:100%; max-width:760px; margin:0 auto; padding:0 14px; }
    /* ── Canonical Pattra Villa 8 header (matches pattra8.com) ── */
    .site-header {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      background:var(--bg); border-bottom:1px solid var(--line);
      padding:0 24px; height:68px; position:sticky; top:0; z-index:100;
    }
    .brand { display:flex; flex-direction:column; text-decoration:none; }
    .brand-mark {
      font-family:"Cormorant Garamond", serif; font-weight:700; font-size:21px;
      color:var(--text); letter-spacing:.2em;
    }
    .brand-sub {
      font-size:10px; color:var(--muted); letter-spacing:.18em;
      text-transform:uppercase; margin-top:1px;
    }
    .header-actions { display:flex; align-items:center; gap:10px; }
    .identity-pill {
      display:flex; align-items:center; gap:8px; cursor:pointer;
      background:var(--amber-bg); border:1px solid #d4913f; border-radius:99px;
      padding:4px 14px 4px 6px; white-space:nowrap;
    }
    .pill-avatar {
      width:28px; height:28px; border-radius:50%; flex-shrink:0;
      background:var(--amber); color:#fff; display:flex; align-items:center;
      justify-content:center; font-size:.8rem; font-weight:800;
    }
    .pill-house { font-size:.8rem; font-weight:700; color:var(--text); line-height:1.2; }
    .pill-name { font-size:.72rem; color:var(--muted); line-height:1.2; }
    .hero { text-align:center; margin:24px 0 6px; }
    .ornament { display:none; }
    h1 { margin:3px 0 4px; font-size:30px; line-height:1.1; letter-spacing:-.03em; }
    .sub { margin:0 auto; color:var(--muted); font-size:14px; line-height:1.55; max-width:560px; }
    .toolbar { display:flex; gap:10px; align-items:center; margin:16px 0 14px; }
    .navbtn {
      flex:0 0 auto; border:1.5px solid var(--line); border-radius:14px;
      background:var(--card); color:var(--amber-text); width:46px; height:46px;
      font:inherit; font-size:22px; font-weight:700; line-height:1; cursor:pointer;
      box-shadow:var(--shadow);
    }
    .navbtn:disabled { opacity:.4; cursor:default; }
    .datebox {
      position:relative; flex:1; min-width:0; height:48px;
      border:1.5px solid var(--line); border-radius:14px;
      background:var(--card); box-shadow:var(--shadow);
    }
    .datebox:focus-within {
      border-color:#0b6bd3;
      box-shadow:0 0 0 2px rgba(11,107,211,.14), var(--shadow);
    }
    .date-display {
      position:absolute; left:14px; right:54px; top:50%; transform:translateY(-50%);
      color:var(--text); font-size:16px; font-weight:800; pointer-events:none; z-index:1;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .date-icon {
      position:absolute; right:15px; top:50%; transform:translateY(-50%);
      width:20px; height:20px; pointer-events:none; z-index:1;
    }
    .date-icon::before {
      content:""; position:absolute; inset:3px 2px 2px; border:2px solid #17130f;
      border-radius:4px; background:transparent;
    }
    .date-icon::after {
      content:""; position:absolute; left:5px; right:5px; top:7px;
      border-top:2px solid #17130f; box-shadow:0 -5px 0 -1px #17130f;
    }
    input[type=date] {
      position:absolute; inset:0; width:100%; height:100%; border:0; border-radius:14px;
      background:transparent; color:transparent; padding:0 12px; font:inherit;
      font-size:16px; font-weight:700; opacity:.01; cursor:pointer; z-index:2;
      appearance:none; -webkit-appearance:none;
    }
    input[type=date]:focus { outline:0; }
    input[type=date]::-webkit-datetime-edit { color:transparent; opacity:0; }
    input[type=date]::-webkit-datetime-edit-fields-wrapper { opacity:0; }
    input[type=date]::-webkit-calendar-picker-indicator { opacity:1; cursor:pointer; }
    .btn {
      border:0; border-radius:14px; background:var(--amber); color:#fff;
      padding:13px 17px; font:inherit; font-weight:700; cursor:pointer;
      box-shadow:0 8px 22px rgba(196,122,44,.20); white-space:nowrap;
    }
    .btn:disabled { opacity:.55; cursor:default; }
    .view-actions { display:flex; gap:8px; margin:-4px 0 12px; }
    .view-btn {
      border:1px solid var(--line); border-radius:12px; background:var(--card);
      color:var(--amber-text); padding:9px 13px; font:inherit; font-size:13px;
      font-weight:800; cursor:pointer; box-shadow:var(--shadow);
    }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:14px 0; }
    .stat { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:13px 10px; box-shadow:var(--shadow); }
    .stat .n { font-size:26px; line-height:1; font-weight:800; }
    .stat .l { margin-top:5px; color:var(--muted); font-size:12.5px; }
    .ok .n { color:var(--green); } .pending .n { color:var(--amber-text); } .plate .n { color:var(--blue); }
    .list { display:grid; gap:12px; margin-top:14px; }
    .card {
      background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
      box-shadow:var(--shadow); overflow:hidden;
    }
    .card-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:15px 16px 12px; border-bottom:1px solid var(--line-soft); cursor:pointer; user-select:none; }
    .ch-side { display:flex; flex-direction:column; align-items:flex-end; gap:8px; flex-shrink:0; }
    .ch-actions { display:flex; align-items:center; gap:8px; }
    .chevron { font-size:17px; color:var(--soft); line-height:1; transition:transform .2s; }
    .card.collapsed .chevron { transform:rotate(-90deg); }
    .card.collapsed .body { display:none; }
    .card.collapsed .card-head { border-bottom:0; }
    .del-btn { border:1px solid var(--line); background:var(--card); color:var(--red); border-radius:9px; padding:3px 10px; font:inherit; font-size:12.5px; font-weight:700; cursor:pointer; }
    .del-btn:hover { background:var(--red-bg); border-color:#efc5bf; }
    .del-btn:disabled { opacity:.5; cursor:default; }
    .sel { width:19px; height:19px; margin:2px 2px 0 0; accent-color:var(--amber); cursor:pointer; flex-shrink:0; }
    .ch-main { flex:1; min-width:0; }
    .title-row { display:flex; align-items:center; gap:10px; min-width:0; }
    .runno {
      flex:0 0 auto; min-width:32px; height:32px; border-radius:10px;
      display:inline-flex; align-items:center; justify-content:center;
      background:var(--card-soft); border:1px solid var(--line-soft);
      color:var(--amber-text); font-family:"IBM Plex Mono", monospace;
      font-size:14px; font-weight:800;
    }
    .card.selected { outline:2px solid var(--amber); outline-offset:-2px; }
    .bulkbar { position:fixed; left:50%; transform:translateX(-50%); bottom:16px; z-index:30;
      display:none; align-items:center; gap:14px; background:var(--card); border:1px solid var(--line);
      box-shadow:0 10px 30px rgba(55,40,20,.18); border-radius:14px; padding:10px 10px 10px 16px; }
    .bulkbar.show { display:flex; }
    .bulkbar .n { font-weight:800; font-size:14px; }
    .bulk-btn { border:0; border-radius:10px; padding:9px 15px; font:inherit; font-weight:700; cursor:pointer; }
    .bulk-btn.danger { background:var(--red); color:#fff; }
    .bulk-btn.ghost { background:transparent; color:var(--muted); }
    .bulk-btn:disabled { opacity:.55; cursor:default; }
    .house { font-size:22px; font-weight:800; line-height:1.1; }
    .purpose { margin-top:3px; color:var(--muted); font-size:14px; }
    .time { color:var(--soft); font-size:13px; white-space:nowrap; text-align:right; }
    .badge { display:inline-flex; align-items:center; gap:5px; border-radius:999px; padding:3px 9px; font-size:12px; font-weight:700; margin-top:7px; }
    .badge.complete { color:var(--green); background:var(--green-bg); }
    .badge.pending_text, .badge.pending_image, .badge.unknown { color:var(--amber-deep); background:var(--amber-bg); }
    .body { padding:14px 16px 16px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .info { background:var(--card-soft); border:1px solid var(--line-soft); border-radius:14px; padding:11px 12px; min-height:78px; }
    .info.wide { grid-column:1/-1; }
    .label { color:var(--soft); font-size:12px; font-weight:700; letter-spacing:.02em; }
    .value { margin-top:5px; font-size:14.5px; line-height:1.45; }
    .rawtext { white-space:pre-wrap; }
    .mono { font-family:"IBM Plex Mono", monospace; font-weight:700; letter-spacing:.02em; }
    .gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(135px,1fr)); gap:10px; margin-top:12px; }
    .thumb { border:1px solid var(--line); border-radius:14px; overflow:hidden; background:var(--card-soft); }
    .thumb a { display:block; color:inherit; text-decoration:none; }
    .thumb img { display:block; width:100%; aspect-ratio:4/3; object-fit:cover; background:#eee; }
    .cap { padding:8px 9px 9px; font-size:12px; color:var(--muted); line-height:1.35; }
    .empty, .note {
      text-align:center; color:var(--muted); background:var(--card); border:1px solid var(--line);
      border-radius:var(--radius); padding:26px 18px; box-shadow:var(--shadow); line-height:1.55;
    }
    .note.err { color:var(--red); background:var(--red-bg); border-color:#efc5bf; }
    .loading { color:var(--muted); text-align:center; padding:34px 0; }
    .spinner { display:inline-block; width:18px; height:18px; margin-right:8px; vertical-align:-4px; border:2.5px solid rgba(196,122,44,.22); border-top-color:var(--amber); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .overlay { position:fixed; inset:0; background:rgba(35,26,16,.48); display:none; align-items:center; justify-content:center; padding:20px; z-index:20; }
    .overlay.open { display:flex; }
    .modal { width:100%; max-width:370px; background:var(--card); border-radius:22px; padding:25px 22px; box-shadow:var(--shadow); }
    .modal h2 { margin:0 0 5px; font-size:21px; }
    .modal p { margin:0 0 17px; color:var(--muted); font-size:13.5px; line-height:1.5; }
    .field { margin:13px 0; }
    .field label { display:block; margin-bottom:6px; color:var(--soft); font-size:12.5px; font-weight:700; }
    .row { display:flex; border:1.5px solid var(--line); border-radius:13px; overflow:hidden; background:#fff; }
    .prefix { display:flex; align-items:center; padding:0 12px; background:var(--card-soft); color:var(--muted); font-weight:800; }
    .row input, .pin { width:100%; border:0; outline:0; background:transparent; padding:12px; font:inherit; font-size:17px; font-weight:700; }
    .pin { border:1.5px solid var(--line); border-radius:13px; letter-spacing:.28em; font-family:"IBM Plex Mono", monospace; }
    .merr { display:none; color:var(--red); background:var(--red-bg); border-radius:11px; padding:10px 12px; font-size:13px; margin-bottom:10px; }
    .merr.show { display:block; }
    footer { text-align:center; color:var(--soft); font-size:12px; margin-top:28px; }
    @media (max-width:620px) {
      h1 { font-size:27px; }
      .stats { grid-template-columns:repeat(2,1fr); }
      .grid { grid-template-columns:1fr; }
      .toolbar { align-items:stretch; gap:8px; }
      .btn { padding-left:14px; padding-right:14px; }
      .view-actions { display:grid; grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <div class="brand-mark">Pattra Villa 8</div>
      <div class="brand-sub">Resident Services</div>
    </a>
    <div class="header-actions"><div id="headerIdentity"></div></div>
  </header>
  <div class="wrap">
    <section class="hero">
      <div class="ornament"><span class="o-line"></span><span class="o-diamond"></span><span class="o-line r"></span></div>
      <h1>รายการผู้มาติดต่อ</h1>
      <p class="sub">ดูข้อมูลที่ รปภ. ส่งเข้า LINE: บ้านที่ติดต่อ เหตุผล รูปเอกสาร รูปรถ และทะเบียน</p>
    </section>
    <div class="toolbar">
      <button id="prev" class="navbtn" aria-label="วันก่อนหน้า">‹</button>
      <div class="datebox">
        <input id="date" type="date" aria-label="วันที่" />
        <div id="dateDisplay" class="date-display"></div>
        <span class="date-icon" aria-hidden="true"></span>
      </div>
      <button id="next" class="navbtn" aria-label="วันถัดไป">›</button>
      <button id="reload" class="btn">โหลด</button>
    </div>
    <div class="view-actions">
      <button id="expandAll" class="view-btn">แสดงทั้งหมด</button>
      <button id="collapseAll" class="view-btn">ย่อทั้งหมด</button>
    </div>
    <div id="stats" class="stats" style="display:none"></div>
    <main id="list"></main>
    <div id="bulkbar" class="bulkbar">
      <span class="n"><span id="bulkcount">0</span> รายการ</span>
      <button id="bulkclear" class="bulk-btn ghost">ล้าง</button>
      <button id="bulkdel" class="bulk-btn danger">ลบที่เลือก</button>
    </div>
    <footer>เฉพาะกรรมการ</footer>
  </div>

  <div id="overlay" class="overlay">
    <div class="modal">
      <h2>เข้าสู่ระบบกรรมการ</h2>
      <p>ใช้บ้านเลขที่และ PIN ของกรรมการ เพื่อดูรายการผู้มาติดต่อ</p>
      <div id="merr" class="merr"></div>
      <div class="field">
        <label>บ้านเลขที่</label>
        <div class="row"><span class="prefix">38/</span><input id="house" inputmode="numeric" autocomplete="off" placeholder="8" /></div>
      </div>
      <div class="field">
        <label>PIN 6 หลัก</label>
        <input id="pin" class="pin" type="password" inputmode="numeric" maxlength="6" autocomplete="off" placeholder="••••••" />
      </div>
      <button id="login" class="btn" style="width:100%">เข้าสู่ระบบ</button>
    </div>
  </div>

  <script>
  (function(){
    'use strict';
    var API='https://asia-southeast1-pattra8-54c3f.cloudfunctions.net/visitorIntakeAdmin';
    var KEY='pattra_visitor_intake_session_v1';
    var TTL=30*24*60*60*1000;
    var elDate=document.getElementById('date'), elReload=document.getElementById('reload'),
      elPrev=document.getElementById('prev'), elNext=document.getElementById('next'),
      elDateDisplay=document.getElementById('dateDisplay'),
      elExpandAll=document.getElementById('expandAll'), elCollapseAll=document.getElementById('collapseAll'),
      elStats=document.getElementById('stats'), elList=document.getElementById('list'),
      elOverlay=document.getElementById('overlay'), elHouse=document.getElementById('house'),
      elPin=document.getElementById('pin'), elLogin=document.getElementById('login'),
      elErr=document.getElementById('merr'), elIdentity=document.getElementById('headerIdentity');

    function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
    function residentName(houseNo){try{var r=JSON.parse(localStorage.getItem('pattra_resident_session_v1')||'null'); if(r&&r.houseNo===houseNo&&r.residentName) return r.residentName;}catch(e){} return '';}
    function renderIdentity(s){
      if(!s){elIdentity.innerHTML=''; return;}
      var name=residentName(s.houseNo);
      var initial=((name||s.houseNo||'').match(/[\dA-Za-z฀-๿]/)||['P'])[0].toUpperCase();
      elIdentity.innerHTML='<div class="identity-pill" id="idPill" title="ออกจากระบบ">'+
        '<div class="pill-avatar">'+esc(initial)+'</div><div>'+
        '<div class="pill-house">บ้าน '+esc(s.houseNo)+'</div>'+
        '<div class="pill-name">'+esc(name||'กรรมการ')+'</div></div></div>';
      var p=document.getElementById('idPill');
      if(p) p.addEventListener('click',function(){localStorage.removeItem(KEY); renderIdentity(null); showLogin();});
    }
    function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
    function session(){try{var s=JSON.parse(localStorage.getItem(KEY)||'null'); if(!s||s.expiresAt<Date.now()) return null; return s;}catch(e){return null;}}
    function store(h,p){localStorage.setItem(KEY,JSON.stringify({houseNo:h,pin:p,expiresAt:Date.now()+TTL}));}
    function showLogin(msg){elOverlay.classList.add('open'); renderIdentity(null); if(msg){elErr.textContent=msg; elErr.classList.add('show');} setTimeout(function(){elHouse.focus();},80);}
    function hideLogin(){elOverlay.classList.remove('open'); elErr.classList.remove('show');}
    function fmtTs(ts){try{var ms=ts&&ts._seconds?ts._seconds*1000:(ts&&ts.seconds?ts.seconds*1000:0); if(!ms) return ''; return new Date(ms).toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short',timeZone:'Asia/Bangkok'});}catch(e){return '';}}
    function fmtDate(v){try{var parts=String(v||'').split('-'); if(parts.length!==3) return ''; var d=new Date(Number(parts[0]),Number(parts[1])-1,Number(parts[2])); return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});}catch(e){return v||'';}}
    function syncDateDisplay(){elDateDisplay.textContent=fmtDate(elDate.value);}
    function statusLabel(s){return s==='complete'?'ครบแล้ว':s==='pending_text'?'รอข้อความ':s==='pending_image'?'รอรูป':'รอตรวจ';}
    function categoryLabel(s){return {food_delivery:'ส่งอาหาร',delivery:'ส่งพัสดุ/ขนส่ง',pickup:'รับ-ส่ง',contractor:'ช่าง/ซ่อมบำรุง',utility:'หน่วยงานสาธารณูปโภค',office:'ติดต่อนิติ',contact:'มาติดต่อ',guest:'มาหาลูกบ้าน',other:'อื่น ๆ',unknown:'ไม่ทราบ'}[s]||s||'ไม่ทราบ';}
    function imageKind(k){return k==='document'?'เอกสาร':k==='vehicle'?'รถ/ทะเบียน':'อื่น ๆ';}
    function normalizeProvince(v){return String(v||'').replace(/กรุงเทพมหานคร/g,'กรุงเทพ');}
    function plateText(v){
      var clean=normalizeProvince(v).replace(/\s+/g,'').replace(/จังหวัด/g,'').trim();
      var provinces=[
        'กรุงเทพมหานคร','กรุงเทพ','กระบี่','กาญจนบุรี','กาฬสินธุ์','กำแพงเพชร','ขอนแก่น','จันทบุรี','ฉะเชิงเทรา','ชลบุรี',
        'ชัยนาท','ชัยภูมิ','ชุมพร','เชียงราย','เชียงใหม่','ตรัง','ตราด','ตาก','นครนายก','นครปฐม','นครพนม','นครราชสีมา',
        'นครศรีธรรมราช','นครสวรรค์','นนทบุรี','นราธิวาส','น่าน','บึงกาฬ','บุรีรัมย์','ปทุมธานี','ประจวบคีรีขันธ์',
        'ปราจีนบุรี','ปัตตานี','พระนครศรีอยุธยา','พะเยา','พังงา','พัทลุง','พิจิตร','พิษณุโลก','เพชรบุรี','เพชรบูรณ์',
        'แพร่','ภูเก็ต','มหาสารคาม','มุกดาหาร','แม่ฮ่องสอน','ยโสธร','ยะลา','ร้อยเอ็ด','ระนอง','ระยอง','ราชบุรี',
        'ลพบุรี','ลำปาง','ลำพูน','เลย','ศรีสะเกษ','สกลนคร','สงขลา','สตูล','สมุทรปราการ','สมุทรสงคราม','สมุทรสาคร',
        'สระแก้ว','สระบุรี','สิงห์บุรี','สุโขทัย','สุพรรณบุรี','สุราษฎร์ธานี','สุรินทร์','หนองคาย','หนองบัวลำภู',
        'อ่างทอง','อำนาจเจริญ','อุดรธานี','อุตรดิตถ์','อุทัยธานี','อุบลราชธานี'
      ];
      var prov='';
      provinces.sort(function(a,b){return b.length-a.length;}).some(function(p){if(clean.indexOf(p)>-1){prov=p; clean=clean.replace(p,''); return true;} return false;});
      prov=normalizeProvince(prov);
      var m=clean.match(/^([0-9]?[ก-ฮ]{1,3})([0-9]{1,4})$/);
      return m?[m[1],m[2],prov].filter(Boolean).join(' '):[clean,prov].filter(Boolean).join(' ');
    }
    function vehicleTypeLabel(v){
      var s=String(v||'').trim().toLowerCase();
      if(!s||s==='unknown') return '—';
      if(/ขยะ|garbage|trash|waste|refuse/.test(s)) return 'รถขยะ';
      if(/motor|มอเตอร์|มอเตอ|จักรยานยนต์|scooter|bike/.test(s)) return 'รถมอเตอร์ไซค์';
      if(/truck|บรรทุก|lorry|สิบล้อ|หกล้อ/.test(s)) return 'รถบรรทุก';
      if(/car|sedan|suv|van|pickup|รถยนต์|รถเก๋ง|รถตู้|กระบะ/.test(s)) return 'รถยนต์';
      return s;
    }
    function personName(o){return (o&&((/[ก-๙]/.test(o.personName||'')&&o.personName)||o.thaiPersonName||o.personName||o.englishPersonName))||'';}
    function maskDocNo(v){var d=String(v||'').replace(/\D/g,''); return d.length>=4?'*'.repeat(Math.max(4,d.length-4))+d.slice(-4):'';}
    function docNo(o){return (o&&(o.maskedDocumentNo||maskDocNo(o.documentNumber)))||'';}
    function purposeDisplay(r){
      var c=String(r.purposeCategory||'unknown');
      if(c==='other'||c==='unknown') return r.purposeText||categoryLabel(c);
      return categoryLabel(c);
    }

    async function call(body){
      var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',body:JSON.stringify(body)});
      var data=await res.json().catch(function(){return {};});
      if(!res.ok||!data.ok) throw Object.assign(new Error(data.error||('HTTP '+res.status)),{status:res.status});
      return data;
    }

    function renderStats(st){
      elStats.style.display='grid';
      elStats.innerHTML=
        '<div class="stat"><div class="n">'+(st.total||0)+'</div><div class="l">รายการทั้งหมด</div></div>'+
        '<div class="stat ok"><div class="n">'+(st.complete||0)+'</div><div class="l">ข้อมูลครบ</div></div>'+
        '<div class="stat pending"><div class="n">'+(st.pending||0)+'</div><div class="l">รอข้อมูล</div></div>'+
        '<div class="stat plate"><div class="n">'+(st.withVehiclePlate||0)+'</div><div class="l">อ่านทะเบียนได้</div></div>';
    }

    function render(records){
      if(!records.length){elList.innerHTML='<div class="empty">ยังไม่มีรายการผู้มาติดต่อในวันนี้</div>'; refreshBulk(); return;}
      elList.innerHTML='<div class="list">'+records.map(function(r,i){
        var o=r.ocr||{}, vc=r.vehicleCapture||{}, imgs=r.images||[];
        var raw=(r.rawTexts||[]).map(function(t){return t.text;}).filter(Boolean).join('\n');
        var rawHtml=esc(raw||'—');
        var plate=vc.plateText?plateText(vc.plateText):'';
        var vtype=vehicleTypeLabel(vc.vehicleType);
        var name=personName(o);
        var documentNo=docNo(o);
        var purpose=purposeDisplay(r);
        return '<article class="card" data-id="'+esc(r.id||'')+'">'+
          '<div class="card-head"><input type="checkbox" class="sel" data-sel="'+esc(r.id||'')+'" title="เลือก" />'+
            '<div class="ch-main"><div class="title-row"><span class="runno">'+esc(i+1)+'</span><div class="house">'+esc(r.houseNo||'ไม่พบบ้าน')+'</div></div>'+
            '<div class="purpose">'+esc(purpose||'ไม่พบเหตุผล')+'</div>'+
            '<span class="badge '+esc(r.status||'unknown')+'">'+esc(statusLabel(r.status))+'</span></div>'+
            '<div class="ch-side"><div class="time">'+esc(fmtTs(r.createdAt))+'</div>'+
            '<div class="ch-actions"><button class="del-btn" data-del="'+esc(r.id||'')+'" title="ลบรายการนี้">ลบ</button>'+
            '<span class="chevron">⌄</span></div></div></div>'+
          '<div class="body"><div class="grid">'+
            '<div class="info"><div class="label">ชื่อ</div><div class="value">'+
              (name?esc(name):'—')+
            '</div></div>'+
            '<div class="info"><div class="label">เลขบัตร/ใบขับขี่</div><div class="value">'+
              (documentNo?'<span class="mono">'+esc(documentNo)+'</span>':'—')+
            '</div></div>'+
            '<div class="info"><div class="label">เลขทะเบียน</div><div class="value">'+
              (plate?'<span class="mono">'+esc(plate)+'</span>':'—')+
            '</div></div>'+
            '<div class="info"><div class="label">ประเภทพาหนะ</div><div class="value">'+
              esc(vtype)+
            '</div></div>'+
            '<div class="info"><div class="label">เหตุผลการเข้าหมู่บ้าน</div><div class="value">'+
              esc(purpose||'—')+
            '</div></div>'+
            '<div class="info wide"><div class="label">ข้อความ รปภ</div><div class="value rawtext">'+rawHtml+'</div></div>'+
          '</div>'+
          '<div class="gallery">'+(imgs.length?imgs.map(function(img){
            var meta=img.analysis||{};
            var sub=[imageKind(img.kind), meta.vehiclePlate?plateText(meta.vehiclePlate):'', meta.personName||''].filter(Boolean).join(' · ');
            var media=img.imageUrl?'<a href="'+esc(img.imageUrl)+'" target="_blank" rel="noopener"><img src="'+esc(img.imageUrl)+'" loading="lazy" alt="'+esc(imageKind(img.kind))+'"></a>':'<div class="empty" style="box-shadow:none;border:0;border-radius:0;padding:22px 8px">ลบรูปแล้ว</div>';
            return '<div class="thumb">'+media+'<div class="cap">'+esc(sub||imageKind(img.kind))+'</div></div>';
          }).join(''):'<div class="empty" style="box-shadow:none;grid-column:1/-1">ยังไม่มีรูป</div>')+'</div>'+
          '</div></article>';
      }).join('')+'</div>';
      refreshBulk();
    }

    async function load(){
      var s=session(); if(!s){showLogin(); return;}
      elReload.disabled=true; elList.innerHTML='<div class="loading"><span class="spinner"></span>กำลังโหลดรายการผู้มาติดต่อ…</div>';
      try{
        var data=await call({action:'list',houseNo:s.houseNo,pin:s.pin,visitDate:elDate.value});
        renderIdentity(s); renderStats(data.stats||{}); render(data.records||[]);
      }catch(err){
        if(err.status===401||err.status===403){localStorage.removeItem(KEY); showLogin('เลขบ้าน/PIN ไม่ถูกต้อง หรือไม่มีสิทธิ์กรรมการ'); elList.innerHTML=''; return;}
        elList.innerHTML='<div class="note err">โหลดข้อมูลไม่สำเร็จ<br><small>'+esc(err.message)+'</small></div>';
      }finally{elReload.disabled=false;}
    }

    async function login(){
      var suffix=(elHouse.value||'').trim(), pin=(elPin.value||'').trim();
      elErr.classList.remove('show');
      if(!/^\d{1,2}$/.test(suffix)){elErr.textContent='กรอกเลขบ้านให้ถูกต้อง'; elErr.classList.add('show'); return;}
      if(pin.length!==6){elErr.textContent='PIN ต้องมี 6 หลัก'; elErr.classList.add('show'); return;}
      elLogin.disabled=true; elLogin.textContent='กำลังตรวจสอบ…';
      try{
        var h='38/'+suffix;
        await call({action:'list',houseNo:h,pin:pin,visitDate:elDate.value,limit:1});
        store(h,pin); hideLogin(); load();
      }catch(err){elErr.textContent=err.status===401||err.status===403?'เลขบ้าน/PIN ไม่ถูกต้อง หรือไม่มีสิทธิ์กรรมการ':'เชื่อมต่อไม่ได้: '+err.message; elErr.classList.add('show');}
      finally{elLogin.disabled=false; elLogin.textContent='เข้าสู่ระบบ';}
    }

    async function del(id){
      if(!id) return;
      var s=session(); if(!s){showLogin(); return;}
      if(!confirm('ลบรายการนี้ถาวร? รูปทั้งหมดจะถูกลบด้วย')) return;
      var btn=elList.querySelector('.del-btn[data-del="'+id+'"]');
      if(btn){btn.disabled=true; btn.textContent='กำลังลบ…';}
      try{
        await call({action:'delete',houseNo:s.houseNo,pin:s.pin,recordId:id});
        load();
      }catch(err){
        if(err.status===401||err.status===403){localStorage.removeItem(KEY); showLogin('หมดสิทธิ์ กรุณาเข้าสู่ระบบใหม่'); return;}
        if(btn){btn.disabled=false; btn.textContent='ลบ';}
        alert('ลบไม่สำเร็จ: '+err.message);
      }
    }

    var elBulk=document.getElementById('bulkbar'), elBulkCount=document.getElementById('bulkcount'),
      elBulkClear=document.getElementById('bulkclear'), elBulkDel=document.getElementById('bulkdel');

    function selectedIds(){return Array.prototype.map.call(elList.querySelectorAll('.sel:checked'),function(c){return c.getAttribute('data-sel');}).filter(Boolean);}
    function refreshBulk(){var n=elList.querySelectorAll('.sel:checked').length; elBulkCount.textContent=n; elBulk.classList.toggle('show',n>0);}

    elList.addEventListener('click',function(e){
      if(e.target.closest('.sel')) return; // checkbox handles its own toggle
      var delBtn=e.target.closest('.del-btn');
      if(delBtn){e.stopPropagation(); del(delBtn.getAttribute('data-del')); return;}
      var head=e.target.closest('.card-head');
      if(head){var card=head.closest('.card'); if(card) card.classList.toggle('collapsed');}
    });
    elList.addEventListener('change',function(e){
      var cb=e.target.closest('.sel'); if(!cb) return;
      var card=cb.closest('.card'); if(card) card.classList.toggle('selected',cb.checked);
      refreshBulk();
    });
    elBulkClear.addEventListener('click',function(){
      Array.prototype.forEach.call(elList.querySelectorAll('.sel:checked'),function(c){c.checked=false; var card=c.closest('.card'); if(card) card.classList.remove('selected');});
      refreshBulk();
    });
    elBulkDel.addEventListener('click',async function(){
      var ids=selectedIds(); if(!ids.length) return;
      var s=session(); if(!s){showLogin(); return;}
      if(!confirm('ลบ '+ids.length+' รายการถาวร? รูปทั้งหมดจะถูกลบด้วย')) return;
      elBulkDel.disabled=true; elBulkDel.textContent='กำลังลบ…';
      try{
        await call({action:'delete',houseNo:s.houseNo,pin:s.pin,recordIds:ids});
        load();
      }catch(err){
        if(err.status===401||err.status===403){localStorage.removeItem(KEY); showLogin('หมดสิทธิ์ กรุณาเข้าสู่ระบบใหม่'); return;}
        alert('ลบไม่สำเร็จ: '+err.message);
      }finally{elBulkDel.disabled=false; elBulkDel.textContent='ลบที่เลือก';}
    });

    function syncNav(){ elNext.disabled = !elDate.value || elDate.value>=today(); syncDateDisplay(); }
    function shiftDate(delta){
      var base=elDate.value||today(); var d=new Date(base+'T00:00:00');
      d.setDate(d.getDate()+delta);
      var v=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(v>today()) v=today();
      elDate.value=v; syncNav(); load();
    }

    function setCollapsedAll(collapsed){
      Array.prototype.forEach.call(elList.querySelectorAll('.card'),function(card){
        card.classList.toggle('collapsed',collapsed);
      });
    }

    elDate.value=today(); elDate.max=today(); syncNav();
    elReload.addEventListener('click',load);
    elDate.addEventListener('change',function(){syncNav(); load();});
    elPrev.addEventListener('click',function(){shiftDate(-1);});
    elNext.addEventListener('click',function(){shiftDate(1);});
    elExpandAll.addEventListener('click',function(){setCollapsedAll(false);});
    elCollapseAll.addEventListener('click',function(){setCollapsedAll(true);});
    elLogin.addEventListener('click',login);
    elHouse.addEventListener('keydown',function(e){if(e.key==='Enter') elPin.focus();});
    elPin.addEventListener('keydown',function(e){if(e.key==='Enter') login();});
    load();
  })();
  </script>
</body>
</html>
