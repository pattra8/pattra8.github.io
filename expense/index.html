<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattra Villa 8 — รายจ่ายนิติบุคคล</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F9F3E9;
    --surface:   #FFFFFF;
    --surface2:  #F3ECDD;
    --border:    #E6DCC7;
    --border2:   #D9C9AA;

    --text-hi:   #2A2218;
    --text-mid:  #6B5D4A;
    --text-lo:   #9A8A73;

    --accent:    #C47A2C;
    --accent-bg: #F7E6CD;
    --accent-dk: #A5611D;

    --ok:        #5A7549;
    --ok-bg:     #E2ECD6;
    --amber:     #BA7517;
    --amber-bg:  #FAEEDA;
    --rose:      #9A3322;
    --rose-bg:   #F3E0DB;
    --violet:    #C47A2C;
    --violet-bg: #F7E6CD;

    --shadow-sm: 0 1px 3px rgba(80,60,30,0.07);
    --shadow-md: 0 4px 16px rgba(80,60,30,0.10), 0 1px 4px rgba(80,60,30,0.06);
    --shadow-lg: 0 12px 40px rgba(80,60,30,0.13), 0 4px 12px rgba(80,60,30,0.07);

    --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 20px;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-num: 'IBM Plex Sans', 'IBM Plex Sans Thai', sans-serif;
  }
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'IBM Plex Sans Thai','IBM Plex Sans',sans-serif;
    background: var(--bg); color: var(--text-hi);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  html.no-scroll, body.no-scroll { overflow: hidden; }

  /* ── HEADER ── */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-brand { display:flex; align-items:center; gap:10px; }
  .header-back {
    display:flex; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:50%; flex-shrink:0;
    border:1px solid var(--border2); color:var(--text-mid);
    text-decoration:none; transition:all .18s;
  }
  .header-back:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-bg); }
  .header-logo {
    width:32px; height:32px; background:var(--accent); border-radius:var(--r-sm);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; color:#fff; font-size:13px; flex-shrink:0;
  }
  .header-title { font-family:var(--font-display); font-size:22px; font-weight:600; color:var(--text-hi); line-height:1.1; letter-spacing:.01em; }
  .header-sub   { font-size:11px; color:var(--text-mid); letter-spacing:.02em; }
  .header-right { display:flex; align-items:center; gap:10px; }
  .badge-admin  {
    font-size:11px; font-weight:600; color:var(--ok);
    background:var(--ok-bg); padding:3px 10px; border-radius:99px; display:none;
  }
  .btn-admin-toggle {
    background:transparent; border:1.5px solid var(--border2); color:var(--text-mid);
    padding:6px 14px; border-radius:99px; font-size:12px; font-weight:500;
    font-family:inherit; cursor:pointer; transition:all .18s;
  }
  .btn-admin-toggle:hover  { border-color:var(--accent); color:var(--accent); }
  .btn-admin-toggle.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }

  /* ── LAYOUT ── */
  .container { max-width:1040px; margin:0 auto; padding:28px 20px 80px; }

  /* ── TABS ── */
  .page-tabs {
    display:flex; gap:2px; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--r-md); padding:4px; width:fit-content; margin-bottom:28px;
  }
  .page-tab {
    padding:7px 18px; border-radius:var(--r-sm); border:none;
    background:transparent; font-family:inherit; font-size:13px;
    color:var(--text-mid); cursor:pointer; transition:all .18s; font-weight:500;
  }
  .page-tab.active { background:var(--accent); color:#fff; font-weight:600; }

  /* ── SECTION HEADER ── */
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .section-title  { font-family:var(--font-display); font-size:21px; font-weight:600; color:var(--text-hi); letter-spacing:.01em; }
  .section-sub    { font-size:12px; color:var(--text-lo); margin-top:2px; }

  /* ── BUTTONS ── */
  .btn {
    padding:9px 18px; border-radius:var(--r-sm); border:none;
    font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;
    transition:all .18s; display:inline-flex; align-items:center; gap:6px;
  }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent-dk); transform:translateY(-1px); box-shadow:var(--shadow-md); }
  .btn-ghost   { background:transparent; border:1.5px solid var(--border); color:var(--text-mid); }
  .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger  { background:transparent; border:1.5px solid #fecdd3; color:var(--rose); }
  .btn-danger:hover { background:var(--rose-bg); }
  .btn-sm { padding:5px 11px; font-size:12px; }

  /* ── HERO CARD ── */
  .month-hero {
    background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-xl);
    padding:28px 32px; display:flex; align-items:center;
    justify-content:space-between; gap:24px; margin-bottom:20px;
    position:relative; overflow:hidden;
  }
  .month-hero::before {
    content:''; position:absolute; top:-50px; right:-30px;
    width:200px; height:200px; border-radius:50%;
    background:rgba(196,122,44,0.06); pointer-events:none;
  }
  .month-hero::after {
    content:''; position:absolute; bottom:-60px; right:100px;
    width:140px; height:140px; border-radius:50%;
    background:rgba(196,122,44,0.04); pointer-events:none;
  }
  .hero-label  { font-size:11px; font-weight:600; color:var(--accent); letter-spacing:.18em; text-transform:uppercase; margin-bottom:4px; }
  .hero-month  { font-size:16px; font-weight:500; color:var(--text-mid); margin-bottom:10px; }
  .hero-amount { font-family:var(--font-num); font-size:38px; font-weight:700; color:var(--text-hi); line-height:1; letter-spacing:-1px; }
  .hero-amount span { font-size:20px; font-weight:500; margin-right:3px; color:var(--accent); }
  .hero-chips  { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .hero-chip {
    background:var(--accent-bg); border:1px solid var(--border); border-radius:99px;
    padding:4px 12px; font-size:12px; font-weight:500; color:var(--accent-dk);
    display:flex; align-items:center; gap:5px;
  }
  .hero-chip-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .hero-right    { text-align:right; flex-shrink:0; }
  .hero-count    { font-family:var(--font-num); font-size:40px; font-weight:700; color:var(--accent); line-height:1; }
  .hero-count-lbl { font-size:12px; color:var(--text-mid); margin-top:3px; }
  .annual-chart-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--r-xl); padding:24px; margin-bottom:20px;
  }
  .annual-chart-head { margin-bottom:18px; }
  .annual-chart-title { font-size:18px; font-weight:700; color:var(--text-hi); }
  .annual-chart-sub { font-size:13px; color:var(--text-lo); margin-top:4px; }
  .annual-chart-layout {
    display:grid; grid-template-columns:minmax(260px, 360px) minmax(280px, 1fr);
    gap:28px; align-items:center;
  }
  .annual-donut-wrap { display:flex; justify-content:center; }
  .annual-donut {
    width:260px; height:260px; border-radius:50%;
    position:relative; flex-shrink:0;
    background:conic-gradient(var(--surface2) 0deg 360deg);
  }
  .annual-donut::after {
    content:''; position:absolute; inset:26px; border-radius:50%;
    background:var(--surface);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .annual-donut-center {
    position:absolute; inset:0; z-index:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:0 34px;
  }
  .annual-donut-label { font-size:12px; font-weight:700; color:var(--text-lo); text-transform:uppercase; letter-spacing:.6px; }
  .annual-donut-value { font-family:var(--font-num); font-size:28px; font-weight:700; color:var(--text-hi); line-height:1.1; margin-top:8px; }
  .annual-donut-meta { font-size:13px; color:var(--text-mid); margin-top:8px; }
  .annual-legend { display:flex; flex-direction:column; gap:12px; }
  .annual-legend-item {
    display:grid; grid-template-columns:auto minmax(0, 1fr) auto auto;
    gap:12px; align-items:center; padding:12px 14px;
    border:1px solid var(--border); border-radius:var(--r-md); background:var(--bg);
    cursor:pointer; transition:background .15s, border-color .15s, box-shadow .15s;
  }
  .annual-legend-item:hover { background:var(--accent-bg); border-color:var(--border2); }
  .annual-legend-item.active { background:var(--accent-bg); border-color:var(--accent); box-shadow:0 0 0 1px rgba(79,110,247,.08); }
  .annual-legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .annual-legend-name { font-size:13px; font-weight:600; color:var(--text-hi); }
  .annual-legend-pct { font-size:13px; font-weight:600; color:var(--text-mid); }
  .annual-legend-amt { font-size:13px; font-weight:700; color:var(--text-hi); }
  @media(max-width:520px) {
    .month-hero { align-items:flex-start; gap:14px; padding:24px 26px; }
    .hero-right {
      align-self:flex-start; text-align:left;
      display:inline-flex; align-items:baseline; gap:5px;
      background:var(--accent-bg); border:1px solid var(--border); border-radius:99px;
      padding:6px 12px;
    }
    .hero-month { font-size:18px; font-weight:600; margin-bottom:8px; }
    .hero-amount { font-size:30px; }
    .hero-amount span { font-size:18px; }
    .hero-count { font-size:24px; font-weight:600; }
    .hero-count-lbl { font-size:11px; margin-top:0; color:var(--text-mid); }
  }
  @media(max-width:900px) {
    .annual-chart-layout { grid-template-columns:1fr; }
    .annual-donut-wrap { justify-content:flex-start; }
  }
  @media(max-width:580px) {
    .annual-chart-card { padding:18px; }
    .annual-donut { width:220px; height:220px; }
    .annual-donut::after { inset:22px; }
    .annual-donut-value { font-size:24px; }
    .annual-legend-item { grid-template-columns:auto minmax(0, 1fr); }
    .annual-legend-pct, .annual-legend-amt { justify-self:start; }
  }

  /* ── STAT CARDS ── */
  .stats-grid {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:14px; margin-bottom:24px;
  }
  .stat-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--r-lg); padding:20px 20px;
    transition:box-shadow .18s, transform .18s;
    cursor:pointer;
  }
  .stat-card:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); }
  .stat-card.active { border-color:var(--accent); box-shadow:0 0 0 1px rgba(79,110,247,.08), var(--shadow-md); }
  .stat-icon { width:40px; height:40px; border-radius:var(--r-sm); display:flex; align-items:center; justify-content:center; font-size:19px; margin-bottom:14px; }
  .stat-label { font-size:13px; color:var(--text-mid); font-weight:600; margin-bottom:6px; }
  .stat-value { font-family:var(--font-num); font-size:26px; font-weight:700; color:var(--text-hi); line-height:1; }
  .stat-sub   { font-size:13px; color:var(--text-lo); margin-top:6px; }
  .stat-card.accent { background:var(--accent); border-color:var(--accent); }
  .stat-card.accent .stat-icon  { background:rgba(255,255,255,.18); }
  .stat-card.accent .stat-label { color:rgba(255,255,255,.6); }
  .stat-card.accent .stat-value { color:#fff; }
  .stat-card.accent .stat-sub   { color:rgba(255,255,255,.5); }

  /* ── CAP CARD ── */
  .cap-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--r-lg); padding:20px 24px; margin-bottom:24px;
  }
  .cap-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .cap-title  { font-size:16px; font-weight:700; color:var(--text-hi); }
  .cap-pct    { font-size:18px; font-weight:800; color:var(--accent); }
  .cap-bar-bg { background:var(--surface2); border-radius:99px; height:14px; overflow:hidden; }
  .cap-bar-fill {
    height:100%; border-radius:99px;
    background:linear-gradient(90deg,var(--accent),#818cf8);
    transition:width .7s cubic-bezier(.4,0,.2,1);
  }
  .cap-bar-fill.over { background:linear-gradient(90deg,var(--rose),#fb7185); }
  .cap-labels { display:flex; justify-content:space-between; gap:20px; margin-top:12px; font-size:14px; color:var(--text-mid); font-weight:600; }
  .cap-labels span { flex:1; }
  .cap-labels span:nth-child(2) { text-align:center; }
  .cap-labels span:last-child { text-align:right; }
  .cap-remaining { color:#0f766e; }

  /* ── FILTERS ── */
  .filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .filter-select, .filter-search {
    padding:8px 12px; border:1.5px solid var(--border); border-radius:var(--r-sm);
    font-family:inherit; font-size:13px; color:var(--text-hi);
    background:var(--surface); outline:none; transition:border-color .18s;
  }
  .filter-select:focus, .filter-search:focus { border-color:var(--accent); }
  .filter-search { flex:1; min-width:160px; }
  .search-wrap {
    position:relative; flex:1 1 260px; min-width:min(100%,260px);
  }
  .search-wrap .filter-search {
    width:100%; min-width:0; padding-left:34px; padding-right:34px;
  }
  .search-icon {
    position:absolute; left:12px; top:50%; transform:translateY(-50%);
    color:var(--text-lo); font-size:14px; pointer-events:none; z-index:1;
  }
  .search-clear {
    display:none; position:absolute; right:8px; top:50%; transform:translateY(-50%);
    width:24px; height:24px; border:none; border-radius:50%;
    background:var(--surface2); color:var(--text-mid); font-size:15px;
    line-height:1; cursor:pointer;
  }
  .search-clear.visible { display:flex; align-items:center; justify-content:center; }
  .search-clear:hover { background:var(--border); color:var(--text-hi); }
  .search-suggestions {
    display:none; position:absolute; left:0; right:0; top:calc(100% + 6px);
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--r-md); box-shadow:var(--shadow-lg);
    overflow:hidden; z-index:180;
  }
  .search-suggestions.open { display:block; }
  .search-suggestion {
    width:100%; border:none; background:transparent; padding:10px 12px;
    display:grid; grid-template-columns:auto minmax(0,1fr) auto;
    gap:10px; align-items:start; text-align:left; font-family:inherit;
    cursor:pointer; color:var(--text-hi);
  }
  .search-suggestion:hover, .search-suggestion.active { background:var(--accent-bg); }
  .suggestion-icon { color:var(--text-lo); font-size:13px; line-height:1.45; }
  .suggestion-main { min-width:0; }
  .suggestion-title {
    font-size:13px; font-weight:700; line-height:1.35;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .suggestion-sub {
    margin-top:2px; font-size:11.5px; color:var(--text-lo); line-height:1.35;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .suggestion-source {
    font-size:10.5px; font-weight:700; color:var(--accent-dk);
    background:var(--accent-bg); border-radius:99px; padding:2px 7px;
    white-space:nowrap; border:1px solid rgba(79,110,247,0.16);
  }
  .search-suggestion mark {
    background:#fef3c7; color:var(--text-hi); border-radius:4px; padding:0 2px;
  }

  /* ── EXPENSE CARDS ── */
  .expense-list { display:flex; flex-direction:column; gap:8px; }
  .expense-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--r-md); padding:15px 18px;
    display:flex; align-items:flex-start; gap:14px;
    cursor:pointer; transition:box-shadow .18s, transform .18s, border-color .18s;
  }
  .expense-card:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); border-color:var(--border2); }
  .expense-type-badge {
    padding:3px 9px; border-radius:99px; font-size:11px; font-weight:600;
    white-space:nowrap; flex-shrink:0; align-self:flex-start; margin-top:1px;
  }
  .badge-recurring   { background:var(--ok-bg);    color:var(--ok);    }
  .badge-investment  { background:var(--amber-bg);  color:var(--amber); }
  .badge-maintenance { background:var(--rose-bg);   color:var(--rose);  }
  .badge-general     { background:var(--violet-bg); color:var(--violet); }
  .expense-info   { flex:1; min-width:0; }
  .expense-title-row { display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:3px; }
  .expense-title  { font-size:15.5px; font-weight:700; color:var(--text-hi); line-height:1.3; }
  .expense-meta   { font-size:12px; color:var(--text-lo); display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .expense-category-badge {
    display:inline-flex; align-items:center; gap:3px;
    background:var(--accent-bg); color:var(--accent-dk);
    padding:2px 8px; border-radius:99px; font-size:11.5px; font-weight:600;
    border:1px solid rgba(79,110,247,0.18); flex-shrink:0;
  }
  .expense-amount { font-family:var(--font-num); font-size:16px; font-weight:700; color:var(--text-hi); white-space:nowrap; text-align:right; flex-shrink:0; }
  .expense-slips  { display:flex; gap:5px; margin-top:9px; flex-wrap:wrap; align-items:flex-start; }
  .slip-thumb     { width:48px; height:48px; border-radius:7px; object-fit:cover; border:1.5px solid var(--border); cursor:pointer; }
  .slip-count     { width:48px; height:48px; border-radius:7px; background:var(--surface2); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--text-lo); font-weight:600; cursor:pointer; }
  .file-thumb {
    width:48px; height:48px; border-radius:7px; border:1.5px solid var(--border);
    background:var(--surface2); color:var(--text-mid); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:4px; font-size:8.5px; line-height:1.1;
    overflow:hidden; flex:0 0 auto;
  }
  .file-thumb strong { font-size:9.5px; color:var(--text-hi); line-height:1; }
  .file-thumb span {
    width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    margin-top:2px;
  }
  .expense-actions { display:flex; gap:5px; margin-top:8px; }

  /* ── STATUS DOT ── */
  .status-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; vertical-align:middle; }
  .dot-paid    { background:var(--ok); }
  .dot-pending { background:var(--amber); }

  /* ── TAG CAP ── */
  .tag-cap { background:var(--amber-bg); color:var(--amber); font-size:11px; padding:2px 7px; border-radius:99px; font-weight:600; margin-left:5px; }

  /* ── EMPTY ── */
  .empty-state { text-align:center; padding:56px 20px; color:var(--text-lo); }
  .empty-icon  { font-size:42px; margin-bottom:10px; }
  .empty-text  { font-size:14px; }

  /* ── MODAL ── */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(15,22,35,.45); backdrop-filter:blur(5px);
    z-index:200; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--surface); border-radius:var(--r-xl);
    padding:28px; width:100%; max-width:540px;
    max-height:90vh; overflow-y:auto;
    box-shadow:var(--shadow-lg); animation:modalIn .2s ease; position:relative;
  }
  @keyframes modalIn {
    from { opacity:0; transform:scale(.96) translateY(8px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }
  .modal-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:22px; }
  .modal-title { font-size:18px; font-weight:700; color:var(--text-hi); margin-bottom:22px; }
  .modal-head .modal-title { margin-bottom:0; }
  .modal-close {
    width:40px; height:40px; border:none; border-radius:var(--r-sm);
    background:var(--surface2); color:var(--text-mid);
    font-size:20px; font-weight:700; cursor:pointer; flex-shrink:0;
  }
  .modal-close:hover { background:var(--border); color:var(--text-hi); }
  .modal-close-floating { position:absolute; top:18px; right:18px; z-index:1; }
  .form-group  { margin-bottom:14px; }
  .form-label  { display:block; font-size:11px; font-weight:600; color:var(--text-mid); margin-bottom:5px; text-transform:uppercase; letter-spacing:.4px; }
  .form-input,.form-textarea,.form-select {
    width:100%; padding:9px 12px; border:1.5px solid var(--border);
    border-radius:var(--r-sm); font-family:inherit; font-size:14px;
    color:var(--text-hi); background:var(--surface); outline:none; transition:border-color .18s;
  }
  .form-input:focus,.form-textarea:focus,.form-select:focus { border-color:var(--accent); }
  .form-textarea { resize:vertical; min-height:75px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:22px; padding-top:16px; border-top:1px solid var(--border); }

  /* ── TYPE TOGGLE ── */
  .type-toggle { display:flex; gap:6px; }
  .type-btn {
    flex:1; padding:9px; border-radius:var(--r-sm);
    border:1.5px solid var(--border); background:var(--surface);
    font-family:inherit; font-size:13px; font-weight:500;
    cursor:pointer; text-align:center; transition:all .18s; color:var(--text-mid);
  }
  .type-btn.active-recurring   { background:var(--ok-bg);    border-color:var(--ok);    color:var(--ok);    font-weight:600; }
  .type-btn.active-investment  { background:var(--amber-bg); border-color:var(--amber); color:var(--amber); font-weight:600; }
  .type-btn.active-maintenance { background:var(--rose-bg);  border-color:var(--rose);  color:var(--rose);  font-weight:600; }
  .type-btn.active-general     { background:var(--violet-bg); border-color:var(--violet); color:var(--violet); font-weight:600; }

  /* ── CATEGORY PICKER ── */
  .category-select { position:absolute; opacity:0; pointer-events:none; width:1px; height:1px; }
  .category-picker {
    display:flex; flex-wrap:wrap; gap:6px;
  }
  .category-btn {
    height:32px; padding:0 10px; border:1.5px solid var(--border);
    border-radius:99px; background:var(--surface);
    color:var(--text-mid); font-family:inherit; font-size:12.5px; font-weight:500;
    cursor:pointer; display:inline-flex; align-items:center; gap:5px; white-space:nowrap;
    transition:background .15s, border-color .15s, color .15s, box-shadow .15s;
    flex-shrink:0;
  }
  .category-btn:hover { border-color:var(--border2); background:var(--surface2); }
  .category-btn.is-active {
    background:var(--accent-bg); border-color:var(--accent);
    color:var(--accent-dk); font-weight:600; box-shadow:0 2px 8px rgba(79,110,247,.13);
  }
  .category-icon {
    font-size:14px; line-height:1;
  }
  .category-btn.is-active .category-icon { }
  .title-hero { margin-top:2px; }
  .title-hero .form-label {
    font-size:14px; font-weight:700; color:var(--text-hi);
    text-transform:none; letter-spacing:0;
  }
  .title-hero .form-input {
    min-height:52px; font-size:17px; font-weight:600; padding:12px 14px;
  }

  /* ── UPLOAD ── */
  .upload-zone {
    border:2px dashed var(--border); border-radius:var(--r-md);
    padding:22px; text-align:center; cursor:pointer;
    transition:all .2s; background:var(--bg);
  }
  .upload-zone:hover,.upload-zone.drag { border-color:var(--accent); background:var(--accent-bg); }
  .upload-zone input { display:none; }
  .upload-icon { font-size:24px; margin-bottom:6px; }
  .upload-text { font-size:13px; color:var(--text-lo); }
  .upload-preview { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .preview-item { position:relative; width:68px; height:68px; }
  .preview-img  { width:100%; height:100%; border-radius:8px; object-fit:cover; border:1.5px solid var(--border); }
  .preview-file {
    width:100%; height:100%; border-radius:8px; border:1.5px solid var(--border);
    background:var(--surface2); color:var(--text-mid);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:6px; font-size:10px; line-height:1.2;
  }
  .preview-file strong { font-size:11px; color:var(--text-hi); }
  .preview-remove { position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%; background:var(--rose); color:#fff; border:none; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; }
  .save-progress {
    display:none; margin-top:14px; padding:14px 16px; border-radius:var(--r-md);
    background:var(--surface2); border:1px solid var(--border);
  }
  .save-progress.visible { display:block; }
  .save-progress-head { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:8px; }
  .save-progress-title { font-size:13px; font-weight:700; color:var(--text-hi); }
  .save-progress-pct { font-size:12px; font-weight:700; color:var(--accent); }
  .save-progress-bar { height:10px; border-radius:999px; overflow:hidden; background:#e6eaf5; }
  .save-progress-fill {
    height:100%; width:0%;
    background:linear-gradient(90deg,var(--accent),#7c8df8);
    border-radius:999px; transition:width .2s ease;
  }
  .save-progress-text { margin-top:8px; font-size:12px; color:var(--text-mid); }

  /* ── DETAIL ── */
  .detail-section { margin-bottom:18px; }
  .detail-label { font-size:11px; font-weight:600; color:var(--text-lo); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
  .detail-value { font-size:14px; color:var(--text-hi); }
  .detail-value-multiline { white-space:pre-wrap; overflow-wrap:anywhere; line-height:1.55; }

  /* ── LIGHTBOX ── */
  .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.94); z-index:300; align-items:center; justify-content:center; flex-direction:column; gap:16px; padding:16px; }
  .lightbox.open { display:flex; }
  .lightbox img { max-width:min(96vw, 1800px); max-height:calc(100vh - 120px); border-radius:10px; object-fit:contain; box-shadow:0 12px 48px rgba(0,0,0,.45); }
  .lightbox-close { position:absolute; top:20px; right:24px; color:#fff; font-size:26px; cursor:pointer; background:none; border:none; }
  .lightbox-nav { display:flex; gap:12px; }
  .lightbox-nav button { background:rgba(255,255,255,.15); border:none; color:#fff; padding:9px 18px; border-radius:8px; cursor:pointer; font-size:14px; }
  .lightbox-nav button:hover { background:rgba(255,255,255,.25); }
  .lightbox-toolbar { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .lightbox-toolbar button {
    background:rgba(255,255,255,.15); border:none; color:#fff; padding:10px 16px;
    border-radius:999px; cursor:pointer; font-size:13px; font-weight:600;
  }
  .lightbox-toolbar button:hover { background:rgba(255,255,255,.25); }
  @media(max-width:720px) {
    .lightbox { padding:8px; gap:10px; }
    .lightbox img { max-width:100vw; max-height:calc(100vh - 96px); border-radius:0; }
    .lightbox-close { top:12px; right:14px; }
  }

  /* ── LOGIN ── */
  .login-modal { display:none; position:fixed; inset:0; background:rgba(15,22,35,.6); backdrop-filter:blur(8px); z-index:400; align-items:center; justify-content:center; }
  .login-modal.open { display:flex; }
  .login-box { background:var(--surface); border-radius:var(--r-xl); padding:36px; width:320px; text-align:center; box-shadow:var(--shadow-lg); border:1px solid var(--border); }
  .login-logo { font-family:var(--font-display); color:var(--text-hi); font-weight:600; font-size:26px; margin:0 auto 6px; letter-spacing:.01em; }
  .login-title { font-size:17px; font-weight:700; color:var(--text-hi); margin-bottom:4px; }
  .login-sub   { font-size:13px; color:var(--text-lo); margin-bottom:22px; }
  .login-input { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:var(--r-sm); font-family:inherit; font-size:14px; outline:none; margin-bottom:10px; text-align:center; letter-spacing:2px; transition:border-color .18s; }
  .login-input:focus { border-color:var(--accent); }
  .login-error { color:var(--rose); font-size:13px; margin-bottom:8px; display:none; }

  /* ── FACILITIES DASHBOARD ── */
  .facilities-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-xl); padding: 14px 18px; margin-bottom: 20px;
  }
  .facilities-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .facilities-title { font-size: 18px; font-weight: 700; color: var(--text-hi); }
  .facilities-sub   { font-size: 13px; color: var(--text-lo); margin-top: 4px; }
  .facilities-list  { display: flex; flex-direction: column; gap: 6px; }
  .facility-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: var(--r-sm);
    border: 1.5px solid transparent; cursor: pointer;
    transition: background .15s, border-color .15s;
    background: var(--bg);
  }
  .facility-row:hover { background: var(--accent-bg); border-color: var(--border); }
  .facility-row.active { background: var(--accent-bg); border-color: var(--accent); }
  .facility-emoji { font-size: 16px; flex-shrink: 0; width: 24px; height: 24px; display:flex; align-items:center; justify-content:center; }
  .facility-info  { flex: 1; min-width: 0; }
  .facility-name  { font-size: 14px; font-weight: 700; color: var(--text-hi); margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
  .facility-amt   { font-size: 14px; font-weight: 700; color: var(--text-hi); white-space: nowrap; }
  .facility-bar-track {
    height: 5px; background: var(--border); border-radius: 99px; overflow: hidden;
  }
  .facility-bar-fill {
    height: 100%; border-radius: 99px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }
  .facility-count { font-size: 10.5px; color: var(--text-lo); margin-top: 2px; }
  .facility-row.active .facility-name { color: var(--accent-dk); }
  .facility-row.active .facility-amt  { color: var(--accent-dk); }
  .facility-row.active .facility-bar-track { background: rgba(79,110,247,0.15); }
  .facilities-empty { font-size: 13px; color: var(--text-lo); text-align: center; padding: 12px 0; }

  /* ── FAB ── */
  .fab {
    display:none; position:fixed; bottom:28px; right:28px; z-index:150;
    width:56px; height:56px; border-radius:50%;
    background:var(--accent); color:#fff; border:none;
    font-size:26px; font-weight:300; cursor:pointer;
    box-shadow:0 4px 20px rgba(79,110,247,.45);
    align-items:center; justify-content:center;
    transition:transform .18s, box-shadow .18s;
  }
  .fab:hover { transform:scale(1.08); box-shadow:0 6px 28px rgba(79,110,247,.55); }
  .fab.visible { display:flex; }

  /* ── CAP SETTINGS inline in cap-card ── */
  .cap-set-btn {
    background:transparent; border:1.5px solid var(--border);
    color:var(--text-mid); padding:4px 12px; border-radius:99px;
    font-size:12px; font-weight:600; font-family:inherit;
    cursor:pointer; transition:all .18s; display:none;
  }
  .cap-set-btn:hover { border-color:var(--accent); color:var(--accent); }
  .cap-set-btn.visible { display:inline-block; }

  @media(max-width:580px) {
    .form-row { grid-template-columns:1fr; }
    .category-btn { height:30px; font-size:12px; }
    .stats-grid { grid-template-columns:1fr 1fr; }
    .cap-card { padding:16px 18px; margin-bottom:18px; }
    .cap-header { margin-bottom:10px; }
    .cap-title { font-size:14px; }
    .cap-pct { font-size:15px; font-weight:700; }
    .cap-bar-bg { height:9px; }
    .cap-labels { gap:6px; margin-top:9px; font-size:10.5px; font-weight:500; }
    .cap-labels span { line-height:1.25; }
    .container { padding:20px 14px 60px; }
    header { padding:0 16px; }
    .fab { bottom:20px; right:20px; }
  }
  /* Drag-and-drop reorder (admin) */
  .expense-card[draggable="true"] { cursor:grab; }
  .expense-card[draggable="true"]:active { cursor:grabbing; }
  .expense-card.dragging { opacity:.45; box-shadow:0 8px 24px rgba(0,0,0,.18); }
  .drag-handle {
    flex-shrink:0; align-self:center;
    display:flex; align-items:center; justify-content:center;
    width:22px; height:28px; margin-right:0;
    cursor:grab; user-select:none; touch-action:none;
    font-size:16px; line-height:1; letter-spacing:0;
    color:#9ca3af; background:transparent;
    border-radius:6px; transition:color .15s, background .15s, transform .1s;
  }
  .drag-handle:hover { background:var(--surface2); color:#6b7280; }
  .drag-handle:active { cursor:grabbing; transform:scale(.92); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-brand">
    <a class="header-back" href="/" title="กลับหน้า Pattra Center" aria-label="กลับหน้า Pattra Center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <div>

<!-- CONTAINER -->
<div class="container">
  <div class="page-tabs">
    <button class="page-tab active" onclick="showPage('dashboard')">รายจ่ายประจำเดือน</button>
    <button class="page-tab"        onclick="showPage('expenses')">รายจ่ายทั้งหมด</button>

  <!-- DASHBOARD -->
  <div id="pageDashboard">
    <div id="monthHeroCard"></div>

    <div class="section-header" style="margin-top:8px">

        <div class="section-title">สรุปรายเดือน</div>

      </div>
      <select class="filter-select" id="dashMonthFilter" onchange="renderDashboard()"></select>

    <div class="stats-grid" id="statCards"></div>

    <div class="section-header">
      <div class="section-title" id="txnSectionTitle">รายจ่ายเดือน —</div>

        <button type="button" class="search-clear" id="monthSearchClearBtn" aria-label="ล้างคำค้น">×</button>
        <div class="search-suggestions" id="monthSearchSuggestions"></div>
      </div>
    </div>
    <div class="expense-list" id="recentList"></div>
  </div>

  <!-- EXPENSES -->

        <button type="button" class="search-clear" id="searchClearBtn" aria-label="ล้างคำค้น">×</button>
        <div class="search-suggestions" id="searchSuggestions"></div>
      </div>
    </div>
    <div class="expense-list" id="expenseList"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="expenseModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">เพิ่มรายจ่ายใหม่</div>
      <button class="modal-close" type="button" onclick="closeModal('expenseModal')" aria-label="ปิด">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">ประเภทรายจ่าย</label>
      <div class="type-toggle">
        <button class="type-btn" onclick="setType('recurring')"   id="typeBtnRecurring">🔄 ประจำ</button>
        <button class="type-btn" onclick="setType('investment')"  id="typeBtnInvestment">📈 ลงทุน</button>
        <button class="type-btn" onclick="setType('maintenance')" id="typeBtnMaintenance">🔧 ซ่อมบำรุง</button>
        <button class="type-btn" onclick="setType('general')"     id="typeBtnGeneral">🟤 ทั่วไป</button>
      </div>
    </div>
    <div class="form-group">

        <option value="รปภ.">รปภ.</option>
        <option value="กล้องวงจรปิด">กล้องวงจรปิด</option>
        <option value="สวน / ภูมิทัศน์">สวน / ภูมิทัศน์</option>
        <option value="ไฟฟ้าส่วนกลาง">ไฟฟ้าส่วนกลาง</option>
        <option value="ประปา">ประปา</option>
        <option value="สำนักงานนิติ">สำนักงานนิติ</option>
        <option value="อื่น ๆ">อื่น ๆ</option>
      </select>
      <div class="category-picker" role="radiogroup" aria-label="หมวดค่าใช้จ่าย">
        <button type="button" class="category-btn" data-cost-category="ส่วนกลาง" onclick="setCostCategory('ส่วนกลาง')" aria-checked="false" role="radio"><span class="category-icon">🏘️</span><span>ส่วนกลาง</span></button>
        <button type="button" class="category-btn" data-cost-category="สโมสร" onclick="setCostCategory('สโมสร')" aria-checked="false" role="radio"><span class="category-icon">🏛️</span><span>สโมสร</span></button>
        <button type="button" class="category-btn" data-cost-category="ฟิตเนส" onclick="setCostCategory('ฟิตเนส')" aria-checked="false" role="radio"><span class="category-icon">🏋️</span><span>ฟิตเนส</span></button>
        <button type="button" class="category-btn" data-cost-category="สระว่ายน้ำ" onclick="setCostCategory('สระว่ายน้ำ')" aria-checked="false" role="radio"><span class="category-icon">🏊</span><span>สระว่ายน้ำ</span></button>
        <button type="button" class="category-btn" data-cost-category="แม่บ้าน / ทำความสะอาด" onclick="setCostCategory('แม่บ้าน / ทำความสะอาด')" aria-checked="false" role="radio"><span class="category-icon">🧹</span><span>แม่บ้าน</span></button>
        <button type="button" class="category-btn" data-cost-category="รปภ." onclick="setCostCategory('รปภ.')" aria-checked="false" role="radio"><span class="category-icon">🛡️</span><span>รปภ.</span></button>
        <button type="button" class="category-btn" data-cost-category="กล้องวงจรปิด" onclick="setCostCategory('กล้องวงจรปิด')" aria-checked="false" role="radio"><span class="category-icon">🎥</span><span>กล้องวงจรปิด</span></button>
        <button type="button" class="category-btn" data-cost-category="สวน / ภูมิทัศน์" onclick="setCostCategory('สวน / ภูมิทัศน์')" aria-checked="false" role="radio"><span class="category-icon">🌿</span><span>สวน</span></button>
        <button type="button" class="category-btn" data-cost-category="ไฟฟ้าส่วนกลาง" onclick="setCostCategory('ไฟฟ้าส่วนกลาง')" aria-checked="false" role="radio"><span class="category-icon">⚡</span><span>ไฟฟ้า</span></button>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

const FIREBASE_CONFIG = {

const MONTH_TH = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

const MONTH_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let isAdmin = false;
let accessRole = '';
let expenses = usingFirestore ? [] : JSON.parse(localStorage.getItem(EXPENSES_STORAGE_KEY) || '[]');

async function init() {
  if (usingFirestore) {
    await authenticateExpenseAccess();
    localStorage.removeItem(EXPENSES_STORAGE_KEY);
    localStorage.removeItem(CAPMAX_STORAGE_KEY);

}

function save() {

}
function bindFirestore() {
  const expensesQuery = query(collection(db,'expenses'), orderBy('date','desc'));
  onSnapshot(expensesQuery, snap => {
    expenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    refreshUI();
  }, err => console.error('Firestore expenses listener failed:', err));

  onSnapshot(doc(db,'app_settings',FIRESTORE_SETTINGS_DOC), snap => {
    sharedCapMax = snap.exists() ? Number(snap.data().capMax || 0) : 0;
    renderDashboard();
  }, err => console.error('Firestore settings listener failed:', err));
}

function currentMonthValue() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
}
// Months that actually have data, plus the current month — newest first, spanning every year.
function availableMonthValues() {
  const set = new Set([currentMonthValue()]);
  expenses.forEach(e => {
    const d = e?.date ? new Date(e.date) : null;
    if (d && Number.isFinite(d.getTime()))
      set.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  });
  return [...set].sort().reverse();
}
function monthOptionLabel(val) {
  const [yr, mo] = val.split('-');
  return `${MONTH_TH[parseInt(mo,10)-1]} ${yr}`;
}
function populateMonthFilter() {
  const monthFilter = document.getElementById('filterMonth');
  if (!monthFilter) return;
  const opts = ['<option value="">ทุกเดือน</option>'];
  availableMonthValues().forEach(val =>
    opts.push(`<option value="${val}">${monthOptionLabel(val)}</option>`));
  monthFilter.innerHTML = opts.join('');
}
function populateDashMonthFilter() {
  const sel = document.getElementById('dashMonthFilter');
  if (!sel) return;
  const prev = sel.value;
  const cur = currentMonthValue();
  const values = availableMonthValues();
  // Keep whatever month the user was viewing, even if it has no data yet.
  if (prev && !values.includes(prev)) { values.push(prev); values.sort().reverse(); }
  const selected = prev || cur;
  sel.innerHTML = values
    .map(val => `<option value="${val}"${val===selected?' selected':''}>${monthOptionLabel(val)}</option>`)
    .join('');
}

function getResidentSession() {
  try {
    const session = JSON.parse(localStorage.getItem(RESIDENT_SESSION_KEY) || 'null');
    if (!session || Number(session.expiresAt) <= Date.now()) return null;
    return session;
  } catch {
    return null;
  }
}

function applyAccessRole(role) {
  accessRole = role;
  isAdmin = role === 'superadmin';
  const badge = document.getElementById('badgeAdmin');
  badge.textContent = isAdmin ? '● ประธานกรรมการ' : '● กรรมการ';

  document.getElementById('addBtnDashboard').style.display = isAdmin ? 'inline-flex' : 'none';
  setAdminUI(isAdmin);
}

async function authenticateExpenseAccess() {
  const resident = getResidentSession();
  if (!resident?.houseNo || !resident?.pin) {
    if (auth) await signOut(auth).catch(() => {});
    location.replace('https://pattra8.com/');
    throw new Error('Expense access denied');
  }
  await setPersistence(auth, inMemoryPersistence);
  const response = await fetch(EXPENSE_SESSION_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({houseNo: resident.houseNo, pin: resident.pin})
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok || !data.ok ||
      !['superadmin', 'committee'].includes(data.role)) {
    await signOut(auth).catch(() => {});
    location.replace('https://pattra8.com/');
    throw new Error(data.error || 'Expense access denied');
  }
  await signInWithCustomToken(auth, data.customToken);
  applyAccessRole(data.role);
}

async function returnToCenter() {
  if (auth) await signOut(auth).catch(() => {});

}

function fmt(n) { return '฿'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getDate()} ${MONTH_SH[dt.getMonth()]} ${dt.getFullYear()}`;
}

const COST_CATEGORY_EMOJI = {
  'ส่วนกลาง': '🏘️',
  'สโมสร': '🏛️',
  'ฟิตเนส': '🏋️',

  'ประปา': '💧',
  'สำนักงานนิติ': '🗂️',
  'อื่น ๆ': '✨',
};
function costCategoryValue(e) {
  return e?.costCategory || 'อื่น ๆ';
}
function costCategoryLabel(e) {
  const cat = costCategoryValue(e);
  const emoji = COST_CATEGORY_EMOJI[cat] || '✨';
  return `${emoji} ${cat}`;
}
function getExpenseDateMs(expense) {
  const value = expense?.date ? new Date(expense.date).getTime() : 0;
  return Number.isFinite(value) ? value : 0;
}
function getTimestampMs(value) {
  if (!value) return 0;
  if (typeof value?.toMillis === 'function') return Number(value.toMillis()) || 0;
  if (typeof value?.toDate === 'function') return Number(value.toDate().getTime()) || 0;
  if (typeof value === 'object' && Number.isFinite(value.seconds)) {
    return (Number(value.seconds) * 1000) + Math.floor(Number(value.nanoseconds || 0) / 1e6);
  }
  const parsed = new Date(value).getTime();
  return Number.isFinite(parsed) ? parsed : 0;
}
function compareExpenseIdsDesc(a, b) {
  return String(b?.id || '').localeCompare(String(a?.id || ''));
}
function compareExpensesDesc(a, b) {
  const createdDiff = getTimestampMs(b?.createdAt) - getTimestampMs(a?.createdAt);
  if (createdDiff !== 0) return createdDiff;
  const dateDiff = getExpenseDateMs(b) - getExpenseDateMs(a);
  if (dateDiff !== 0) return dateDiff;
  return compareExpenseIdsDesc(a, b);
}
// Manual drag order takes precedence; items without an order (e.g. newly added) float to the top.
function expenseOrderRank(e) {
  return Number.isFinite(e?.order) ? e.order : -Infinity;
}
function compareExpensesManual(a, b) {
  const ra = expenseOrderRank(a), rb = expenseOrderRank(b);
  if (ra !== rb) return ra - rb;
  return compareExpensesDesc(a, b);
}

  renderDashboardFacilities();

}
function renderAnnualBreakdown() {
  const year = new Date().getFullYear();
  const colors = {
    recurring: '#22c55e',
    general: '#8b5cf6',
    investment: '#f59e0b',
    maintenance: '#fb7185',
  };
  const items = [
    { key: 'recurring', label: 'ประจำ' },
    { key: 'general', label: 'ทั่วไป' },
    { key: 'investment', label: 'ลงทุน' },
    { key: 'maintenance', label: 'ซ่อมบำรุง' },
  ].map(item => {
    const amount = expenses
      .filter(expense => new Date(expense.date).getFullYear() === year && expense.type === item.key)
      .reduce((sum, expense) => sum + Number(expense.amount || 0), 0);
    return { ...item, amount, color: colors[item.key] };
  });
  const total = items.reduce((sum, item) => sum + item.amount, 0);
  let cursor = 0;
  const segments = items
    .filter(item => item.amount > 0)
    .map(item => {
      const pct = total > 0 ? (item.amount / total) * 100 : 0;
      const start = cursor;
      const end = cursor + (pct * 3.6);
      cursor = end;
      return `${item.color} ${start}deg ${end}deg`;
    });
  const legend = items.map(item => {
    const pct = total > 0 ? Math.round((item.amount / total) * 100) : 0;
    const isActive = activeAnnualType === item.key;
    return `<div class="annual-legend-item${isActive ? ' active' : ''}" onclick="toggleAnnualTypeFilter('${item.key}')" role="button" aria-pressed="${isActive ? 'true' : 'false'}">
      <div class="annual-legend-dot" style="background:${item.color}"></div>
      <div class="annual-legend-name">${item.label}</div>
      <div class="annual-legend-pct">${pct}%</div>
      <div class="annual-legend-amt">${fmt(item.amount)}</div>
    </div>`;
  }).join('');
  const background = segments.length ? `conic-gradient(${segments.join(', ')})` : 'conic-gradient(var(--surface2) 0deg 360deg)';
  document.getElementById('annualBreakdownCard').innerHTML = `
    <div class="annual-chart-card">
      <div class="annual-chart-head">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
            <div class="annual-chart-title">สัดส่วนค่าใช้จ่ายรายปี</div>
            ${activeAnnualType ? `<button onclick="clearAnnualTypeFilter()" style="font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-bg);border:none;padding:4px 12px;border-radius:99px;cursor:pointer;">✕ ล้าง filter</button>` : ''}
          </div>
        <div class="annual-chart-sub">แยกตามประเภทของปี ${year}</div>
      </div>
      <div class="annual-chart-layout">
        <div class="annual-donut-wrap">
          <div class="annual-donut" style="background:${background}">
            <div class="annual-donut-center">
              <div class="annual-donut-label">รวมทั้งหมด</div>
              <div class="annual-donut-value">${fmt(total)}</div>
              <div class="annual-donut-meta">${items.filter(item => item.amount > 0).length || 0} หมวดที่ใช้งาน</div>
            </div>
          </div>
        </div>
        <div class="annual-legend">${legend}</div>
      </div>
    </div>`;
}
function renderExpensesHero(list) {
  const year = new Date().getFullYear();

  const total = yearly.reduce((sum, expense) => sum + Number(expense.amount || 0), 0);

function normalizeSearchText(value) {
  return String(value || '').toLocaleLowerCase('th-TH').replace(/\s+/g, ' ').trim();
}

function searchTokens(query) {
  return normalizeSearchText(query).split(' ').filter(Boolean);
}

const SEARCH_SCOPES = {
  all: {
    inputId: 'filterSearch',
    clearId: 'searchClearBtn',
    boxId: 'searchSuggestions',
    wrapId: 'expenseSearchWrap',
  },
  month: {
    inputId: 'monthSearch',
    clearId: 'monthSearchClearBtn',
    boxId: 'monthSearchSuggestions',
    wrapId: 'monthSearchWrap',
  },
};

function searchScope(scope = 'all') {
  return SEARCH_SCOPES[scope] ? scope : 'all';
}

function searchEls(scope = 'all') {
  const cfg = SEARCH_SCOPES[searchScope(scope)];
  return {
    input: document.getElementById(cfg.inputId),
    clear: document.getElementById(cfg.clearId),
    box: document.getElementById(cfg.boxId),
    wrap: document.getElementById(cfg.wrapId),
  };
}

function searchSourceItems(scope = 'all') {
  return searchScope(scope) === 'month' ? getMonthExpenseItems() : expenses;
}

function bindSearchControls() {
  Object.keys(SEARCH_SCOPES).forEach(scope => {
    const { input, clear } = searchEls(scope);
    if (input && input.dataset.searchBound !== 'true') {
      input.addEventListener('input', () => handleExpenseSearchInput(scope));
      input.addEventListener('focus', () => renderSearchSuggestions(scope));
      input.addEventListener('keydown', event => handleExpenseSearchKeydown(event, scope));
      input.dataset.searchBound = 'true';
    }
    if (clear && clear.dataset.searchBound !== 'true') {
      clear.addEventListener('click', () => clearExpenseSearch(scope));
      clear.dataset.searchBound = 'true';
    }
  });
}

function getExpenseSearchQuery(scope = 'all') {
  return normalizeSearchText(searchEls(scope).input?.value || '');
}

function expenseSearchScore(expense, query) {
  const q = normalizeSearchText(query);
  if (!q) return 0;
  const title = normalizeSearchText(expense.title);
  const detail = normalizeSearchText(expense.detail);
  const tokens = searchTokens(q);
  const combined = `${title} ${detail}`;
  const tokenMatches = tokens.filter(token => combined.includes(token)).length;
  if (!title.includes(q) && !detail.includes(q) && tokenMatches < tokens.length) return 0;

  let score = 1;
  if (title === q) score += 1200;
  if (title.startsWith(q)) score += 950;
  if (title.includes(q)) score += 760;
  score += tokens.filter(token => title.includes(token)).length * 120;
  if (detail.includes(q)) score += 280;
  score += tokens.filter(token => detail.includes(token)).length * 34;
  return score;
}

function expenseMatchesSearch(expense, query) {
  return !normalizeSearchText(query) || expenseSearchScore(expense, query) > 0;
}

function cleanSuggestionText(value) {
  return String(value || '').replace(/^[\s\-•–—]+/, '').replace(/\s+/g, ' ').trim();
}

function detailSuggestionText(expense, query) {
  const q = normalizeSearchText(query);
  const tokens = searchTokens(q);
  const lines = String(expense.detail || '')
    .split(/\n|,|;/)
    .map(cleanSuggestionText)
    .filter(Boolean);
  return lines.find(line => normalizeSearchText(line).includes(q))
    || lines.find(line => tokens.some(token => normalizeSearchText(line).includes(token)))
    || cleanSuggestionText(expense.detail)
    || expense.title;
}

function escapeRegExp(value) {
  return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlightSearchMatch(value, query) {
  const text = escapeHtml(value || '');
  const tokens = searchTokens(query).slice(0, 5).map(escapeRegExp).filter(Boolean);
  if (!tokens.length) return text;
  return text.replace(new RegExp(`(${tokens.join('|')})`, 'ig'), '<mark>$1</mark>');
}

function buildSearchSuggestions(query, sourceItems = expenses) {
  const q = normalizeSearchText(query);
  if (!q) return [];
  const seen = new Set();
  return [...sourceItems]
    .map(expense => ({ expense, score: expenseSearchScore(expense, q) }))
    .filter(item => item.score > 0)
    .sort((a, b) => b.score - a.score || compareExpensesDesc(a.expense, b.expense))
    .map(({ expense, score }) => {
      const title = String(expense.title || '');
      const titleMatch = normalizeSearchText(title).includes(q)
        || searchTokens(q).some(token => normalizeSearchText(title).includes(token));
      const value = titleMatch ? title : detailSuggestionText(expense, q);
      const key = normalizeSearchText(value);
      if (!key || seen.has(key)) return null;
      seen.add(key);
      return {
        value,
        title,
        sub: titleMatch ? (expense.detail ? cleanSuggestionText(expense.detail) : costCategoryLabel(expense)) : value,
        source: titleMatch ? 'หัวข้อ' : 'รายละเอียด',
        score,
      };
    })
    .filter(Boolean)
    .slice(0, 7);
}

function syncSearchUi(scope = 'all') {
  const clearBtn = searchEls(scope).clear;
  if (!clearBtn) return;
  clearBtn.classList.toggle('visible', Boolean(getExpenseSearchQuery(scope)));
}

function closeSearchSuggestions(scope = 'all') {
  const normalizedScope = searchScope(scope);
  const box = searchEls(normalizedScope).box;
  if (!box) return;
  box.classList.remove('open');
  box.innerHTML = '';
  activeSearchSuggestion[normalizedScope] = -1;
}

function renderSearchSuggestions(scope = 'all') {
  const normalizedScope = searchScope(scope);
  const box = searchEls(normalizedScope).box;
  if (!box) return;
  syncSearchUi(normalizedScope);
  const query = getExpenseSearchQuery(normalizedScope);
  const suggestions = buildSearchSuggestions(query, searchSourceItems(normalizedScope));
  activeSearchSuggestion[normalizedScope] = -1;
  if (!query || !suggestions.length) {
    closeSearchSuggestions(normalizedScope);
    return;
  }
  box.innerHTML = suggestions.map((item, index) => `
    <button type="button" class="search-suggestion" data-suggestion="${index}" data-value="${escapeHtml(item.value)}" onclick="selectExpenseSearchSuggestion(this.dataset.value,'${normalizedScope}')">
      <span class="suggestion-icon">⌕</span>
      <span class="suggestion-main">
        <span class="suggestion-title">${highlightSearchMatch(item.value, query)}</span>
        <span class="suggestion-sub">${highlightSearchMatch(item.title === item.value ? item.sub : item.title, query)}</span>
      </span>
      <span class="suggestion-source">${item.source}</span>
    </button>
  `).join('');
  box.classList.add('open');
}

function setActiveSearchSuggestion(nextIndex, scope = 'all') {
  const normalizedScope = searchScope(scope);
  const box = searchEls(normalizedScope).box;
  if (!box || !box.classList.contains('open')) return;
  const items = [...box.querySelectorAll('.search-suggestion')];
  if (!items.length) return;
  activeSearchSuggestion[normalizedScope] = (nextIndex + items.length) % items.length;
  items.forEach((item, index) => item.classList.toggle('active', index === activeSearchSuggestion[normalizedScope]));
}

function handleExpenseSearchInput(scope = 'all') {
  if (searchScope(scope) === 'month') renderMonthTxn();
  else renderExpenses();
  renderSearchSuggestions(scope);
}

function handleExpenseSearchKeydown(event, scope = 'all') {
  const normalizedScope = searchScope(scope);
  const box = searchEls(normalizedScope).box;
  const isOpen = box?.classList.contains('open');
  if (event.key === 'Escape') {
    closeSearchSuggestions(normalizedScope);
    return;
  }
  if ((event.key === 'ArrowDown' || event.key === 'ArrowUp') && isOpen) {
    event.preventDefault();
    setActiveSearchSuggestion(activeSearchSuggestion[normalizedScope] + (event.key === 'ArrowDown' ? 1 : -1), normalizedScope);
    return;
  }
  if (event.key === 'Enter') {
    if (isOpen && activeSearchSuggestion[normalizedScope] >= 0) {
      event.preventDefault();
      const active = box.querySelectorAll('.search-suggestion')[activeSearchSuggestion[normalizedScope]];
      active?.click();
    } else {
      closeSearchSuggestions(normalizedScope);
      if (normalizedScope === 'month') renderMonthTxn();
      else renderExpenses();
    }
  }
}

function selectExpenseSearchSuggestion(value, scope = 'all') {
  const normalizedScope = searchScope(scope);
  const input = searchEls(normalizedScope).input;
  input.value = value;
  closeSearchSuggestions(normalizedScope);
  if (normalizedScope === 'month') renderMonthTxn();
  else renderExpenses();
  input.focus();
}

function clearExpenseSearch(scope = 'all') {
  const normalizedScope = searchScope(scope);
  const input = searchEls(normalizedScope).input;

  closeSearchSuggestions(normalizedScope);
  if (normalizedScope === 'month') renderMonthTxn();

function renderExpenses() {
  const q=getExpenseSearchQuery('all');
  const list=[...expenses].filter(e=>{
    if(activeExpensesFacility&&new Date(e.date).getFullYear()!==new Date().getFullYear())return false;
    if(activeAnnualType&&new Date(e.date).getFullYear()!==new Date().getFullYear())return false;
    if(activeExpensesFacility&&costCategoryValue(e)!==activeExpensesFacility)return false;
    if(activeAnnualType&&e.type!==activeAnnualType)return false;
    if(!expenseMatchesSearch(e,q))return false;
    return true;
  }).sort((a,b) => q ? expenseSearchScore(b,q) - expenseSearchScore(a,q) || compareExpensesManual(a,b) : compareExpensesManual(a,b));
  syncSearchUi('all');
  renderExpensesHero(list);
  renderExpensesFacilities();

  const reorderable = isAdmin && !q && !activeExpensesFacility && !activeAnnualType;
  document.getElementById('expenseList').innerHTML=list.length
    ?list.map(e=>expenseCardHtml(e,true,reorderable)).join('')
    :'<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">ไม่พบรายการ</div></div>';

// ---- Drag-and-drop reorder ----
let reorderDragId = null;
function bindReorder() {
  ['expenseList', 'recentList'].forEach(id => {
    const container = document.getElementById(id);
    if (!container) return;
    container.addEventListener('dragstart', onReorderDragStart);
    container.addEventListener('dragover', onReorderDragOver);
    container.addEventListener('drop', onReorderDrop);
    container.addEventListener('dragend', onReorderDragEnd);
  });
}
function onReorderDragStart(e) {
  const card = e.target.closest('.expense-card[draggable="true"]');
  if (!card) return;
  reorderDragId = card.dataset.id;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', reorderDragId); } catch (_) {}
}
function reorderAfterElement(container, y) {
  const cards = [...container.querySelectorAll('.expense-card:not(.dragging)')];
  return cards.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: -Infinity }).element;
}
function onReorderDragOver(e) {
  if (reorderDragId === null) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const container = e.currentTarget;
  const dragging = container.querySelector('.expense-card.dragging');
  if (!dragging) return;
  const after = reorderAfterElement(container, e.clientY);
  if (!after) container.appendChild(dragging);
  else container.insertBefore(dragging, after);
}
function onReorderDrop(e) {
  if (reorderDragId === null) return;
  e.preventDefault();
  persistReorder(e.currentTarget);
}
function onReorderDragEnd(e) {
  const card = e.target.closest('.expense-card');
  if (card) card.classList.remove('dragging');
  reorderDragId = null;
}
function persistReorder(container) {
  if (!isAdmin) return;
  // New visual sequence of just the cards in this container (may be a month subset).
  const visibleIds = [...container.querySelectorAll('.expense-card')].map(c => c.dataset.id);
  if (!visibleIds.length) return;
  const visibleSet = new Set(visibleIds);
  // Walk the full globally-sorted list; wherever a visible item sits, drop in the next
  // id from the new sequence. Non-visible items keep their absolute slots, so reordering
  // a single month never reshuffles other months.
  const full = [...expenses].sort(compareExpensesManual);
  let cursor = 0;
  const nextOrder = full.map(exp => (visibleSet.has(exp.id) ? visibleIds[cursor++] : exp.id));
  // Reassign a clean sequential order across everything and collect only what changed.
  const changed = [];
  nextOrder.forEach((id, idx) => {
    const exp = expenses.find(x => x.id === id);
    if (exp && exp.order !== idx) { exp.order = idx; changed.push(exp); }
  });
  if (!changed.length) return;
  if (usingFirestore) {
    Promise.all(changed.map(exp =>
      updateDoc(doc(db, 'expenses', exp.id), { order: exp.order })
        .catch(err => console.error('Failed to persist order for', exp.id, err))
    ));
  } else {
    saveLocal();
    refreshUI();
  }
}

function exportYearTransactions() {
  const now = new Date();
  const year = now.getFullYear();
  const today = now.toISOString().slice(0, 10);
  const ytdExpenses = [...expenses]
    .filter(e => e?.date && e.date.slice(0, 4) === String(year) && e.date <= today)
    .sort((a, b) => new Date(a.date) - new Date(b.date));

  if (!ytdExpenses.length) {
    alert('ยังไม่มีรายการ YTD สำหรับปีนี้');
    return;
  }

  const headers = [
    'วันที่',
    'ชื่อรายจ่าย',
    'ประเภท',
    'หมวดค่าใช้จ่าย',
    'สถานะ',
    'จำนวนเงิน',
    'รายละเอียด',
    'หมายเหตุ',
    'จำนวนไฟล์แนบ',
    'ลิงก์ไฟล์แนบ',
  ];

  const rows = ytdExpenses.map(e => [
    e.date || '',
    e.title || '',
    expenseTypeText(e.type),
    costCategoryLabel(e),
    expenseStatusText(e.status),
    Number(e.amount || 0).toFixed(2),
    e.detail || '',
    e.note || '',
    Array.isArray(e.slips) ? e.slips.length : 0,
    (Array.isArray(e.slips) ? e.slips : [])
      .map(att => normalizeAttachment(att)?.url || '')
      .filter(Boolean)
      .join(' | '),
  ]);

  const csv = [headers, ...rows]
    .map(row => row.map(exportCsvCell).join(','))
    .join('\n');

  const blob = new Blob([`\uFEFF${csv}`], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const fileName = `expense-ytd-${year}.csv`;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isChromeDesktop = /Chrome/.test(navigator.userAgent) && !/Edg|OPR/.test(navigator.userAgent) && !isIOS;
  if (isIOS) {
    window.open(url, '_blank', 'noopener');
    setTimeout(() => URL.revokeObjectURL(url), 60000);
    return;
  }
  const link = document.createElement('a');
  link.href = url;
  link.download = fileName;
  link.rel = 'noopener';
  document.body.appendChild(link);
  link.click();
  link.remove();
  if (isChromeDesktop) {
    setTimeout(() => {
      window.open(url, '_blank', 'noopener');
    }, 250);
  }
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function attachmentKind(type = '', name = '') {
  const lowerType = String(type).toLowerCase();
  const lowerName = String(name).toLowerCase();
  if (lowerType.startsWith('image/')) return 'image';
  if (lowerType === 'application/pdf' || lowerName.endsWith('.pdf')) return 'pdf';
  if (lowerType.includes('word') || lowerName.endsWith('.doc') || lowerName.endsWith('.docx')) return 'doc';
  if (lowerType.includes('excel') || lowerType.includes('spreadsheet') || lowerName.endsWith('.xls') || lowerName.endsWith('.xlsx') || lowerName.endsWith('.csv')) return 'sheet';
  return 'file';
}
function normalizeAttachment(item) {
  if (!item) return null;
  if (typeof item === 'string') {
    const kind = item.startsWith('data:image/') || item.startsWith('http') ? 'image' : 'file';
    return {
      url: item.startsWith('data:') ? '' : item,
      previewUrl: item,
      name: kind === 'image' ? 'รูปภาพ' : 'ไฟล์แนบ',
      type: kind === 'image' ? 'image/*' : 'application/octet-stream',
      size: 0,
      kind,
    };
  }
  if (item.file) {
    return {
      ...item,
      kind: item.kind || attachmentKind(item.type, item.name),
      previewUrl: item.previewUrl || (item.type && item.type.startsWith('image/') ? URL.createObjectURL(item.file) : ''),
    };
  }
  return {
    url: item.url || '',
    previewUrl: item.previewUrl || item.url || '',
    name: item.name || 'ไฟล์แนบ',
    type: item.type || 'application/octet-stream',
    size: item.size || 0,
    kind: item.kind || attachmentKind(item.type, item.name),
  };
}
function compactAttachment(item) {
  const att = normalizeAttachment(item);
  if (!att) return null;
  return {
    url: att.url || '',
    name: att.name || 'ไฟล์แนบ',
    type: att.type || 'application/octet-stream',
    size: Number(att.size || 0),
    kind: att.kind || attachmentKind(att.type, att.name),
  };
}
function attachmentSource(att) {
  const normalized = normalizeAttachment(att);
  return normalized?.previewUrl || normalized?.url || '';
}
function attachmentBadge(kind) {
  if (kind === 'pdf') return 'PDF';
  if (kind === 'doc') return 'DOC';
  if (kind === 'sheet') return 'XLS';
  return 'FILE';
}
function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}
function attachmentsHtml(items, detail = false) {
  const attachments = (items || []).map(normalizeAttachment).filter(Boolean);
  if (!attachments.length) return '';
  const visible = detail ? attachments : attachments.slice(0, 3);
  const encodedAll = JSON.stringify(attachments).replace(/"/g,'&quot;');
  const tiles = visible.map((att, index) => {
    const source = attachmentSource(att);
    if (att.kind === 'image' && source) {
      return `<img class="slip-thumb" src="${source}" ${detail ? 'style="width:76px;height:76px"' : ''} onclick="event.stopPropagation();openAttachment(${encodedAll},${index})">`;
    }
    return `<button class="file-thumb" ${detail ? 'style="width:76px;height:76px"' : ''} onclick="event.stopPropagation();openAttachment(${encodedAll},${index})"><strong>${attachmentBadge(att.kind)}</strong><span>${escapeHtml(att.name)}</span></button>`;
  }).join('');
  const overflow = !detail && attachments.length > 3 ? `<div class="slip-count">+${attachments.length-3}</div>` : '';
  return `<div class="expense-slips">${tiles}${overflow}</div>`;
}

function isStorageUrl(value) {
  return typeof value === 'string' && (value.startsWith('https://') || value.startsWith('http://'));
}
function isDataUrl(value) {
  return typeof value === 'string' && value.startsWith('data:');
}
function sanitizeFileName(name = 'attachment') {
  return String(name).replace(/[^a-zA-Z0-9._-]/g, '-');
}
function extensionFromDataUrl(dataUrl) {
  if (!isDataUrl(dataUrl)) return 'jpg';
  const match = dataUrl.match(/^data:image\/([a-zA-Z0-9.+-]+);base64,/);
  const ext = (match && match[1] ? match[1] : 'jpeg').toLowerCase();
  return ext === 'jpeg' ? 'jpg' : ext;
}
async function uploadSlipAsset(expenseId, slip, index) {
  const normalized = normalizeAttachment(slip);
  if (!usingFirestore || !storage || !normalized) return normalized;
  if (normalized.url && !normalized.file && !isDataUrl(normalized.previewUrl || '')) return normalized;
  if (normalized.file) {
    const fileRef = ref(storage, `expense-slips/${expenseId}/${Date.now()}-${index}-${sanitizeFileName(normalized.name)}`);
    await uploadFileWithProgress(fileRef, normalized, index);
    return {
      url: await getDownloadURL(fileRef),
      name: normalized.name,
      type: normalized.type,
      size: normalized.size,
      kind: normalized.kind,
    };
  }
  const ext = extensionFromDataUrl(normalized.previewUrl || '');
  const fileRef = ref(storage, `expense-slips/${expenseId}/${Date.now()}-${index}.${ext}`);
  await uploadString(fileRef, normalized.previewUrl, 'data_url');
  return {
    url: await getDownloadURL(fileRef),
    name: normalized.name || `image-${index}.${ext}`,
    type: normalized.type || `image/${ext === 'jpg' ? 'jpeg' : ext}`,
    size: normalized.size || 0,
    kind: 'image',
  };
}

function createSlipProgressTracker(slips) {
  const normalized = slips.map(normalizeAttachment).filter(Boolean);
  const progressByIndex = normalized.map((att, index) => ({
    index,
    done: att.url && !att.file && !isDataUrl(att.previewUrl || ''),
    loaded: att.url && !att.file && !isDataUrl(att.previewUrl || '') ? Math.max(Number(att.size || 0), 1) : 0,
    total: Math.max(Number(att.size || 0), 1),
    name: att.name || `ไฟล์ ${index + 1}`,
  }));
  const refresh = (activeIndex = -1, detailPrefix = 'กำลังอัปโหลดไฟล์แนบ...') => {
    const total = progressByIndex.reduce((sum, item) => sum + item.total, 0);
    const loaded = progressByIndex.reduce((sum, item) => sum + Math.min(item.loaded, item.total), 0);
    const pct = total > 0 ? (loaded / total) * 100 : 100;
    const current = progressByIndex[activeIndex];
    const fileCount = progressByIndex.length;
    const doneCount = progressByIndex.filter(item => item.done).length;
    const detail = current
      ? `${detailPrefix} ${current.name} (${Math.min(doneCount + (current.done ? 0 : 1), fileCount)}/${fileCount})`
      : `${detailPrefix} ${doneCount}/${fileCount} ไฟล์`;
    setExpenseSaveProgress(Math.max(8, pct * 0.85), 'กำลังอัปโหลดไฟล์แนบ...', detail);
  };
  return {
    hasUploads: progressByIndex.some(item => !item.done),
    start() {
      if (progressByIndex.length) refresh(-1);
    },
    update(index, loaded, total) {
      if (!progressByIndex[index]) return;
      progressByIndex[index].loaded = Math.max(0, loaded);
      progressByIndex[index].total = Math.max(1, total || progressByIndex[index].total);
      progressByIndex[index].done = progressByIndex[index].loaded >= progressByIndex[index].total;
      refresh(index);
    },
    complete(index) {
      if (!progressByIndex[index]) return;
      progressByIndex[index].loaded = progressByIndex[index].total;
      progressByIndex[index].done = true;
      refresh(index, 'อัปโหลดไฟล์แนบเรียบร้อย');
    },
  };
}
function uploadFileWithProgress(fileRef, normalized, index) {
  return new Promise((resolve, reject) => {
    const task = uploadBytesResumable(fileRef, normalized.file, { contentType: normalized.type || undefined });
    task.on('state_changed',
      snap => {
        if (currentSaveTracker) currentSaveTracker.update(index, snap.bytesTransferred, snap.totalBytes);
      },
      reject,
      () => {
        if (currentSaveTracker) currentSaveTracker.complete(index);
        resolve();
      }
    );
  });
}
let currentSaveTracker = null;
async function persistSlipAssets(expenseId, slips) {
  const uploaded = [];
  currentSaveTracker = createSlipProgressTracker(slips);
  if (currentSaveTracker.hasUploads) currentSaveTracker.start();
  for (let i = 0; i < slips.length; i += 1) {
    uploaded.push(compactAttachment(await uploadSlipAsset(expenseId, slips[i], i)));
  }
  currentSaveTracker = null;
  return uploaded.filter(Boolean);
}
async function deleteSlipAssets(slips) {
  if (!storage || !Array.isArray(slips)) return;
  const tasks = slips
    .map(normalizeAttachment)
    .filter(att => att && isStorageUrl(att.url))
    .map(async att => {
      try {
        await deleteObject(ref(storage, att.url));
      } catch (err) {
        console.warn('Failed to delete slip asset:', err);
      }
    });
  await Promise.all(tasks);
}
async function saveExpense() {
  if (!isAdmin) return;
  if (isSavingExpense) return;
  const title=document.getElementById('fTitle').value.trim(), amount=document.getElementById('fAmount').value, date=document.getElementById('fDate').value;
  if(!title||!amount||!date){alert('กรุณากรอก: ชื่อรายจ่าย, จำนวนเงิน, วันที่');return;}
  const expenseId = editingId || makeExpenseId();
  setExpenseSaveState(true);
  setExpenseSaveProgress(5, editingId ? 'กำลังอัปเดตรายจ่าย...' : 'กำลังบันทึกรายจ่าย...', 'กำลังตรวจสอบข้อมูล...');
  try {
    const slips = usingFirestore ? await persistSlipAssets(expenseId, currentSlips) : [...currentSlips];
    setExpenseSaveProgress(92, editingId ? 'กำลังอัปเดตรายจ่าย...' : 'กำลังบันทึกรายจ่าย...', 'กำลังบันทึกข้อมูลรายการ...');
    const entry={title,type:currentType,amount:parseFloat(amount),date,
      costCategory:document.getElementById('fCostCategory').value,
      detail:document.getElementById('fDetail').value.trim(),note:document.getElementById('fNote').value.trim(),
      status:document.getElementById('fStatus').value,
      slips};
    if (usingFirestore) {
      const existing = editingId ? expenses.find(x=>x.id===editingId) : null;
      await setDoc(doc(db,'expenses',expenseId), {
        ...entry,
        createdAt: existing?.createdAt || serverTimestamp(),
        updatedAt: serverTimestamp(),
      }, { merge: true });
    } else {
      const localEntry = { id: expenseId, ...entry };
      if(editingId){expenses[expenses.findIndex(x=>x.id===editingId)]=localEntry;}else{expenses.unshift(localEntry);}
      save();
      refreshUI();
    }
    setExpenseSaveProgress(100, editingId ? 'อัปเดตรายจ่ายสำเร็จ' : 'บันทึกรายจ่ายสำเร็จ', 'ข้อมูลพร้อมใช้งานแล้ว');
    closeModal('expenseModal', true);
  } catch (err) {
    console.error(err);
    alert('บันทึกรายการไม่สำเร็จ');
  } finally {
    currentSaveTracker = null;
    setExpenseSaveState(false);
  }
}
async function deleteExpense(id) {
  if (!isAdmin) return;
  if(!confirm('ต้องการลบรายการนี้?'))return;
  try {
    if (usingFirestore) {
      const existing = expenses.find(x=>x.id===id);
      await deleteSlipAssets(existing?.slips || []);
      await deleteDoc(doc(db,'expenses',id));
    } else {
      expenses=expenses.filter(x=>x.id!==id);
      save();
      refreshUI();
    }
    closeModal('detailModal');
  } catch (err) {
    console.error(err);
    alert('ลบรายการไม่สำเร็จ');
  }
}

    ${detailHtml?`<div class="detail-section"><div class="detail-label">รายละเอียด</div><div class="detail-value detail-value-multiline">${detailHtml}</div></div>`:''}
    ${noteHtml?`<div class="detail-section"><div class="detail-label">หมายเหตุ</div><div class="detail-value detail-value-multiline">${noteHtml}</div></div>`:''}
    ${slipsHtml}`;
  document.getElementById('detailActions').innerHTML=isAdmin
    ?`<button class="btn btn-danger btn-sm" onclick="deleteExpense('${e.id}')">ลบ</button><button class="btn btn-ghost" onclick="closeModal('detailModal');openEditModal('${e.id}')">แก้ไข</button>`
    :'';
  document.getElementById('detailModal').classList.add('open');
}

function openAttachment(items,idx){
  const attachments = (items || []).map(normalizeAttachment).filter(Boolean);
  const selected = attachments[idx];
  if (!selected) return;
  if (selected.kind !== 'image') {
    window.open(selected.url || selected.previewUrl, '_blank', 'noopener');
    return;
  }
  const imageSources = attachments.filter(att => att.kind === 'image').map(attachmentSource);
  const selectedSource = attachmentSource(selected);
  lightboxSlips=imageSources;
  lightboxIdx=Math.max(imageSources.findIndex(src => src === selectedSource),0);
  document.getElementById('lightboxImg').src=lightboxSlips[lightboxIdx];
  document.getElementById('lightbox').classList.add('open');
}
function openLightbox(slips,idx){openAttachment((slips || []).map(item => ({ url:item, previewUrl:item, kind:'image', type:'image/*', name:'รูปภาพ' })),idx);}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function lightboxPrev(){lightboxIdx=(lightboxIdx-1+lightboxSlips.length)%lightboxSlips.length;document.getElementById('lightboxImg').src=lightboxSlips[lightboxIdx];}
function lightboxNext(){lightboxIdx=(lightboxIdx+1)%lightboxSlips.length;document.getElementById('lightboxImg').src=lightboxSlips[lightboxIdx];}
function openCurrentLightboxImage(){
  const src = lightboxSlips[lightboxIdx];
  if (!src) return;
  window.open(src, '_blank', 'noopener');
}
function closeModal(id, force = false){
  if (!force && id === 'expenseModal' && isSavingExpense) return;
  if (!force && id === 'expenseModal' && isExpenseFormDirty() && !confirmDiscardExpenseForm()) return;
  document.getElementById(id).classList.remove('open');
  if (id === 'expenseModal') expenseFormSnapshot = null;
}
// Lock background page scroll while any modal/lightbox is open (and avoid the layout jump).
function syncModalScrollLock() {
  const anyOpen = document.querySelector('.modal-overlay.open, .login-modal.open, .lightbox.open');
  const root = document.documentElement;
  if (anyOpen) {
    const sw = window.innerWidth - root.clientWidth;
    document.body.style.paddingRight = sw > 0 ? sw + 'px' : '';
    root.classList.add('no-scroll');
    document.body.classList.add('no-scroll');
  } else {
    root.classList.remove('no-scroll');
    document.body.classList.remove('no-scroll');
    document.body.style.paddingRight = '';
  }
}
function bindModalScrollLock() {
  const obs = new MutationObserver(syncModalScrollLock);
  document.querySelectorAll('.modal-overlay, .login-modal, .lightbox')
    .forEach(m => obs.observe(m, { attributes: true, attributeFilter: ['class'] }));
  syncModalScrollLock();
}
document.querySelectorAll('.modal-overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id);});});
document.addEventListener('click', e => {
  Object.keys(SEARCH_SCOPES).forEach(scope => {
    const wrap = searchEls(scope).wrap;
    if (wrap && !wrap.contains(e.target)) closeSearchSuggestions(scope);
  });
});

// ── GLOBAL CAP MAX ──
function getGlobalCapMax() {
  return usingFirestore ? sharedCapMax : (parseFloat(localStorage.getItem(CAPMAX_STORAGE_KEY)||'0')||0);
}
async function saveCapMax() {
  if (!isAdmin) return;
  const val = parseFloat(document.getElementById('fCapMaxGlobal').value||'0');
  if (!val||val<=0) { alert('กรุณากรอกวงเงินที่ถูกต้อง'); return; }
  try {
    if (usingFirestore) {
      await setDoc(doc(db,'app_settings',FIRESTORE_SETTINGS_DOC), { capMax: val, updatedAt: serverTimestamp() }, { merge: true });
      sharedCapMax = val;
    } else {
      localStorage.setItem(CAPMAX_STORAGE_KEY, val.toString());
    }
    closeModal('capModal');
    renderDashboard();
  } catch (err) {
    console.error(err);
    alert('บันทึกวงเงินไม่สำเร็จ');
  }
}
function openCapModal() {
  if (!isAdmin) return;
  const cur = getGlobalCapMax();
  document.getElementById('fCapMaxGlobal').value = cur > 0 ? cur : '';
  document.getElementById('capModal').classList.add('open');
}
