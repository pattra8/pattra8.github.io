<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"IBM Plex Sans Thai","TH Sarabun New",system-ui,sans-serif;color:#1f2937;background:#f3f4f6;padding:24px}
  .doc{max-width:640px;margin:0 auto;background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden}
  .head{padding:24px 28px;border-bottom:2px solid #059669;display:flex;justify-content:space-between;align-items:flex-start}
  .org{font-size:18px;font-weight:700;color:#065f46}
  .sub{font-size:12px;color:#6b7280;margin-top:2px}
  .badge{text-align:right}
  .badge .t{font-size:16px;font-weight:700}
  .badge .n{font-size:12px;color:#6b7280;margin-top:2px}

  table{width:100%;border-collapse:collapse}
  th,td{padding:12px 28px;font-size:14px;text-align:left}
  thead th{background:#f3f4f6;color:#6b7280;font-size:12px;font-weight:600;text-transform:uppercase}
  tbody td{border-bottom:1px solid #f3f4f6}
  .right{text-align:right}
  .total{display:flex;justify-content:space-between;align-items:center;padding:16px 28px;background:#ecfdf5}
  .total .lbl{font-size:13px;color:#065f46}
  .total .amt{font-size:22px;font-weight:800;color:#065f46}
  .words{padding:6px 28px 18px;font-size:13px;color:#374151;font-style:italic}
  .foot{padding:20px 28px;display:flex;justify-content:space-between;align-items:flex-end;font-size:12px;color:#6b7280}
  .sign{text-align:center}
