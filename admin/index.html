<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pattra Villa 8 · Announcement Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Prompt:wght@300;400;500;600&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --taupe: #3d3530;
      --taupe-mid: #6b5f58;
      --gold: #b8975a;
      --gold-pale: #f2e9d8;
      --bg: #faf7f2;
      --bg2: #f0ebe3;
      --card: #ffffff;
      --text: #2e2820;
      --muted: #8a7f76;
      --border: #e4ddd3;
      --danger: #b94d42;
      --radius: 12px;
      --shadow: 0 2px 16px rgba(61,53,48,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      height: 68px;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--taupe);
    }

    .mark {
      width: 36px;
      height: 36px;
      border: 1px solid var(--gold);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 0.05em;
    }

    .brand-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      letter-spacing: 0.05em;
    }

    .brand-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .top-link {
      color: var(--gold);
      text-decoration: none;
      font-size: 12px;
      border: 1px solid var(--gold);
      border-radius: 8px;
      padding: 8px 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    main {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 80px;
    }

    .hero {
      margin-bottom: 28px;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(38px, 7vw, 64px);
      line-height: 1;
      color: var(--taupe);
      margin-bottom: 12px;
    }

    .lead {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      max-width: 520px;
      font-weight: 300;
    }

    .login-card,
    .panel,
    .list-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .login-card {
      max-width: 420px;
      padding: 28px;
      margin-top: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 20px;
      align-items: start;
    }

    .panel,
    .list-card {
      padding: 24px;
    }

    h2 {
      font-family: 'Prompt', sans-serif;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--taupe-mid);
      margin-bottom: 8px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 12px 13px;
      font: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea {
      min-height: 124px;
      resize: vertical;
      line-height: 1.6;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,151,90,0.14);
    }

    .field {
      margin-bottom: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: 1px solid var(--gold);
      background: var(--gold);
      color: #fff;
      border-radius: 8px;
      padding: 11px 18px;
      font-family: 'Sarabun', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--gold);
    }

    .btn-danger {
      border-color: var(--danger);
      color: var(--danger);
      background: transparent;
    }

    .btn-small {
      padding: 7px 10px;
      font-size: 12px;
    }

    .hidden { display: none !important; }

    .notice {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .error { color: var(--danger); }

    .announcement {
      border-top: 1px solid var(--border);
      padding: 18px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
    }

    .announcement:first-of-type { border-top: none; padding-top: 0; }
    .announcement:last-child { padding-bottom: 0; }

    .announcement h3 {
      font-family: 'Prompt', sans-serif;
      font-weight: 500;
      font-size: 15px;
      margin-bottom: 5px;
    }

    .announcement p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 8px;
      white-space: pre-wrap;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 0.04em;
    }

    .pill {
      border: 1px solid var(--border);
      color: var(--taupe-mid);
      border-radius: 999px;
      padding: 2px 8px;
      background: var(--bg);
    }

    .empty {
      color: var(--muted);
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 22px;
      text-align: center;
      font-size: 13px;
    }

    @media (max-width: 760px) {
      header { padding: 0 18px; }
      .brand-sub { display: none; }
      .top-link { padding: 7px 10px; font-size: 11px; }
      main { padding-top: 32px; }
      .grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .announcement { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="../index.html">
      <div class="mark">PV</div>
      <div>
        <div class="brand-title">Pattra Villa 8</div>
        <div class="brand-sub">Announcement Admin</div>
      </div>
    </a>
    <a class="top-link" href="../index.html#announce">View Site</a>
  </header>

  <main>
    <section class="hero">
      <div class="eyebrow">Admin</div>
      <h1>Announcements</h1>
      <p class="lead">เพิ่ม แก้ไข หรือลบประกาศที่จะแสดงบนหน้า Resident Services</p>
    </section>

    <section class="login-card" id="loginCard">
      <h2>เข้าสู่ระบบ</h2>
      <div class="field">
        <label for="passwordInput">รหัสผ่าน</label>
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="ใส่รหัสผ่าน" />
      </div>
      <button id="loginBtn">Login</button>
      <p class="notice error hidden" id="loginError">รหัสผ่านไม่ถูกต้อง</p>
    </section>

    <section class="grid hidden" id="adminPanel">
      <form class="panel" id="announceForm">
        <h2 id="formTitle">เพิ่มประกาศ</h2>
        <input type="hidden" id="docId" />

        <div class="field">
          <label for="titleInput">หัวข้อประกาศ</label>
          <input id="titleInput" required maxlength="120" placeholder="เช่น ปิดน้ำชั่วคราว" />
        </div>

        <div class="field">
          <label for="bodyInput">รายละเอียด</label>
          <textarea id="bodyInput" required maxlength="600" placeholder="รายละเอียดประกาศสำหรับลูกบ้าน"></textarea>
        </div>

        <div class="form-row">
          <div class="field">
            <label for="typeInput">ประเภท</label>
            <select id="typeInput">
              <option value="normal">ทั่วไป</option>
              <option value="urgent">เร่งด่วน</option>
              <option value="info">ข้อมูล</option>
            </select>
          </div>
          <div class="field">
            <label for="dateInput">วันที่แสดง</label>
            <input id="dateInput" placeholder="เช่น 12 Apr 2026" />
          </div>
        </div>

        <div class="actions">
          <button type="submit" id="saveBtn">Save Announcement</button>
          <button type="button" class="btn-secondary hidden" id="cancelBtn">Cancel Edit</button>
        </div>
        <p class="notice" id="formStatus">ข้อมูลจะอัปเดตบนหน้าเว็บแบบไม่ต้อง refresh</p>
      </form>

      <div class="list-card">
        <h2>ประกาศทั้งหมด</h2>
        <div id="announcementList">
          <div class="empty">กำลังโหลดประกาศ...</div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getFirestore,
      collection,
      addDoc,
      updateDoc,
      deleteDoc,
      doc,
      onSnapshot,
      query,
      orderBy,
      serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyC43LJfENSYm-myZ66mURGc4FPtSfji7-Y",
      authDomain: "pattra8-54c3f.firebaseapp.com",
      projectId: "pattra8-54c3f",
      storageBucket: "pattra8-54c3f.firebasestorage.app",
      messagingSenderId: "1045231989781",
      appId: "1:1045231989781:web:ea20c8380787e82fcf4a1c"
    };

    const ADMIN_PASSWORD = 'nitipattra8';
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, 'announcements');

    const loginCard = document.getElementById('loginCard');
    const adminPanel = document.getElementById('adminPanel');
    const passwordInput = document.getElementById('passwordInput');
    const loginError = document.getElementById('loginError');
    const form = document.getElementById('announceForm');
    const formTitle = document.getElementById('formTitle');
    const formStatus = document.getElementById('formStatus');
    const cancelBtn = document.getElementById('cancelBtn');
    const list = document.getElementById('announcementList');

    function esc(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }

    function formatDate(item) {
      if (item.dateText) return item.dateText;
      const source = item.createdAt?.toDate ? item.createdAt.toDate() : null;
      if (!source) return '';
      return source.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function requireLogin() {
      const ok = sessionStorage.getItem('pattra_announce_admin') === '1';
      loginCard.classList.toggle('hidden', ok);
      adminPanel.classList.toggle('hidden', !ok);
      return ok;
    }

    function resetForm(message) {
      form.reset();
      document.getElementById('docId').value = '';
      formTitle.textContent = 'เพิ่มประกาศ';
      cancelBtn.classList.add('hidden');
      formStatus.textContent = message || 'ข้อมูลจะอัปเดตบนหน้าเว็บแบบไม่ต้อง refresh';
      formStatus.classList.remove('error');
    }

    function renderList(items) {
      if (!items.length) {
        list.innerHTML = '<div class="empty">ยังไม่มีประกาศ</div>';
        return;
      }

      list.innerHTML = items.map(item => `
        <article class="announcement">
          <div>
            <h3>${esc(item.title)}</h3>
            <p>${esc(item.body)}</p>
            <div class="meta">
              <span>${esc(formatDate(item))}</span>
              <span class="pill">${esc(item.type || 'normal')}</span>
            </div>
          </div>
          <div class="actions">
            <button class="btn-secondary btn-small" data-edit="${esc(item.id)}" type="button">Edit</button>
            <button class="btn-danger btn-small" data-delete="${esc(item.id)}" type="button">Delete</button>
          </div>
        </article>
      `).join('');
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
      if (passwordInput.value === ADMIN_PASSWORD) {
        sessionStorage.setItem('pattra_announce_admin', '1');
        loginError.classList.add('hidden');
        requireLogin();
      } else {
        loginError.classList.remove('hidden');
      }
    });

    passwordInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') document.getElementById('loginBtn').click();
    });

    form.addEventListener('submit', async event => {
      event.preventDefault();

      const id = document.getElementById('docId').value;
      const data = {
        title: document.getElementById('titleInput').value.trim(),
        body: document.getElementById('bodyInput').value.trim(),
        type: document.getElementById('typeInput').value,
        dateText: document.getElementById('dateInput').value.trim(),
        updatedAt: serverTimestamp()
      };

      if (!data.title || !data.body) return;

      formStatus.textContent = 'กำลังบันทึก...';
      formStatus.classList.remove('error');

      try {
        if (id) {
          await updateDoc(doc(db, 'announcements', id), data);
          resetForm('แก้ไขประกาศเรียบร้อยแล้ว');
        } else {
          await addDoc(colRef, { ...data, createdAt: serverTimestamp() });
          resetForm('เพิ่มประกาศเรียบร้อยแล้ว');
        }
      } catch (error) {
        console.error(error);
        formStatus.textContent = 'บันทึกไม่สำเร็จ กรุณาตรวจสอบ Firestore permissions';
        formStatus.classList.add('error');
      }
    });

    cancelBtn.addEventListener('click', () => resetForm());

    let cachedItems = [];
    list.addEventListener('click', async event => {
      const editBtn = event.target.closest('[data-edit]');
      const deleteBtn = event.target.closest('[data-delete]');

      if (editBtn) {
        const item = cachedItems.find(entry => entry.id === editBtn.dataset.edit);
        if (!item) return;
        document.getElementById('docId').value = item.id;
        document.getElementById('titleInput').value = item.title || '';
        document.getElementById('bodyInput').value = item.body || '';
        document.getElementById('typeInput').value = item.type || 'normal';
        document.getElementById('dateInput').value = item.dateText || formatDate(item);
        formTitle.textContent = 'แก้ไขประกาศ';
        cancelBtn.classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      if (deleteBtn) {
        const item = cachedItems.find(entry => entry.id === deleteBtn.dataset.delete);
        if (!item) return;
        const ok = window.confirm(`ลบประกาศ "${item.title}" ใช่ไหม?`);
        if (!ok) return;
        try {
          await deleteDoc(doc(db, 'announcements', item.id));
        } catch (error) {
          console.error(error);
          window.alert('ลบประกาศไม่สำเร็จ กรุณาตรวจสอบ Firestore permissions');
        }
      }
    });

    const announceQuery = query(colRef, orderBy('createdAt', 'desc'));
    onSnapshot(announceQuery, snapshot => {
      cachedItems = snapshot.docs.map(item => ({ id: item.id, ...item.data() }));
      renderList(cachedItems);
    }, error => {
      console.error(error);
      list.innerHTML = '<div class="empty">โหลดประกาศไม่สำเร็จ</div>';
    });

    requireLogin();
  </script>
</body>
</html>
