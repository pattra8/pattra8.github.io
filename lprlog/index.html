<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LPR Log รายวัน · Pattra Villa 8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#f9f3e9; --bg-soft:#f3ecdd; --card:#ffffff; --border:#e6dcc7;
      --border-soft:#efe8d6; --text:#2a2218; --text-body:#3a3024;
      --text-soft:#6b5d4a; --text-muted:#8a7960; --accent:#c47a2c;
      --accent-text:#9a5c1f; --accent-deep:#855015;
      --ok:#3f6431; --ok-bg:#e8efd9; --warn:#855015; --warn-bg:#f7e6cd;
      --err:#86341e; --err-bg:#f7dfd5; --neutral:#6b5d4a; --neutral-bg:#efe8d6;
      --radius:16px; --shadow:0 1px 2px rgba(60,40,20,0.04), 0 8px 24px rgba(60,40,20,0.07);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { margin:0; padding:0; }
    body {
      font-family:'IBM Plex Sans Thai', system-ui, sans-serif;
      background:var(--bg); color:var(--text-body);
      min-height:100dvh; display:flex; justify-content:center;
      padding:20px 16px 60px;
    }
    .wrap { width:100%; max-width:560px; }
    header { text-align:center; margin:8px 0 18px; }
    .title { font-size:23px; font-weight:700; color:var(--text); letter-spacing:-0.01em; }
    .subtitle { font-size:13.5px; color:var(--text-muted); margin-top:5px; line-height:1.5; }

    /* date bar */
    .datebar { display:flex; gap:8px; align-items:center; margin-bottom:16px; }
    .datebar input[type=date] {
      flex:1; font-family:inherit; font-size:16px; font-weight:600;
      padding:12px 14px; border:1.5px solid var(--border); border-radius:12px;
      background:var(--card); color:var(--text); box-shadow:var(--shadow);
    }
    .navbtn {
      font-family:inherit; font-size:18px; font-weight:700; line-height:1;
      width:46px; min-width:46px; height:46px; border:1.5px solid var(--border);
      border-radius:12px; background:var(--card); color:var(--accent-text);
      cursor:pointer; box-shadow:var(--shadow);
    }
    .navbtn:active { transform:scale(0.97); }
    .navbtn:disabled { opacity:0.4; cursor:default; }

    /* stats */
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:18px; }
    .stat { background:var(--card); border:1px solid var(--border); border-radius:12px;
      padding:11px 6px; text-align:center; }
    .stat-num { font-size:22px; font-weight:700; line-height:1; }
    .stat-lbl { font-size:11px; color:var(--text-muted); margin-top:4px; line-height:1.3; }
    .stat.res .stat-num { color:var(--ok); }
    .stat.vis .stat-num { color:var(--accent-text); }
    .stat.unk .stat-num { color:var(--err); }
    .stat.all .stat-num { color:var(--text); }

    /* sections */
    .section { margin-bottom:22px; }
    .sec-head { display:flex; align-items:baseline; gap:8px; margin:0 4px 9px; }
    .sec-title { font-size:15.5px; font-weight:700; color:var(--text); }
    .sec-count { font-size:12.5px; color:var(--text-muted); }
    .list { background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); overflow:hidden; }
    .item { display:flex; align-items:center; justify-content:space-between;
      gap:10px; padding:12px 14px; border-bottom:1px solid var(--border-soft); }
    .item:last-child { border-bottom:none; }
    .it-main { min-width:0; }
    .plate { font-family:'IBM Plex Mono', monospace; font-size:16px; font-weight:700;
      color:var(--text); letter-spacing:0.02em; }
    .it-sub { font-size:12.5px; color:var(--text-muted); margin-top:2px; line-height:1.4; }
    .house { display:inline-block; font-weight:700; color:var(--accent-text); }
    .times { text-align:right; white-space:nowrap; font-size:13px; }
    .t-in { color:var(--ok); font-weight:600; }
    .t-out { color:var(--err); font-weight:600; }
    .t-dash { color:var(--text-muted); }
    .badge { display:inline-block; font-size:11px; font-weight:600; padding:2px 7px;
      border-radius:999px; background:var(--neutral-bg); color:var(--neutral); margin-left:6px; }
    .reason { font-size:12.5px; color:var(--err); }
    .empty { padding:20px; text-align:center; color:var(--text-muted); font-size:13.5px; }

    /* login */
    .overlay { position:fixed; inset:0; background:rgba(40,30,18,0.45);
      display:none; align-items:center; justify-content:center; padding:20px; z-index:50; }
    .overlay.open { display:flex; }
    .modal { background:var(--card); border-radius:20px; padding:26px 22px;
      width:100%; max-width:360px; box-shadow:var(--shadow); }
    .modal h2 { margin:0 0 4px; font-size:20px; color:var(--text); }
    .modal p { margin:0 0 18px; font-size:13px; color:var(--text-muted); line-height:1.5; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:12.5px; font-weight:600;
      color:var(--text-soft); margin-bottom:6px; }
    .houserow { display:flex; align-items:stretch; border:1.5px solid var(--border);
      border-radius:12px; overflow:hidden; background:var(--card); }
    .houserow .prefix { display:flex; align-items:center; padding:0 12px;
      background:var(--bg-soft); font-weight:700; color:var(--text-soft); font-size:16px; }
    .houserow input, .pin-in {
      width:100%; font-family:inherit; font-size:17px; font-weight:600;
      padding:12px 12px; border:none; outline:none; color:var(--text); background:transparent;
    }
    .pin-in { border:1.5px solid var(--border); border-radius:12px;
      letter-spacing:0.3em; font-family:'IBM Plex Mono', monospace; }
    .houserow input:focus, .pin-in:focus { outline:none; }
    .field:focus-within .houserow, .pin-in:focus { border-color:var(--accent); }
    .btn { width:100%; font-family:inherit; font-size:17px; font-weight:600;
      padding:15px; border:none; border-radius:12px; background:var(--accent);
      color:#fff; cursor:pointer; }
    .btn:hover { background:var(--accent-deep); }
    .btn:disabled { opacity:0.55; cursor:default; }
    .modal-err { font-size:13px; color:var(--err); background:var(--err-bg);
      border-radius:10px; padding:10px 12px; margin-bottom:12px; display:none; }
    .modal-err.show { display:block; }

    .note { margin:8px 0; text-align:center; font-size:13.5px; color:var(--err);
      background:var(--err-bg); border:1px solid var(--err-bg); border-radius:12px; padding:12px; }
    .loading { text-align:center; padding:40px 0; color:var(--text-muted); font-size:14px; }
    .spinner { display:inline-block; width:18px; height:18px;
      border:2.5px solid rgba(150,120,80,.3); border-top-color:var(--accent);
      border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .topbar { display:flex; justify-content:flex-end; margin-bottom:6px; }
    .logout { font-size:12.5px; color:var(--text-muted); background:none; border:none;
      cursor:pointer; text-decoration:underline; }
    footer { text-align:center; margin-top:30px; font-size:12px; color:var(--text-muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar"><button id="logout" class="logout" style="display:none">ออกจากระบบ</button></div>
    <header>
      <div class="title">LPR Log รายวัน</div>
      <div class="subtitle">บันทึกรถเข้า-ออก แยกลูกบ้าน · รถภายนอก · สแกนไม่พบ</div>
    </header>

    <div class="datebar">
      <button id="prev" class="navbtn" title="วันก่อนหน้า">‹</button>
      <input id="date" type="date" />
      <button id="next" class="navbtn" title="วันถัดไป">›</button>
    </div>

    <div id="body"></div>

    <footer>Pattra Villa 8 · เฉพาะกรรมการ</footer>
  </div>

  <div id="overlay" class="overlay">
    <div class="modal">
      <h2>เข้าสู่ระบบกรรมการ</h2>
      <p>ดูบันทึก LPR รายวัน ต้องเป็นกรรมการที่มีสิทธิ์</p>
      <div id="mErr" class="modal-err"></div>
      <div class="field">
        <label>บ้านเลขที่</label>
        <div class="houserow">
          <span class="prefix">38/</span>
          <input id="mSuffix" type="text" inputmode="numeric" autocomplete="off" placeholder="8" />
        </div>
      </div>
      <div class="field">
        <label>PIN (6 หลัก)</label>
        <input id="mPin" class="pin-in" type="password" inputmode="numeric"
          autocomplete="off" maxlength="6" placeholder="••••••" />
      </div>
      <button id="mBtn" class="btn">เข้าสู่ระบบ</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';
    var API = 'https://asia-southeast1-pattra8-54c3f.cloudfunctions.net/dailyTrafficReport';
    var SESSION_KEY = 'pattra_resident_session_v1';
    var TTL = 30 * 24 * 60 * 60 * 1000;

    var elBody = document.getElementById('body');
    var elDate = document.getElementById('date');
    var elPrev = document.getElementById('prev');
    var elNext = document.getElementById('next');
    var elOverlay = document.getElementById('overlay');
    var elSuffix = document.getElementById('mSuffix');
    var elPin = document.getElementById('mPin');
    var elBtn = document.getElementById('mBtn');
    var elMErr = document.getElementById('mErr');
    var elLogout = document.getElementById('logout');

    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

    function todayStr(){
      var d = new Date();
      return d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0');
    }

    /* ── session ── */
    function getSession(){
      try {
        var s = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
        if (!s || Number(s.expiresAt) <= Date.now()) return null;
        return s;
      } catch(e){ return null; }
    }
    function storeSession(houseNo, pin){
      localStorage.setItem(SESSION_KEY, JSON.stringify({
        houseNo: houseNo, pin: pin, expiresAt: Date.now()+TTL }));
    }

    function showLogin(msg){
      elOverlay.classList.add('open');
      elLogout.style.display = 'none';
      if (msg){ elMErr.textContent = msg; elMErr.classList.add('show'); }
      setTimeout(function(){ elSuffix.focus(); }, 80);
    }
    function hideLogin(){ elOverlay.classList.remove('open'); elMErr.classList.remove('show'); }

    /* ── load ── */
    function fmtTime(t){
      return t ? '<span class="t-in">' + esc(t) + '</span>' : '<span class="t-dash">—</span>';
    }
    function dirTh(d){ return d==='entry'?'เข้า':d==='exit'?'ออก':esc(d||''); }

    function inOut(row){
      var inT = row.entryTime ? '<span class="t-in">เข้า '+esc(row.entryTime)+'</span>' : '';
      var outT = row.exitTime ? '<span class="t-out">ออก '+esc(row.exitTime)+'</span>' : '';
      if (!inT && !outT) return '<span class="t-dash">'+esc(row.firstTime||'—')+'</span>';
      return [inT,outT].filter(Boolean).join('<br>');
    }

    function sectionResidents(rows){
      var inner = rows.length ? rows.map(function(r){
        return '<div class="item"><div class="it-main">' +
          '<span class="plate">'+esc(r.plate)+'</span>' +
          '<div class="it-sub">บ้าน <span class="house">'+(r.houses||[]).map(esc).join(', ')+'</span></div>' +
          '</div><div class="times">'+inOut(r)+'</div></div>';
      }).join('') : '<div class="empty">ไม่มีรถลูกบ้านในวันนี้</div>';
      return secWrap('🏠 ลูกบ้าน เข้า-ออก', rows.length+' คัน', inner);
    }

    function sectionVisitors(rows){
      var inner = rows.length ? rows.map(function(r){
        var v = r.vehicleVision || {};
        var desc = [v.make, v.model].filter(Boolean).join(' ');
        var color = v.color ? '<span class="badge">'+esc(v.color)+'</span>' : '';
        var sub = desc || color ?
          '<div class="it-sub">'+esc(desc||'—')+' '+color+'</div>' :
          '<div class="it-sub" style="color:var(--text-muted)">ไม่มีข้อมูลรถ</div>';
        return '<div class="item"><div class="it-main">' +
          '<span class="plate">'+esc(r.plate)+'</span>'+sub +
          '</div><div class="times">'+inOut(r)+'</div></div>';
      }).join('') : '<div class="empty">ไม่มีรถภายนอกในวันนี้</div>';
      return secWrap('🚗 รถภายนอก (visitor)', rows.length+' คัน', inner);
    }

    function sectionUnreadable(rows){
      var inner = rows.length ? rows.map(function(e){
        return '<div class="item"><div class="it-main">' +
          '<div class="reason">'+esc(e.reason||'อ่านไม่ออก')+'</div>' +
          '<div class="it-sub">'+dirTh(e.direction)+' · กล้อง '+esc(e.cameraId||'-')+
            (e.rawPlate?' · raw: '+esc(e.rawPlate):'')+'</div>' +
          '</div><div class="times"><span class="t-dash">'+esc(e.time||'')+'</span></div></div>';
      }).join('') : '<div class="empty">ไม่มีรายการสแกนไม่พบ 🎉</div>';
      return secWrap('❓ สแกนไม่พบ', rows.length+' ครั้ง', inner);
    }

    function secWrap(title, count, inner){
      return '<div class="section"><div class="sec-head">' +
        '<span class="sec-title">'+title+'</span>' +
        '<span class="sec-count">'+esc(count)+'</span></div>' +
        '<div class="list">'+inner+'</div></div>';
    }

    function render(r){
      var stats = '<div class="stats">' +
        '<div class="stat all"><div class="stat-num">'+r.totalDetections+'</div><div class="stat-lbl">รวม<br>(ครั้ง)</div></div>' +
        '<div class="stat res"><div class="stat-num">'+r.residentCars+'</div><div class="stat-lbl">ลูกบ้าน<br>(คัน)</div></div>' +
        '<div class="stat vis"><div class="stat-num">'+r.externalCars+'</div><div class="stat-lbl">ภายนอก<br>(คัน)</div></div>' +
        '<div class="stat unk"><div class="stat-num">'+r.unreadableDetections+'</div><div class="stat-lbl">สแกน<br>ไม่พบ</div></div>' +
        '</div>';
      elBody.innerHTML = stats +
        sectionResidents(r.residentPlates||[]) +
        sectionVisitors(r.externalPlates||[]) +
        sectionUnreadable(r.unreadableEvents||[]);
    }

    function setNavState(){
      elNext.disabled = (elDate.value >= todayStr());
    }

    async function load(){
      var session = getSession();
      if (!session){ showLogin(); return; }
      setNavState();
      elBody.innerHTML = '<div class="loading"><span class="spinner"></span>กำลังโหลด…</div>';
      try {
        var res = await fetch(API, {
          method:'POST', headers:{'Content-Type':'application/json'}, cache:'no-store',
          body: JSON.stringify({ action:'dailyLog', houseNo:session.houseNo,
            pin:session.pin, reportDate: elDate.value })
        });
        if (res.status === 401 || res.status === 403){
          localStorage.removeItem(SESSION_KEY);
          showLogin('สิทธิ์ไม่ถูกต้องหรือหมดอายุ กรุณาเข้าสู่ระบบใหม่');
          return;
        }
        var data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data && data.error ? data.error : ('HTTP '+res.status));
        elLogout.style.display = 'inline';
        render(data.report);
      } catch(err){
        elBody.innerHTML = '<div class="note">โหลดข้อมูลไม่สำเร็จ<br><small>'+esc(err.message)+'</small></div>';
      }
    }

    async function doLogin(){
      var suffix = (elSuffix.value||'').trim();
      var pin = (elPin.value||'').trim();
      elMErr.classList.remove('show');
      if (!/^\d{1,2}$/.test(suffix)){ elMErr.textContent='กรอกเลขบ้านให้ถูกต้อง'; elMErr.classList.add('show'); return; }
      if (pin.length !== 6){ elMErr.textContent='PIN ต้องมี 6 หลัก'; elMErr.classList.add('show'); return; }
      elBtn.disabled = true; elBtn.textContent='กำลังตรวจสอบ…';
      var houseNo = '38/'+suffix;
      try {
        var res = await fetch(API, {
          method:'POST', headers:{'Content-Type':'application/json'}, cache:'no-store',
          body: JSON.stringify({ action:'dailyLog', houseNo:houseNo, pin:pin, reportDate: elDate.value })
        });
        if (res.status===401 || res.status===403){
          elMErr.textContent='เลขบ้าน/PIN ไม่ถูกต้อง หรือไม่มีสิทธิ์ดู LPR Log';
          elMErr.classList.add('show'); return;
        }
        var data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data && data.error ? data.error : ('HTTP '+res.status));
        storeSession(houseNo, pin);
        hideLogin();
        elLogout.style.display='inline';
        render(data.report);
      } catch(err){
        elMErr.textContent='เชื่อมต่อไม่ได้: '+err.message; elMErr.classList.add('show');
      } finally {
        elBtn.disabled=false; elBtn.textContent='เข้าสู่ระบบ';
      }
    }

    function shiftDay(delta){
      var d = new Date(elDate.value + 'T00:00:00');
      d.setDate(d.getDate()+delta);
      var s = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if (s > todayStr()) return;
      elDate.value = s; load();
    }

    elDate.value = todayStr();
    elDate.max = todayStr();
    elDate.addEventListener('change', function(){ if(elDate.value>todayStr()) elDate.value=todayStr(); load(); });
    elPrev.addEventListener('click', function(){ shiftDay(-1); });
    elNext.addEventListener('click', function(){ shiftDay(1); });
    elBtn.addEventListener('click', doLogin);
    elPin.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
    elSuffix.addEventListener('keydown', function(e){ if(e.key==='Enter') elPin.focus(); });
    elLogout.addEventListener('click', function(){
      localStorage.removeItem(SESSION_KEY); showLogin();
    });

    load();
  })();
  </script>
</body>
</html>
