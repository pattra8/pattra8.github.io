<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LPR Log รายวัน · Pattra Villa 8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#f9f3e9; --bg-soft:#f3ecdd; --card:#ffffff; --border:#e6dcc7;
      --border-soft:#efe8d6; --text:#2a2218; --text-body:#3a3024;
      --text-soft:#6b5d4a; --text-muted:#8a7960; --accent:#c47a2c;
      --accent-text:#9a5c1f; --accent-deep:#855015;
      --ok:#3f6431; --ok-bg:#e8efd9; --warn:#855015; --warn-bg:#f7e6cd;
      --err:#86341e; --err-bg:#f7dfd5; --neutral:#6b5d4a; --neutral-bg:#efe8d6;
      --radius:16px; --shadow:0 1px 2px rgba(60,40,20,0.04), 0 8px 24px rgba(60,40,20,0.07);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { margin:0; padding:0; }
    body {
      font-family:'IBM Plex Sans Thai', system-ui, sans-serif;
      background:var(--bg); color:var(--text-body);
      min-height:100dvh; display:flex; justify-content:center;
      padding:18px 14px 70px;
    }
    .wrap { width:100%; max-width:540px; }
    .navbar { display:flex; align-items:center; justify-content:space-between;
      gap:10px; padding:10px 4px; margin-bottom:6px; border-bottom:1px solid var(--border-soft); }
    .nav-home { display:inline-flex; align-items:center; gap:6px; font-size:14px;
      font-weight:600; color:var(--accent-text); text-decoration:none; }
    .nav-home:hover { color:var(--accent-deep); }
    .nav-home .arrow { font-size:16px; line-height:1; }
    .logout { font-size:12.5px; color:var(--text-muted); background:none; border:none;
      cursor:pointer; text-decoration:underline; }
    header { text-align:center; margin:6px 0 16px; }
    .title { font-size:23px; font-weight:700; color:var(--text); letter-spacing:-0.01em; }
    .subtitle { font-size:13px; color:var(--text-muted); margin-top:4px; line-height:1.5; }

    /* date bar */
    .datebar { display:flex; gap:8px; align-items:center; }
    .datebar input[type=date] {
      flex:1; font-family:inherit; font-size:16px; font-weight:600;
      padding:12px 14px; border:1.5px solid var(--border); border-radius:12px;
      background:var(--card); color:var(--text); box-shadow:var(--shadow); min-width:0;
    }
    .navbtn { font-family:inherit; font-size:18px; font-weight:700; line-height:1;
      width:46px; min-width:46px; height:46px; border:1.5px solid var(--border);
      border-radius:12px; background:var(--card); color:var(--accent-text);
      cursor:pointer; box-shadow:var(--shadow); }
    .navbtn:active { transform:scale(0.97); }
    .navbtn:disabled { opacity:0.4; cursor:default; }
    .daycaption { text-align:center; font-size:13px; color:var(--text-soft); margin:10px 2px 2px; }
    .daycaption .win { display:block; font-size:11.5px; color:var(--text-muted); margin-top:2px; }

    /* hero */
    .hero { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:16px 18px; margin:16px 0 10px; text-align:center; }
    .hero-cap { font-size:13px; color:var(--text-soft); }
    .hero-num { font-size:40px; font-weight:700; color:var(--text); line-height:1.05; margin-top:2px; }
    .hero-unit { font-size:13px; color:var(--text-muted); margin-top:1px; }

    /* stat boxes (clickable) */
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-bottom:8px; }
    .stat { background:var(--card); border:1px solid var(--border); border-radius:13px;
      padding:13px 6px 11px; text-align:center; cursor:pointer; position:relative;
      transition:transform .06s, border-color .12s, box-shadow .12s; }
    .stat:hover { border-color:var(--accent); box-shadow:var(--shadow); }
    .stat:active { transform:scale(0.97); }
    .stat-ico { font-size:17px; line-height:1; }
    .stat-num { font-size:24px; font-weight:700; line-height:1.1; margin-top:3px; }
    .stat-lbl { font-size:12px; color:var(--text-muted); margin-top:3px; line-height:1.3; }
    .stat-go { font-size:10.5px; color:var(--accent-text); margin-top:5px; opacity:0.85; }
    .stat.res .stat-num { color:var(--ok); }
    .stat.vis .stat-num { color:var(--accent-text); }
    .stat.unk .stat-num { color:var(--err); }

    /* legend */
    .legend { font-size:11.5px; color:var(--text-muted); line-height:1.6;
      background:var(--bg-soft); border-radius:12px; padding:10px 13px; margin-bottom:20px; }
    .legend b { color:var(--text-soft); font-weight:600; }

    /* accordion */
    .acc { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:var(--shadow); margin-bottom:12px; overflow:hidden; scroll-margin-top:14px; }
    .acc.flash { animation:flash 1.1s ease; }
    @keyframes flash { 0%,100%{ box-shadow:var(--shadow);} 30%{ box-shadow:0 0 0 3px var(--warn-bd, #e8b577);} }
    .acc-head { width:100%; display:flex; align-items:center; justify-content:space-between;
      gap:10px; padding:15px 16px; background:none; border:none; cursor:pointer;
      font-family:inherit; text-align:left; }
    .acc-title { font-size:15.5px; font-weight:700; color:var(--text); }
    .acc-meta { display:flex; align-items:center; gap:10px; }
    .acc-cnt { font-size:12.5px; font-weight:600; color:var(--text-muted);
      background:var(--neutral-bg); padding:3px 9px; border-radius:999px; white-space:nowrap; }
    .acc.res .acc-cnt { color:var(--ok); background:var(--ok-bg); }
    .acc.vis .acc-cnt { color:var(--accent-text); background:var(--warn-bg); }
    .acc.unk .acc-cnt { color:var(--err); background:var(--err-bg); }
    .chev { font-size:13px; color:var(--text-muted); transition:transform .18s; }
    .acc.open .chev { transform:rotate(90deg); }
    .acc-body { display:none; border-top:1px solid var(--border-soft); }
    .acc.open .acc-body { display:block; }

    .item { display:flex; align-items:center; justify-content:space-between;
      gap:10px; padding:11px 16px; border-bottom:1px solid var(--border-soft); }
    .item:last-child { border-bottom:none; }
    .it-main { min-width:0; display:flex; align-items:center; gap:10px; }
    .plate { display:inline-flex; align-items:center; justify-content:center;
      min-width:82px; max-width:112px; height:30px; padding:0 10px;
      border:1.5px solid #3f3529; border-radius:8px; background:#fffdf9;
      font-family:'IBM Plex Mono', monospace; font-size:14px; font-weight:700;
      color:var(--text); letter-spacing:0.02em; white-space:nowrap; line-height:1; }
    .it-sub { min-width:0; font-size:13px; color:var(--text-muted); line-height:1.35;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .house { font-weight:700; color:var(--accent-text); }
    .brand { color:var(--text-soft); font-weight:600; }
    .color-th { color:var(--text-muted); }

    /* in/out block */
    .io { text-align:right; white-space:nowrap; font-size:13.5px; line-height:1.2;
      min-width:96px; font-weight:700; }
    .io-in { color:var(--ok); font-weight:600; }
    .io-out { color:var(--err); font-weight:600; }
    .io-arrow, .io .muted { color:var(--text-muted); font-weight:400; }
    @media (max-width:390px) {
      .item { gap:8px; padding-left:12px; padding-right:12px; }
      .it-main { gap:8px; }
      .plate { min-width:74px; padding:0 8px; font-size:13px; }
      .it-sub { font-size:12.5px; }
      .io { min-width:82px; font-size:13px; }
    }

    .reason { font-size:13px; color:var(--err); font-weight:600; }
    .empty { padding:20px; text-align:center; color:var(--text-muted); font-size:13.5px; }

    /* unreadable review card (image + comment for OCR training) */
    .unread { padding:14px 16px; border-bottom:1px solid var(--border-soft); }
    .unread:last-child { border-bottom:none; }
    .unread-top { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .unread-meta { font-size:12px; color:var(--text-muted); text-align:right;
      white-space:nowrap; line-height:1.5; }
    .unread-img { display:block; width:100%; max-width:340px; border-radius:10px;
      margin:11px 0; border:1px solid var(--border); }
    .unread-noimg { font-size:12.5px; color:var(--text-muted); background:var(--bg-soft);
      border-radius:10px; padding:16px; text-align:center; margin:11px 0; }
    .cmt { width:100%; font-family:inherit; font-size:14px; padding:10px 12px;
      border:1.5px solid var(--border); border-radius:10px; resize:vertical;
      min-height:52px; color:var(--text); background:var(--card); }
    .cmt:focus { outline:none; border-color:var(--accent); }
    .cmt-actions { display:flex; align-items:center; gap:10px; margin-top:8px; }
    .cmt-save { font-family:inherit; font-size:13.5px; font-weight:600; padding:8px 18px;
      border:none; border-radius:9px; background:var(--accent); color:#fff; cursor:pointer; }
    .cmt-save:hover { background:var(--accent-deep); }
    .cmt-save:disabled { opacity:.55; cursor:default; }
    .cmt-status { font-size:12.5px; color:var(--ok); font-weight:600; }

    /* login */
    .overlay { position:fixed; inset:0; background:rgba(40,30,18,0.45);
      display:none; align-items:center; justify-content:center; padding:20px; z-index:50; }
    .overlay.open { display:flex; }
    .modal { background:var(--card); border-radius:20px; padding:26px 22px;
      width:100%; max-width:360px; box-shadow:var(--shadow); }
    .modal h2 { margin:0 0 4px; font-size:20px; color:var(--text); }
    .modal p { margin:0 0 18px; font-size:13px; color:var(--text-muted); line-height:1.5; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:12.5px; font-weight:600; color:var(--text-soft); margin-bottom:6px; }
    .houserow { display:flex; align-items:stretch; border:1.5px solid var(--border);
      border-radius:12px; overflow:hidden; }
    .houserow .prefix { display:flex; align-items:center; padding:0 12px;
      background:var(--bg-soft); font-weight:700; color:var(--text-soft); font-size:16px; }
    .houserow input, .pin-in { width:100%; font-family:inherit; font-size:17px; font-weight:600;
      padding:12px; border:none; outline:none; color:var(--text); background:transparent; }
    .pin-in { border:1.5px solid var(--border); border-radius:12px;
      letter-spacing:0.3em; font-family:'IBM Plex Mono', monospace; }
    .field:focus-within .houserow, .pin-in:focus { border-color:var(--accent); }
    .btn { width:100%; font-family:inherit; font-size:17px; font-weight:600;
      padding:15px; border:none; border-radius:12px; background:var(--accent); color:#fff; cursor:pointer; }
    .btn:hover { background:var(--accent-deep); }
    .btn:disabled { opacity:0.55; cursor:default; }
    .modal-err { font-size:13px; color:var(--err); background:var(--err-bg);
      border-radius:10px; padding:10px 12px; margin-bottom:12px; display:none; }
    .modal-err.show { display:block; }

    .note { margin:8px 0; text-align:center; font-size:13.5px; color:var(--err);
      background:var(--err-bg); border-radius:12px; padding:12px; }
    .loading { text-align:center; padding:40px 0; color:var(--text-muted); font-size:14px; }
    .spinner { display:inline-block; width:18px; height:18px;
      border:2.5px solid rgba(150,120,80,.3); border-top-color:var(--accent);
      border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    footer { text-align:center; margin-top:28px; font-size:12px; color:var(--text-muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="navbar">
      <a class="nav-home" href="/"><span class="arrow">←</span> หน้าแรก</a>
      <button id="logout" class="logout" style="display:none">ออกจากระบบ</button>
    </div>
    <header>
      <div class="title">LPR Log รายวัน</div>
      <div class="subtitle">บันทึกรถเข้า-ออก แยกลูกบ้าน · รถภายนอก · สแกนไม่พบ</div>
    </header>

    <div class="datebar">
      <button id="prev" class="navbtn" title="วันก่อนหน้า">‹</button>
      <input id="date" type="date" />
      <button id="next" class="navbtn" title="วันถัดไป">›</button>
    </div>
    <div id="daycap" class="daycaption"></div>

    <div id="body"></div>

    <footer>Pattra Villa 8 · เฉพาะกรรมการ</footer>
  </div>

  <div id="overlay" class="overlay">
    <div class="modal">
      <h2>เข้าสู่ระบบกรรมการ</h2>
      <p>ดูบันทึก LPR รายวัน ต้องเป็นกรรมการที่มีสิทธิ์</p>
      <div id="mErr" class="modal-err"></div>
      <div class="field">
        <label>บ้านเลขที่</label>
        <div class="houserow"><span class="prefix">38/</span>
          <input id="mSuffix" type="text" inputmode="numeric" autocomplete="off" placeholder="8" /></div>
      </div>
      <div class="field">
        <label>PIN (6 หลัก)</label>
        <input id="mPin" class="pin-in" type="password" inputmode="numeric"
          autocomplete="off" maxlength="6" placeholder="••••••" />
      </div>
      <button id="mBtn" class="btn">เข้าสู่ระบบ</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';
    var API = 'https://asia-southeast1-pattra8-54c3f.cloudfunctions.net/dailyTrafficReport';
    var SESSION_KEY = 'pattra_resident_session_v1';
    var TTL = 30 * 24 * 60 * 60 * 1000;

    var elBody=document.getElementById('body'), elDate=document.getElementById('date'),
        elPrev=document.getElementById('prev'), elNext=document.getElementById('next'),
        elCap=document.getElementById('daycap'), elOverlay=document.getElementById('overlay'),
        elSuffix=document.getElementById('mSuffix'), elPin=document.getElementById('mPin'),
        elBtn=document.getElementById('mBtn'), elMErr=document.getElementById('mErr'),
        elLogout=document.getElementById('logout');

    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
    function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+
      String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

    /* fix3: vehicle color → Thai (brand stays English) */
    var COLOR_PHRASE={'dark blue':'น้ำเงินเข้ม','light blue':'ฟ้า','dark gray':'เทาเข้ม',
      'dark grey':'เทาเข้ม','light gray':'เทาอ่อน','light grey':'เทาอ่อน','dark green':'เขียวเข้ม'};
    var COLOR_TH={white:'ขาว',black:'ดำ',silver:'เงิน',gray:'เทา',grey:'เทา',red:'แดง',
      blue:'น้ำเงิน',navy:'กรมท่า',green:'เขียว',yellow:'เหลือง',brown:'น้ำตาล',orange:'ส้ม',
      gold:'ทอง',beige:'เบจ',cream:'ครีม',purple:'ม่วง',violet:'ม่วง',pink:'ชมพู',
      maroon:'เลือดหมู',tan:'น้ำตาลอ่อน',bronze:'ทองแดง',cyan:'ฟ้าอมเขียว',
      turquoise:'ฟ้าอมเขียว',teal:'เขียวอมฟ้า'};
    function colorTh(c){ if(!c) return ''; var s=String(c).toLowerCase().trim();
      var th = COLOR_PHRASE[s] || s.split(/\s+/).map(function(w){return COLOR_TH[w]||w;}).join(' ');
      return 'สี'+th; }

    /* session */
    function getSession(){ try{ var s=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
      if(!s||Number(s.expiresAt)<=Date.now()) return null; return s; }catch(e){return null;} }
    function storeSession(h,p){ localStorage.setItem(SESSION_KEY, JSON.stringify({
      houseNo:h, pin:p, expiresAt:Date.now()+TTL })); }
    function showLogin(msg){ elOverlay.classList.add('open'); elLogout.style.display='none';
      if(msg){ elMErr.textContent=msg; elMErr.classList.add('show'); }
      setTimeout(function(){ elSuffix.focus(); }, 80); }
    function hideLogin(){ elOverlay.classList.remove('open'); elMErr.classList.remove('show'); }

    /* fix1: friendly date + coverage window caption */
    function renderCaption(report){
      var label='';
      try { label = new Date(elDate.value+'T00:00:00').toLocaleDateString('en-GB',
        {weekday:'long',day:'numeric',month:'long',year:'numeric'}); } catch(e){ label=elDate.value; }
      var isToday = elDate.value >= todayStr();
      var win = report && report.timeRange ? ('พบรถ '+esc(report.timeRange)+' น.') :
        (isToday ? 'ยังไม่มีรถผ่านวันนี้' : 'ไม่มีข้อมูลวันนี้');
      elCap.innerHTML = esc(label) +
        '<span class="win">🕖 วันเริ่มนับ 07:00 น.'+(isToday?' (วันนี้ถึงปัจจุบัน)':'')+' · '+win+'</span>';
    }

    function displayPlate(plate){
      return String(plate||'').replace(/\s+/g,'');
    }

    /* in/out — compact single line */
    function ioBlock(r){
      var inT = r.entryTime ? '<span class="io-in">'+esc(r.entryTime)+'</span>' :
        '<span class="muted">—</span>';
      var outT = r.exitTime ? '<span class="io-out">'+esc(r.exitTime)+'</span>' :
        '<span class="muted">—</span>';
      return '<div class="io">'+inT+' <span class="io-arrow">→</span> '+outT+'</div>';
    }

    function residentItems(rows){
      if(!rows.length) return '<div class="empty">ไม่มีรถลูกบ้านในวันนี้</div>';
      return rows.map(function(r){
        return '<div class="item"><div class="it-main">'+
          '<span class="plate">'+esc(displayPlate(r.plate))+'</span>'+
          '<div class="it-sub">บ้าน <span class="house">'+(r.houses||[]).map(esc).join(', ')+'</span></div>'+
          '</div>'+ioBlock(r)+'</div>'; }).join('');
    }
    function visitorItems(rows){
      if(!rows.length) return '<div class="empty">ไม่มีรถภายนอกในวันนี้</div>';
      return rows.map(function(r){
        var v=r.vehicleVision||{}; var brand=[v.make,v.model].filter(Boolean).join(' ');
        var cth=colorTh(v.color);
        var carline = (brand||cth) ?
          '<div class="it-sub tag-car">'+
            (brand?'<span class="brand">'+esc(brand)+'</span>':'')+
            (cth?'<span class="color-th">'+(brand?' · ':'')+esc(cth)+'</span>':'')+'</div>'
          : '<div class="it-sub" style="opacity:.7">ไม่มีข้อมูลรถ</div>';
        return '<div class="item"><div class="it-main">'+
          '<span class="plate">'+esc(displayPlate(r.plate))+'</span>'+carline+
          '</div>'+ioBlock(r)+'</div>'; }).join('');
    }
    function unreadableItems(rows){
      if(!rows.length) return '<div class="empty">ไม่มีรายการสแกนไม่พบ 🎉</div>';
      return rows.map(function(e){
        var dir = e.direction==='entry'?'เข้า':e.direction==='exit'?'ออก':esc(e.direction||'');
        var img = e.imageUrl ?
          '<a href="'+esc(e.imageUrl)+'" target="_blank" rel="noopener">'+
            '<img class="unread-img" src="'+esc(e.imageUrl)+'" alt="ภาพจากกล้อง" loading="lazy"></a>'
          : '<div class="unread-noimg">⏳ ยังไม่มีภาพ (ระบบกำลังดึงจากกล้อง ~15 นาที)</div>';
        return '<div class="unread" data-eid="'+esc(e.eventId||'')+'">'+
          '<div class="unread-top">'+
            '<div class="reason">'+esc(e.reason||'อ่านไม่ออก')+'</div>'+
            '<div class="unread-meta">'+esc(e.time||'')+'<br>'+dir+' · กล้อง '+esc(e.cameraId||'-')+
              (e.rawPlate?'<br>raw: '+esc(e.rawPlate):'')+'</div>'+
          '</div>'+ img +
          '<textarea class="cmt" placeholder="พิมพ์สิ่งที่เห็น เช่น ทะเบียนจริง / ยี่ห้อ-สี / ป้ายเลอะ-มุมมืด… (ใช้สอน AI)">'+
            esc(e.comment||'')+'</textarea>'+
          '<div class="cmt-actions"><button class="cmt-save">บันทึกคอมเมนต์</button>'+
            '<span class="cmt-status"></span></div>'+
        '</div>'; }).join('');
    }

    function acc(key, cls, title, count, inner){
      return '<div class="acc '+cls+'" id="sec-'+key+'">'+
        '<button class="acc-head" data-key="'+key+'">'+
          '<span class="acc-title">'+title+'</span>'+
          '<span class="acc-meta"><span class="acc-cnt">'+esc(count)+'</span>'+
          '<span class="chev">▸</span></span>'+
        '</button><div class="acc-body">'+inner+'</div></div>';
    }

    var lastReport=null;
    function render(r){
      lastReport=r; renderCaption(r);
      var hero = '<div class="hero"><div class="hero-cap">รถผ่านเข้า-ออกทั้งหมด</div>'+
        '<div class="hero-num">'+r.totalDetections+'</div>'+
        '<div class="hero-unit">ครั้ง · นับทุกครั้งที่ผ่านกล้อง (เข้า+ออก)</div></div>';
      var stats = '<div class="stats">'+
        '<div class="stat res" data-target="res"><div class="stat-ico">🏠</div>'+
          '<div class="stat-num">'+r.residentCars+'</div><div class="stat-lbl">ลูกบ้าน (คัน)</div>'+
          '<div class="stat-go">ดูรายการ →</div></div>'+
        '<div class="stat vis" data-target="vis"><div class="stat-ico">🚗</div>'+
          '<div class="stat-num">'+r.externalCars+'</div><div class="stat-lbl">ภายนอก (คัน)</div>'+
          '<div class="stat-go">ดูรายการ →</div></div>'+
        '<div class="stat unk" data-target="unk"><div class="stat-ico">❓</div>'+
          '<div class="stat-num">'+r.unreadableDetections+'</div><div class="stat-lbl">สแกนไม่พบ</div>'+
          '<div class="stat-go">ดูรายการ →</div></div>'+
        '</div>';
      var legend = '<div class="legend">'+
        '<b>ครั้ง</b> = จำนวนการผ่านกล้อง (รถ 1 คัน เข้า+ออก = 2 ครั้ง) · '+
        '<b>คัน</b> = จำนวนรถไม่ซ้ำ<br>'+
        'เวลา <b style="color:var(--ok)">↓ เข้า</b> / <b style="color:var(--err)">↑ ออก</b> '+
        '= เวลาแรกที่กล้องเห็นรถในทิศนั้น (“—” คือไม่พบทิศนั้น)</div>';
      var sections =
        acc('res','res','🏠 ลูกบ้าน เข้า-ออก', r.residentCars+' คัน', residentItems(r.residentPlates||[]))+
        acc('vis','vis','🚗 รถภายนอก (visitor)', r.externalCars+' คัน', visitorItems(r.externalPlates||[]))+
        acc('unk','unk','❓ สแกนไม่พบ', r.unreadableDetections+' ครั้ง', unreadableItems(r.unreadableEvents||[]));
      elBody.innerHTML = hero + stats + legend + sections;
    }

    /* fix2 + fix5: accordion toggle + stat boxes navigate */
    elBody.addEventListener('click', function(e){
      var save = e.target.closest('.cmt-save');
      if(save){ saveComment(save.closest('.unread')); return; }
      var head = e.target.closest('.acc-head');
      if(head){ document.getElementById('sec-'+head.dataset.key).classList.toggle('open'); return; }
      var stat = e.target.closest('.stat');
      if(stat){ navTo(stat.dataset.target); }
    });
    async function saveComment(card){
      if(!card) return;
      var s=getSession(); if(!s){ showLogin(); return; }
      var eid=card.dataset.eid, txt=card.querySelector('.cmt').value,
          btn=card.querySelector('.cmt-save'), st=card.querySelector('.cmt-status');
      btn.disabled=true; st.style.color=''; st.textContent='กำลังบันทึก…';
      try{
        var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',
          body:JSON.stringify({action:'lprLabel',houseNo:s.houseNo,pin:s.pin,eventId:eid,comment:txt,reportDate:elDate.value})});
        var data=await res.json();
        if(!res.ok||!data.ok) throw new Error(data&&data.error?data.error:('HTTP '+res.status));
        st.style.color='var(--ok)'; st.textContent='✓ บันทึกแล้ว';
      }catch(err){ st.style.color='var(--err)'; st.textContent='บันทึกไม่สำเร็จ: '+err.message; }
      finally{ btn.disabled=false; setTimeout(function(){ if(st.textContent.indexOf('✓')===0) st.textContent=''; },3000); }
    }
    function navTo(key){
      var sec=document.getElementById('sec-'+key); if(!sec) return;
      sec.classList.add('open');
      sec.scrollIntoView({behavior:'smooth', block:'start'});
      sec.classList.remove('flash'); void sec.offsetWidth; sec.classList.add('flash');
    }

    function setNavState(){ elNext.disabled = (elDate.value >= todayStr()); }

    async function load(){
      var s=getSession(); if(!s){ showLogin(); return; }
      setNavState();
      elBody.innerHTML='<div class="loading"><span class="spinner"></span>กำลังโหลด…</div>';
      try{
        var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',
          body:JSON.stringify({action:'dailyLog',houseNo:s.houseNo,pin:s.pin,reportDate:elDate.value})});
        if(res.status===401||res.status===403){ localStorage.removeItem(SESSION_KEY);
          showLogin('สิทธิ์ไม่ถูกต้องหรือหมดอายุ กรุณาเข้าสู่ระบบใหม่'); return; }
        var data=await res.json();
        if(!res.ok||!data.ok) throw new Error(data&&data.error?data.error:('HTTP '+res.status));
        elLogout.style.display='inline'; render(data.report);
      }catch(err){ elBody.innerHTML='<div class="note">โหลดข้อมูลไม่สำเร็จ<br><small>'+esc(err.message)+'</small></div>'; }
    }

    async function doLogin(){
      var suf=(elSuffix.value||'').trim(), pin=(elPin.value||'').trim();
      elMErr.classList.remove('show');
      if(!/^\d{1,2}$/.test(suf)){ elMErr.textContent='กรอกเลขบ้านให้ถูกต้อง'; elMErr.classList.add('show'); return; }
      if(pin.length!==6){ elMErr.textContent='PIN ต้องมี 6 หลัก'; elMErr.classList.add('show'); return; }
      elBtn.disabled=true; elBtn.textContent='กำลังตรวจสอบ…';
      var h='38/'+suf;
      try{
        var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',
          body:JSON.stringify({action:'dailyLog',houseNo:h,pin:pin,reportDate:elDate.value})});
        if(res.status===401||res.status===403){ elMErr.textContent='เลขบ้าน/PIN ไม่ถูกต้อง หรือไม่มีสิทธิ์ดู LPR Log';
          elMErr.classList.add('show'); return; }
        var data=await res.json();
        if(!res.ok||!data.ok) throw new Error(data&&data.error?data.error:('HTTP '+res.status));
        storeSession(h,pin); hideLogin(); elLogout.style.display='inline'; render(data.report);
      }catch(err){ elMErr.textContent='เชื่อมต่อไม่ได้: '+err.message; elMErr.classList.add('show'); }
      finally{ elBtn.disabled=false; elBtn.textContent='เข้าสู่ระบบ'; }
    }

    function shiftDay(delta){
      var d=new Date(elDate.value+'T00:00:00'); d.setDate(d.getDate()+delta);
      var s=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(s>todayStr()) return; elDate.value=s; load();
    }

    elDate.value=todayStr(); elDate.max=todayStr();
    elDate.addEventListener('change', function(){ if(elDate.value>todayStr()) elDate.value=todayStr(); load(); });
    elPrev.addEventListener('click', function(){ shiftDay(-1); });
    elNext.addEventListener('click', function(){ shiftDay(1); });
    elBtn.addEventListener('click', doLogin);
    elPin.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
    elSuffix.addEventListener('keydown', function(e){ if(e.key==='Enter') elPin.focus(); });
    elLogout.addEventListener('click', function(){ localStorage.removeItem(SESSION_KEY); showLogin(); });

    load();
  })();
  </script>
</body>
</html>
