<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blueprints | Pattra Villa 8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Prompt:wght@400;500;600&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --taupe:      #3d3530;
      --taupe-mid:  #6b5f58;
      --gold:       #b8975a;
      --gold-light: #cead75;
      --gold-pale:  #f2e9d8;
      --bg:         #faf7f2;
      --bg2:        #f0ebe3;
      --card:       #ffffff;
      --text:       #2e2820;
      --muted:      #8a7f76;
      --border:     #e4ddd3;
      --danger:     #9b2c1d;
      --radius:     14px;
      --shadow:     0 2px 16px rgba(61,53,48,0.07);
      --shadow-lg:  0 8px 32px rgba(61,53,48,0.11);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
    }

    /* ── Header ── */
    header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
    }
    .logo-monogram {
      width: 36px;
      height: 36px;
      border: 1px solid var(--gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      color: var(--gold);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .logo-divider {
      width: 1px;
      height: 26px;
      background: var(--border);
    }
    .brand-text h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 19px;
      color: var(--taupe);
      letter-spacing: 0.05em;
    }
    .brand-text p {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 1px;
    }
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    a, button { font: inherit; }
    .btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--taupe-mid);
      border-radius: 8px;
      padding: 8px 18px;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Sarabun', sans-serif;
    }
    .btn:hover { border-color: var(--gold); color: var(--gold); }
    .btn.gold {
      border-color: var(--gold);
      color: var(--gold);
    }
    .btn.gold:hover { background: var(--gold); color: #fff; }
    .btn.gold-fill {
      background: var(--gold);
      border-color: var(--gold);
      color: #fff;
    }
    .btn.gold-fill:hover { background: var(--gold-light); border-color: var(--gold-light); }
    .btn.danger {
      color: var(--danger);
      border-color: rgba(155,44,29,.3);
    }
    .btn.danger:hover { background: rgba(155,44,29,.06); }

    /* ── Layout ── */
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 48px 28px 80px;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      align-items: stretch;
      margin-bottom: 28px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: var(--shadow);
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(34px, 5vw, 52px);
      font-weight: 300;
      color: var(--taupe);
      letter-spacing: 0.01em;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .hero-title em { font-style: italic; color: var(--gold); }
    .hero-copy {
      color: var(--muted);
      line-height: 1.75;
      margin-top: 14px;
      font-weight: 300;
    }
    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid rgba(184,151,90,0.45);
      background: var(--gold-pale);
      color: var(--gold-light);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 18px;
      font-family: 'Sarabun', sans-serif;
    }
    .login-box {
      display: grid;
      gap: 14px;
      align-content: center;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font: inherit;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--gold);
    }
    textarea { min-height: 94px; resize: vertical; }
    .hidden { display: none !important; }

    /* ── Upload form ── */
    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .full { grid-column: 1 / -1; }

    /* ── Toolbar + doc list ── */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 32px 0 16px;
      flex-wrap: wrap;
    }
    .toolbar h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 26px;
      color: var(--taupe);
      letter-spacing: 0.01em;
    }
    .doc-list { display: grid; gap: 12px; }
    .doc-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }
    .doc-card:hover { box-shadow: var(--shadow-lg); }
    .doc-title {
      font-family: 'Prompt', sans-serif;
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }
    .doc-meta {
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
      word-break: break-word;
      font-weight: 300;
    }
    .doc-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 48px 20px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.5);
      font-weight: 300;
    }
    .status { color: var(--muted); min-height: 22px; font-size: 13px; }
    .status.error { color: var(--danger); }
    .status.ok { color: #3a7a42; }
    @media (max-width: 720px) {
      header { padding: 0 20px; }
      .logo-divider { display: none; }
      main { padding: 32px 18px 60px; }
      .hero, .upload-grid, .doc-card { grid-template-columns: 1fr; }
      .doc-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/">
      <div class="logo-monogram">PV</div>
      <div class="logo-divider"></div>
      <div class="brand-text">
        <h1>Pattra Villa 8</h1>
        <p>Admin Documents</p>
      </div>
    </a>
    <nav class="nav">
      <a class="btn" href="/">← Home</a>
      <a class="btn gold" href="/admin/">Admin</a>
      <button class="btn danger hidden" id="logoutBtn">ออกจากระบบ</button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="panel">
        <div class="admin-badge">Admin Only</div>
        <h2 class="hero-title" id="pageTitle">Blueprints</h2>
        <p class="hero-copy" id="pageIntro">เก็บแบบก่อสร้าง แปลนระบบ และเอกสารอ้างอิงสำหรับซ่อมบำรุงหรือรีโนเวท เช่น ไฟฟ้า ประปา ระบายน้ำ CCTV Network และ Master Plan</p>
      </div>
      <div class="panel login-box" id="loginPanel">
        <div class="status" id="loginStatus">กำลังตรวจสอบสิทธิ์...</div>
      </div>
    </section>

    <section class="panel hidden" id="vaultPanel">
      <form id="uploadForm" class="upload-grid">
        <div>
          <label for="category">หมวดหมู่</label>
          <select id="category"></select>
        </div>
        <div>
          <label for="title">ชื่อเอกสาร</label>
          <input id="title" required placeholder="เช่น ประกันมอเตอร์ประตูหน้าโครงการ" />
        </div>
        <div class="full">
          <label for="notes">หมายเหตุ</label>
          <textarea id="notes" placeholder="รายละเอียดสั้น ๆ เช่น วันหมดอายุ บริษัทประกัน หรือจุดติดตั้ง"></textarea>
        </div>
        <div class="full">
          <label for="fileInput">ไฟล์แนบ</label>
          <input id="fileInput" type="file" required multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.heic,image/*,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />
        </div>
        <button class="btn gold-fill full" type="submit">อัปโหลดเอกสาร</button>
        <div class="status full" id="uploadStatus"></div>
      </form>
    </section>

    <div class="toolbar">
      <h2>เอกสารทั้งหมด</h2>
      <button class="btn" id="refreshBtn">โหลดใหม่</button>
    </div>
    <section class="doc-list" id="docList">
      <div class="empty">กรุณาเข้าสู่ระบบ admin เพื่อดูเอกสาร</div>
    </section>
  </main>

  <script>
    const VAULT_TYPE = 'blueprints';
    const PAGE_CONFIG = {
      blueprints: {
        title: 'Blueprints',
        intro: 'เก็บแบบก่อสร้าง แปลนระบบ และเอกสารอ้างอิงสำหรับซ่อมบำรุงหรือรีโนเวท เช่น ไฟฟ้า ประปา ระบายน้ำ CCTV Network และ Master Plan',
        categories: [
          'Master Plan / Site Plan',
          'แบบอาคารและโครงสร้าง',
          'ระบบไฟฟ้าและแสงสว่าง',
          'ระบบน้ำ / สุขาภิบาล / ระบายน้ำ',
          'ระบบสระว่ายน้ำ',
          'Landscape / Irrigation',
          'CCTV / Network / LPR',
          'ป้อม รปภ. / Access Control',
          'As-built / Renovation',
          'ใบอนุญาต / ส่งมอบงาน',
          'อื่น ๆ'
        ]
      }
    };
    const API_URL = 'https://asia-southeast1-pattra8-54c3f.cloudfunctions.net/adminDocumentVault';
    const RESIDENT_SESSION_KEY = 'pattra_resident_session_v1';
    let currentDocs = [];

    function $(id) { return document.getElementById(id); }
    function esc(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
    }
    function getResidentSession() {
      try {
        const s = JSON.parse(localStorage.getItem(RESIDENT_SESSION_KEY) || 'null');
        if (!s || Number(s.expiresAt) <= Date.now()) return null;
        return s;
      } catch { return null; }
    }
    function getAuthPayload() {
      const resident = getResidentSession();
      if (resident && resident.houseNo === '38/8' && resident.pin) {
        return {houseNo: resident.houseNo, pin: resident.pin};
      }
      return null;
    }
    function setStatus(id, msg, type = '') {
      const el = $(id);
      el.textContent = msg || '';
      el.className = 'status ' + type;
    }
    async function api(payload) {
      const resp = await fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({vaultType: VAULT_TYPE, ...payload})
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok || !data.ok) throw new Error(data.error || 'Request failed');
      return data;
    }
    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    function formatDate(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleString('th-TH', {
        timeZone: 'Asia/Bangkok',
        dateStyle: 'medium',
        timeStyle: 'short'
      });
    }
    function formatSize(size) {
      const n = Number(size || 0);
      if (n > 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + ' MB';
      if (n > 1024) return Math.round(n / 1024) + ' KB';
      return n + ' B';
    }
    function renderDocs(docs) {
      currentDocs = docs;
      if (!docs.length) {
        $('docList').innerHTML = '<div class="empty">ยังไม่มีเอกสารในหมวดนี้</div>';
        return;
      }
      $('docList').innerHTML = docs.map(doc => `
        <article class="doc-card">
          <div>
            <h3 class="doc-title">${esc(doc.title)}</h3>
            <div class="doc-meta">
              ${esc(doc.category)} · ${esc(doc.fileName)} · ${formatSize(doc.size)}<br>
              อัปโหลดเมื่อ ${formatDate(doc.createdAt)}
              ${doc.notes ? `<br>${esc(doc.notes)}` : ''}
            </div>
          </div>
          <div class="doc-actions">
            ${doc.downloadUrl ? `<a class="btn gold" href="${esc(doc.downloadUrl)}" target="_blank" rel="noopener">เปิดไฟล์</a>` : ''}
            <button class="btn" data-edit="${esc(doc.id)}">แก้ไข</button>
            <button class="btn danger" data-delete="${esc(doc.id)}">ลบ</button>
          </div>
        </article>
      `).join('');
      document.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', () => editDoc(btn.dataset.edit));
      });
      document.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', () => deleteDoc(btn.dataset.delete));
      });
    }
    async function loadDocs() {
      const auth = getAuthPayload();
      if (!auth) return;
      $('vaultPanel').classList.remove('hidden');
      $('logoutBtn').classList.remove('hidden');
      $('loginPanel').classList.add('hidden');
      $('docList').innerHTML = '<div class="empty">กำลังโหลด...</div>';
      const data = await api({action: 'list', ...auth});
      renderDocs(data.documents || []);
    }
    async function uploadDoc(e) {
      e.preventDefault();
      const auth = getAuthPayload();
      const files = Array.from($('fileInput').files || []);
      if (!files.length) return;
      if (!auth) {
        setStatus('uploadStatus', 'กรุณาเข้าสู่ระบบ admin', 'error');
        return;
      }
      const tooLarge = files.find(file => file.size > 15 * 1024 * 1024);
      if (tooLarge) {
        setStatus('uploadStatus', 'ไฟล์ใหญ่เกิน 15 MB', 'error');
        return;
      }
      setStatus('uploadStatus', `กำลังอัปโหลด ${files.length} ไฟล์...`);
      try {
        for (const [index, file] of files.entries()) {
          setStatus('uploadStatus', `กำลังอัปโหลด ${index + 1}/${files.length}: ${file.name}`);
          const dataUrl = await fileToDataUrl(file);
          await api({
            action: 'upload',
            ...auth,
            category: $('category').value,
            title: $('title').value,
            notes: $('notes').value,
            fileName: file.name,
            dataUrl
          });
        }
        $('uploadForm').reset();
        setStatus('uploadStatus', `อัปโหลดแล้ว ${files.length} ไฟล์`, 'ok');
        await loadDocs();
      } catch (err) {
        setStatus('uploadStatus', err.message || 'อัปโหลดไม่สำเร็จ', 'error');
      }
    }
    async function editDoc(id) {
      const doc = currentDocs.find(item => item.id === id);
      if (!doc) return;
      const title = prompt('ชื่อเอกสาร', doc.title || '');
      if (title === null) return;
      const category = prompt('หมวดหมู่', doc.category || '');
      if (category === null) return;
      const notes = prompt('หมายเหตุ', doc.notes || '');
      if (notes === null) return;
      try {
        await api({
          action: 'update',
          ...getAuthPayload(),
          documentId: id,
          title,
          category,
          notes
        });
        await loadDocs();
      } catch (err) {
        alert(err.message || 'แก้ไขไม่สำเร็จ');
      }
    }
    async function deleteDoc(id) {
      if (!confirm('ลบเอกสารนี้?')) return;
      try {
        await api({action: 'delete', ...getAuthPayload(), documentId: id});
        await loadDocs();
      } catch (err) {
        alert(err.message || 'ลบไม่สำเร็จ');
      }
    }
    function logout() {
      location.href = '/';
    }
    function init() {
      const cfg = PAGE_CONFIG[VAULT_TYPE];
      $('pageTitle').textContent = cfg.title;
      $('pageIntro').textContent = cfg.intro;
      $('category').innerHTML = cfg.categories.map(c => `<option>${esc(c)}</option>`).join('');
      $('uploadForm').addEventListener('submit', uploadDoc);
      $('refreshBtn').addEventListener('click', () => loadDocs().catch(err => alert(err.message)));
      $('logoutBtn').addEventListener('click', logout);
      const resident = getResidentSession();
      if (!resident || resident.houseNo !== '38/8') {
        location.href = '/';
        return;
      }
      loadDocs().catch(() => { location.href = '/'; });
    }
    init();
  </script>
</body>
</html>
